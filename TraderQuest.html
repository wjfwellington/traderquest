                background:completed?"#00ff8822":unlocked?"#00d4ff22":"#1a1a2e",
                border:`2px solid ${completed?"#00ff88":unlocked?"#00d4ff":"#333"}`,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,
                boxShadow:unlocked&&!completed?"0 0 12px #00d4ff44":completed?"0 0 12px #00ff8844":"none"}}>
                {completed?"✓":unlocked?mod.emoji:<Lock size={14} color="#555"/>}
              </div>
              {idx<MODULES.length-1 && <div style={{width:2,flex:1,minHeight:20,background:completed?"#00ff8844":"#222",margin:"4px 0"}}/>}
            </div>
            <div onClick={() => unlocked && onSelect(mod)} style={{
              flex:1,marginBottom:10,padding:"12px 14px",borderRadius:10,
              background:unlocked?"#111118":"#0d0d15",
              border:`1px solid ${completed?"#00ff8833":unlocked?"#00d4ff22":"#1a1a2e"}`,
              cursor:unlocked?"pointer":"default",opacity:unlocked?1:0.55,
              filter:unlocked?"none":"blur(0.3px)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                    <span style={{fontFamily:"Orbitron",fontSize:10,color:levelColors[mod.level]||"#888",letterSpacing:1}}>{mod.level}</span>
                    {!unlocked && <span style={{fontSize:10,color:"#666"}}>· {mod.xpReq} XP</span>}
                  </div>
                  <div style={{fontSize:14,fontWeight:600,color:unlocked?"#fff":"#666"}}>{mod.id}. {mod.title}</div>
                  <div style={{fontSize:12,color:"#666",marginTop:2}}>{mod.desc}</div>
                </div>
                {unlocked && <ChevronRight size={16} color="#00d4ff" style={{flexShrink:0,marginLeft:8}}/>}
              </div>
              {unlocked && (
                <div style={{marginTop:8}}>
                  <div style={{background:"#0a0a0f",borderRadius:3,height:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:completed?"#00ff88":"#00d4ff",borderRadius:3,transition:"width 0.4s"}}/>
                  </div>
                  <div style={{fontSize:11,color:"#666",marginTop:3}}>{doneRm}/{keys.length} leituras {completed?"✓":""}</div>
                </div>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );

// ─── GLOSSARY DATA ────────────────────────────────────────────────────────────
const GLOSSARY = [
  // A
  { term: "Absorção", cat: "Order Flow", emoji: "🏦", def: "Quando um grande player usa ordens passivas para absorver toda a pressão do lado oposto sem deixar o preço se mover. Sinal de acumulação ou distribuição institucional iminente." },
  { term: "ADX", cat: "Indicadores", emoji: "📊", def: "Average Directional Index. Mede a FORÇA da tendência (não a direção) em uma escala de 0 a 100. ADX > 25 indica tendência definida; < 20 indica mercado lateral. Use para filtrar sinais de médias móveis." },
  { term: "Alavancagem", cat: "Fundamentos", emoji: "⚡", def: "Permite controlar uma posição maior do que o capital depositado. Ex: alavancagem de 10x significa que com R$ 1.000 você controla R$ 10.000. Amplifica tanto os ganhos quanto as perdas." },
  { term: "All Time High (ATH)", cat: "Estrutura", emoji: "🏔️", def: "Maior preço histórico já registrado por um ativo. É uma resistência psicológica fortíssima — e quando rompida com volume, tende a gerar movimentos expressivos pois não há resistência histórica acima." },
  { term: "Alvo (Target)", cat: "Gestão de Risco", emoji: "🎯", def: "Nível de preço pré-definido onde você pretende fechar a operação com lucro. Deve ser definido ANTES de entrar na operação, junto com o stop loss, para calcular o RR." },
  { term: "Ask", cat: "Order Flow", emoji: "📋", def: "Preço de venda — o menor preço que um vendedor está disposto a aceitar. Quando você compra a mercado, paga o Ask. A diferença entre Bid e Ask é o spread." },
  { term: "ATR", cat: "Indicadores", emoji: "📏", def: "Average True Range. Mede a volatilidade média de um ativo em N períodos. Útil para dimensionar stops (ex: stop = 1,5x ATR) e entender o 'ruído' normal do mercado." },
  // B
  { term: "Bandas de Bollinger", cat: "Indicadores", emoji: "📉", def: "Indicador de volatilidade composto por uma SMA 20 e duas bandas a 2 desvios-padrão. Bandas estreitas (squeeze) antecedem grandes movimentos. Bandas largas indicam alta volatilidade." },
  { term: "Bear Market", cat: "Tendências", emoji: "🐻", def: "Mercado em queda prolongada, geralmente definido como queda de 20% ou mais a partir do topo. Caracterizado por Lower Lows e Lower Highs. O sentimento dominante é o medo." },
  { term: "Bearish", cat: "Tendências", emoji: "🔴", def: "Viés ou sinal de baixa. Indica que o analista ou o padrão sugere que o preço deve cair. Oposto de Bullish." },
  { term: "Bid", cat: "Order Flow", emoji: "📋", def: "Preço de compra — o maior preço que um comprador está disposto a pagar. Quando você vende a mercado, recebe o Bid. A diferença entre Bid e Ask é o spread." },
  { term: "Bid Wall", cat: "Order Flow", emoji: "🧱", def: "Grande concentração de ordens de compra no book em um nível específico de preço, formando uma 'parede' que dificulta a queda do preço naquele ponto. Sinal de interesse institucional." },
  { term: "Book de Ordens", cat: "Order Flow", emoji: "📖", def: "Registro em tempo real de todas as ordens de compra (bids) e venda (asks) pendentes em diferentes níveis de preço. Traders de Order Flow leem o book para antecipar movimentos." },
  { term: "Breakout", cat: "Price Action", emoji: "🚀", def: "Rompimento de um nível de suporte ou resistência pelo preço. Um breakout verdadeiro é confirmado por volume alto (2x ou mais a média). Breakout falso é chamado de Fakeout." },
  { term: "Bull Market", cat: "Tendências", emoji: "🐂", def: "Mercado em alta prolongada, caracterizado por Higher Highs e Higher Lows. Definido geralmente como alta de 20% ou mais a partir do fundo. O sentimento dominante é a euforia e o otimismo." },
  { term: "Bullish", cat: "Tendências", emoji: "🟢", def: "Viés ou sinal de alta. Indica que o analista ou o padrão sugere que o preço deve subir. Oposto de Bearish." },
  // C
  { term: "Candlestick", cat: "Gráficos", emoji: "🕯️", def: "Representação gráfica do preço em um período, mostrando abertura, fechamento, máxima e mínima. Desenvolvido no Japão no século XVIII. O corpo (retângulo) vai da abertura ao fechamento; as sombras (pavios) mostram os extremos." },
  { term: "Candle de Alta", cat: "Gráficos", emoji: "🟢", def: "Candlestick onde o fechamento está ACIMA da abertura. Geralmente verde ou branco. Indica que os compradores dominaram o período, elevando o preço do início ao fim." },
  { term: "Candle de Baixa", cat: "Gráficos", emoji: "🔴", def: "Candlestick onde o fechamento está ABAIXO da abertura. Geralmente vermelho ou preto. Indica que os vendedores dominaram o período, reduzindo o preço do início ao fim." },
  { term: "Capital", cat: "Gestão de Risco", emoji: "💰", def: "Dinheiro disponível na conta para operar. A preservação do capital é o objetivo número 1 do trader profissional — sem capital, não há operações futuras." },
  { term: "Contrato Futuro", cat: "Fundamentos", emoji: "📜", def: "Acordo padronizado para comprar ou vender um ativo a um preço determinado numa data futura. No Brasil, os mais operados no day trade são WIN (Mini Índice) e WDO (Mini Dólar)." },
  { term: "Corretora", cat: "Fundamentos", emoji: "🏢", def: "Instituição financeira que serve de intermediária entre o trader e o mercado. No Brasil, é necessário ter conta em corretora habilitada pela B3 para operar mini-contratos." },
  { term: "Correção", cat: "Tendências", emoji: "📉", def: "Movimento de preço temporário contra a tendência principal. Em uma tendência de alta, a correção é uma queda temporária (pullback). Não confundir com reversão, que é permanente." },
  { term: "Cumulative Delta", cat: "Order Flow", emoji: "➕", def: "Soma acumulada de todos os deltas durante a sessão. Mostra quem foi mais agressivo no total do dia. Divergência entre Cumulative Delta e preço é um dos sinais mais poderosos do Order Flow." },
  // D
  { term: "Day Trade", cat: "Fundamentos", emoji: "📅", def: "Modalidade de operação onde todas as posições são abertas e fechadas no mesmo dia. Não há posição mantida overnight (de um dia para o outro). Exige agilidade, gestão de risco rigorosa e foco total." },
  { term: "Death Cross", cat: "Médias Móveis", emoji: "💀", def: "Cruzamento bearish: a média móvel de período curto (rápida) cruza de cima para baixo a de período longo (lenta). Ex: EMA 9 cruza abaixo da EMA 20. Sinal de enfraquecimento do momentum de alta." },
  { term: "Delta", cat: "Order Flow", emoji: "Δ", def: "Diferença entre o volume de compras agressivas e vendas agressivas em um período. Delta positivo = compradores dominaram; negativo = vendedores dominaram. Ferramenta core do Order Flow." },
  { term: "Desconto (Discount)", cat: "SMC", emoji: "💲", def: "No SMC, é quando o preço está abaixo de 50% do range do último swing — considerado 'barato'. Zona preferida para entradas de compra pelo Smart Money, pois oferece melhor preço médio." },
  { term: "Divergência", cat: "Indicadores", emoji: "↔️", def: "Ocorre quando o preço e um indicador (RSI, MACD) seguem direções opostas. Bearish divergence: preço faz nova máxima mas indicador não confirma = fraqueza. Bullish divergence: o inverso." },
  { term: "Doji", cat: "Candlestick", emoji: "➕", def: "Padrão de candlestick onde abertura e fechamento são quase iguais, formando corpo minúsculo. Indica indecisão entre compradores e vendedores. Mais relevante quando aparece em zonas de suporte/resistência." },
  { term: "Drawdown", cat: "Gestão de Risco", emoji: "📉", def: "Queda percentual do capital desde um pico até um fundo. Ex: conta de R$ 10.000 vai a R$ 8.000 = drawdown de 20%. Essencial monitorar: uma perda de 50% exige 100% de retorno para se recuperar." },
  // E
  { term: "Edge (Vantagem)", cat: "Fundamentos", emoji: "⚔️", def: "Qualquer característica da estratégia que matematicamente resulta em expectativa positiva ao longo de muitas operações. Sem edge, o trading é puro jogo. Com edge, é um negócio." },
  { term: "EMA", cat: "Médias Móveis", emoji: "〰️", def: "Exponential Moving Average (Média Móvel Exponencial). Dá mais peso aos preços recentes, reagindo mais rápido que a SMA. A mais utilizada no day trade. Configurações clássicas: 9, 20, 50." },
  { term: "Engolfo de Alta", cat: "Candlestick", emoji: "🟢", def: "Padrão de reversão bullish formado por 2 candles: um de baixa seguido de um de alta que engloba completamente o corpo do anterior. Mais forte com volume alto no segundo candle." },
  { term: "Engolfo de Baixa", cat: "Candlestick", emoji: "🔴", def: "Padrão de reversão bearish: candle de alta seguido de candle de baixa que engloba completamente o corpo do anterior. Sinal de que vendedores assumiram o controle — especialmente em resistências." },
  { term: "Entrada", cat: "Operações", emoji: "🚪", def: "O momento e o preço em que uma posição é aberta. Uma boa entrada maximiza o RR e minimiza o risco, entrando próximo ao stop loss e longe do alvo. Setup define o critério de entrada." },
  { term: "Estocástico", cat: "Indicadores", emoji: "📊", def: "Oscilador que mede onde o preço fechou em relação ao range dos últimos N períodos. Escala de 0 a 100. Acima de 80 = sobrecomprado; abaixo de 20 = sobrevendido. Funciona melhor em mercados laterais." },
  { term: "Exchange", cat: "Fundamentos", emoji: "🏦", def: "Bolsa de valores ou plataforma onde os ativos são negociados. No Brasil: B3. Para criptomoedas: Binance, Bybit, OKX. Para futuros de cripto: Binance Futures, Bybit Derivatives." },
  { term: "Expectativa Matemática", cat: "Gestão de Risco", emoji: "🧮", def: "Cálculo que determina se uma estratégia é lucrativa a longo prazo. Fórmula: (% acerto × ganho médio) − (% erro × perda média). Positivo = estratégia viável. Negativo = perde dinheiro inevitavelmente." },
  { term: "Extensão de Fibonacci", cat: "Fibonacci", emoji: "📏", def: "Ferramenta que projeta para onde o preço pode ir APÓS retomar o movimento principal. Principais níveis: 127,2%, 161,8%, 261,8%. Usados como alvos de lucro após retrações." },
  // F
  { term: "Fair Value Gap (FVG)", cat: "SMC", emoji: "🌀", def: "Lacuna no gráfico criada por movimento tão rápido que não houve negociação equilibrada em todos os níveis. O mercado frequentemente retorna para preencher o FVG. Identificado por 3 candles onde o 1° e 3° não se sobrepõem." },
  { term: "Fakeout", cat: "Price Action", emoji: "🎭", def: "Falso rompimento: o preço ultrapassa brevemente um nível de suporte/resistência e rapidamente retorna. Geralmente acompanhado de volume baixo. É uma armadilha para quem entra no breakout." },
  { term: "Fibonacci", cat: "Fibonacci", emoji: "🌀", def: "Sequência matemática (0,1,1,2,3,5,8,13...) cujos números, ao serem divididos, geram ratios usados em análise técnica: 23,6%, 38,2%, 50%, 61,8%, 78,6%. Baseada na Proporção Áurea (1,618)." },
  { term: "FOMO", cat: "Psicologia", emoji: "😰", def: "Fear of Missing Out — Medo de Ficar de Fora. Estado emocional que leva o trader a entrar em operações fora do setup por medo de perder um movimento. Causa entradas no topo e perdas evitáveis." },
  { term: "Footprint Chart", cat: "Order Flow", emoji: "🔬", def: "Gráfico que mostra o volume negociado em cada nível de preço dentro de cada candle, separado entre compras e vendas agressivas. Permite identificar imbalances, delta e interesse institucional por nível." },
  { term: "Futuros", cat: "Fundamentos", emoji: "📜", def: "Contratos padronizados negociados em bolsa para compra/venda de um ativo no futuro. Permitem alavancagem e operações de venda a descoberto (short). Os mais operados no Brasil: WIN e WDO." },
  // G
  { term: "Gestão de Risco", cat: "Gestão de Risco", emoji: "🛡️", def: "Conjunto de técnicas para proteger o capital de perdas catastróficas. Inclui: risco por operação (1-2%), relação RR mínima (1:2), stop loss obrigatório, drawdown máximo e position sizing adequado." },
  { term: "Golden Cross", cat: "Médias Móveis", emoji: "✨", def: "Cruzamento bullish: a média móvel de período curto (rápida) cruza de baixo para cima a de período longo (lenta). Ex: EMA 9 cruza acima da EMA 20. Sinal de fortalecimento do momentum de alta." },
  // H
  { term: "Higher High (HH)", cat: "Estrutura", emoji: "⬆️", def: "Topo mais alto que o anterior. Em tendência de alta, cada topo deve ser mais alto que o precedente. A sequência de HH e HL (Higher Low) define estrutura bullish. Quebra dessa sequência = possível reversão." },
  { term: "Higher Low (HL)", cat: "Estrutura", emoji: "↗️", def: "Fundo mais alto que o anterior. Em tendência de alta, cada correção deve parar acima da correção anterior. Junto com o HH, confirma a estrutura de alta. Perda de um HL = alerta de reversão." },
  { term: "Histograma (MACD)", cat: "Indicadores", emoji: "📊", def: "Barras que representam a diferença entre a linha MACD e a linha Signal. Barras crescendo acima do zero = momentum de alta aumentando; barras abaixo do zero = momentum de baixa." },
  // I
  { term: "Iceberg Order", cat: "Order Flow", emoji: "🧊", def: "Ordem gigante dividida em muitas pequenas partes para não revelar o tamanho real no book. Identificada no tape como lotes repetidos no mesmo preço que 'nunca acabam'. Sinal de interesse institucional num nível específico." },
  { term: "Imbalance", cat: "Order Flow", emoji: "⚖️", def: "Desequilíbrio no Footprint Chart onde um lado (compra ou venda) supera o outro em 3x ou mais num nível de preço. Clusters de imbalances indicam forte pressão direcional e possível continuação do movimento." },
  { term: "Indicador Técnico", cat: "Indicadores", emoji: "📊", def: "Ferramenta matemática calculada a partir do histórico de preço e/ou volume para auxiliar na tomada de decisão. São sempre derivados do preço (lagging). Exemplos: RSI, MACD, Bollinger, Estocástico." },
  { term: "Inducement", cat: "SMC", emoji: "🎣", def: "Movimento falso criado pelo Smart Money para atrair o varejo para o lado errado antes do movimento real. Ex: SM empurra o preço para baixo (induzindo vendas), coleta os stops dos comprados e então dispara para cima." },
  { term: "Inside Bar", cat: "Price Action", emoji: "📦", def: "Candle cujo range completo (máxima e mínima) está dentro do range do candle anterior. Indica compressão de preço e acumulação de energia. O rompimento (para cima ou baixo) sinaliza a próxima direção." },
  // L
  { term: "Lag (Defasagem)", cat: "Indicadores", emoji: "⏱️", def: "Atraso dos indicadores técnicos em relação ao preço. Como calculam dados passados, sempre reagem depois que o movimento já começou. Quanto maior o período do indicador, maior o lag." },
  { term: "Limit Order", cat: "Operações", emoji: "📋", def: "Ordem que executa apenas em um preço específico ou melhor. Ordens limit ficam no book aguardando o preço chegar até elas (passiva). Garantem o preço de execução, mas não garantem que serão executadas." },
  { term: "Liquidez", cat: "Order Flow", emoji: "💧", def: "No contexto do SMC: as ordens de stop loss dos traders que aguardam serem acionadas. Stops acima de topos = liquidez de vendedores. Stops abaixo de fundos = liquidez de compradores. O SM vai 'buscar' essa liquidez." },
  { term: "Liquidity Sweep", cat: "SMC", emoji: "🌊", def: "Quando o preço vai rapidamente além de um nível de liquidez (topo/fundo anterior), aciona os stops do varejo e imediatamente reverte. O SM coletou a liquidez que precisava para mover o mercado na direção real." },
  { term: "Long", cat: "Operações", emoji: "📈", def: "Posição comprada — você lucra se o preço subir. Você compra o ativo esperando vendê-lo a um preço mais alto. No mercado de futuros, pode abrir uma posição long sem ter o ativo previamente." },
  { term: "Lower High (LH)", cat: "Estrutura", emoji: "↘️", def: "Topo mais baixo que o anterior. Em tendência de baixa, cada rally (recuperação) deve parar abaixo do rally anterior. Junto com o LL, confirma a estrutura de baixa." },
  { term: "Lower Low (LL)", cat: "Estrutura", emoji: "⬇️", def: "Fundo mais baixo que o anterior. Em tendência de baixa, cada queda atinge níveis mais baixos que a anterior. A sequência de LL e LH define estrutura bearish." },
  // M
  { term: "MACD", cat: "Indicadores", emoji: "📊", def: "Moving Average Convergence Divergence. Combina EMAs (12 e 26) para medir tendência e momentum simultaneamente. Composto por linha MACD, linha Signal (EMA 9 do MACD) e Histograma." },
  { term: "Mão Forte", cat: "Volume", emoji: "🏦", def: "Termo para os grandes players institucionais: fundos, bancos, hedge funds, market makers. Operam com capital, tecnologia e informação superiores ao varejo. Suas 'pegadas' podem ser identificadas no volume e no Order Flow." },
  { term: "Margem", cat: "Fundamentos", emoji: "💳", def: "Valor depositado na corretora como garantia para operar contratos futuros. Com margem de R$ 1.000 e alavancagem de 10x, você controla R$ 10.000. Se a posição vai contra você, pode receber margin call." },
  { term: "Margin Call", cat: "Fundamentos", emoji: "🚨", def: "Chamada de margem — quando a perda na posição consome a margem depositada e a corretora exige mais dinheiro ou fecha a posição automaticamente. Resultado de operar sem gestão de risco adequada." },
  { term: "Market Order", cat: "Operações", emoji: "⚡", def: "Ordem a mercado — executa imediatamente ao melhor preço disponível. Agressiva por natureza (toma liquidez do book). Garante a execução mas não garante o preço exato — especialmente em ativos pouco líquidos." },
  { term: "Marubozu", cat: "Candlestick", emoji: "🔲", def: "Candlestick sem sombras (ou com sombras mínimas). Indica domínio total de um lado: Marubozu de Alta = abriu na mínima, fechou na máxima; Marubozu de Baixa = o contrário. Sinal de força máxima." },
  { term: "Martelo", cat: "Candlestick", emoji: "🔨", def: "Padrão de reversão bullish: corpo pequeno no topo + sombra inferior longa (2x ou mais o corpo). Aparece após tendência de baixa e indica que vendedores tentaram pressionar mas compradores reagiram com força." },
  { term: "Mini Contratos", cat: "Fundamentos", emoji: "📦", def: "Versão reduzida dos contratos futuros, com menor custo de margem. No Brasil: WIN (Mini Índice Bovespa) e WDO (Mini Dólar). Acessíveis ao trader de varejo com capital menor." },
  { term: "Momentum", cat: "Indicadores", emoji: "⚡", def: "A velocidade e força de um movimento de preço. Momentum alto = tendência acelerando. Momentum baixo = tendência perdendo força. Divergências de momentum (indicador vs preço) antecedem reversões." },
  { term: "Múltiplos Timeframes (MTF)", cat: "Análise", emoji: "🌐", def: "Técnica de análise que observa o mesmo ativo em diferentes escalas de tempo. Princípio top-down: analisa do maior para o menor. O timeframe maior define o contexto e sempre domina os menores." },
  // O
  { term: "OBV", cat: "Volume", emoji: "📊", def: "On-Balance Volume. Indicador que acumula volume positivo nos dias de alta e subtrai nos dias de baixa. Divergência entre OBV e preço antecipa reversões: OBV subindo + preço caindo = bullish divergence." },
  { term: "Order Block (OB)", cat: "SMC", emoji: "🧱", def: "Zona onde o Smart Money executou grandes ordens. Bullish OB = último candle de baixa antes de expansão de alta forte. Quando o preço retorna ao OB, as mesmas ordens institucionais tendem a estar presentes." },
  { term: "Order Flow", cat: "Order Flow", emoji: "🔬", def: "Estudo do fluxo real de ordens que movem o mercado. Trabalha com a causa do movimento (ordens individuais) em vez do efeito (preço). O nível mais profundo de análise técnica disponível." },
  { term: "Oscilador", cat: "Indicadores", emoji: "〰️", def: "Indicador que oscila entre valores extremos (geralmente 0-100 ou +/-100). Exemplos: RSI, Estocástico. Usados para identificar condições de sobrecompra/sobrevenda e divergências com o preço." },
  { term: "Outside Bar", cat: "Price Action", emoji: "📊", def: "Candle cujo range (máxima e mínima) engloba completamente o range do candle anterior. Se fecha perto da máxima = bullish; perto da mínima = bearish. Indica tomada de controle decisiva por um lado." },
  // P
  { term: "Padrão Gráfico", cat: "Análise", emoji: "📐", def: "Formação recorrente no gráfico de preços com implicações direcionais conhecidas. Exemplos: Cabeça e Ombros (reversão de alta), Triângulo Ascendente (continuação de alta), Fundo Duplo (reversão de baixa)." },
  { term: "Pin Bar", cat: "Price Action", emoji: "📍", def: "Padrão de reversão com corpo pequeno e sombra muito longa em um lado (pelo menos 2/3 do candle total). A sombra longa = rejeição forte. É o padrão de reversão mais confiável no Price Action." },
  { term: "Pivot", cat: "Estrutura", emoji: "🔄", def: "Nível de preço calculado a partir do dia anterior (máxima, mínima, fechamento) que funciona como referência para suporte e resistência no dia seguinte. Muito utilizado por day traders como guia de operação." },
  { term: "Position Sizing", cat: "Gestão de Risco", emoji: "📐", def: "Cálculo do número exato de contratos ou ações a operar baseado no capital, percentual de risco e distância do stop. Fórmula: Nº contratos = Valor em risco ÷ (Stop em pontos × Valor por ponto)." },
  { term: "Premium", cat: "SMC", emoji: "💎", def: "No SMC, é quando o preço está acima de 50% do range do último swing — considerado 'caro'. Zona preferida pelo Smart Money para distribuir (vender) posições, pois consegue o melhor preço médio." },
  { term: "Price Action", cat: "Price Action", emoji: "📉", def: "Metodologia de análise e operação baseada exclusivamente no movimento do preço, sem indicadores derivados. Usa estrutura de mercado, candlesticks, suporte/resistência e padrões de topos/fundos." },
  { term: "Proporção Áurea", cat: "Fibonacci", emoji: "🌿", def: "O número Phi (φ = 1,618...). Aparece em toda a natureza e é base do Fibonacci no trading. O nível de 61,8% de retração (1 ÷ 1,618) é o mais importante e chamado de 'Zona de Ouro'." },
  { term: "Pullback", cat: "Price Action", emoji: "🔙", def: "Recuo temporário contra a tendência principal. Em uma tendência de alta, é uma queda temporária antes de continuar subindo. Oportunidade de entrada: comprar o pullback em zona de suporte." },
  // R
  { term: "Range", cat: "Estrutura", emoji: "↔️", def: "Mercado sem tendência definida, oscilando entre suporte e resistência horizontais. Também chamado de mercado lateral ou consolidação. Estratégia: comprar na base e vender no topo do range." },
  { term: "Resistência", cat: "Suporte e Resistência", emoji: "🔴", def: "Zona de preço onde a oferta (vendedores) foi historicamente forte o suficiente para impedir altas. O preço tentou superar o nível e foi rejeitado. Quando o preço retorna, novos vendedores tendem a aparecer." },
  { term: "Retração de Fibonacci", cat: "Fibonacci", emoji: "🌀", def: "Níveis de preço (23,6%, 38,2%, 50%, 61,8%, 78,6%) onde um movimento provavelmente encontrará suporte ou resistência antes de continuar. Usados para encontrar entradas em pullbacks de tendência." },
  { term: "Revenge Trading", cat: "Psicologia", emoji: "😤", def: "Tentar recuperar perdas rapidamente aumentando o tamanho das posições após uma sequência de perdas. É um dos comportamentos mais destrutivos no trading — a urgência elimina a objetividade e transforma sequências gerenciáveis em catástrofes." },
  { term: "Risco/Retorno (RR)", cat: "Gestão de Risco", emoji: "⚖️", def: "Relação entre o risco assumido e o ganho potencial em uma operação. RR 1:2 significa arriscar R$ 1 para ganhar R$ 2. O RR mínimo recomendado é 1:2, pois permite ser lucrativo com apenas 34% de acerto." },
  { term: "Rompimento", cat: "Price Action", emoji: "💥", def: "Quando o preço supera um nível de suporte ou resistência. Para ser válido: volume 2x acima da média, candle fechando claramente além do nível, sem retorno imediato. Sem volume = provável Fakeout." },
  { term: "RSI", cat: "Indicadores", emoji: "📊", def: "Relative Strength Index. Oscilador (0-100) que mede a velocidade e magnitude das mudanças de preço. Acima de 70 = sobrecomprado; abaixo de 30 = sobrevendido. Também usado para detectar divergências." },
  // S
  { term: "Scalping", cat: "Fundamentos", emoji: "⚡", def: "Estilo de trading de curtíssimo prazo: operações duram segundos a poucos minutos. Busca ganhos pequenos mas frequentes. Exige plataforma rápida, spreads baixos e alta concentração do trader." },
  { term: "Setup", cat: "Operações", emoji: "🎯", def: "Conjunto de critérios que definem uma oportunidade de operação válida: padrão de preço, zona relevante, confirmação de volume e alinhamento com tendência. Um bom setup tem critérios claros e objetivos." },
  { term: "Short", cat: "Operações", emoji: "📉", def: "Posição vendida a descoberto — você lucra se o preço cair. Você vende o ativo (que não possui) esperando recomprá-lo mais barato. No mercado de futuros, é tão simples quanto abrir um Long." },
  { term: "SMA", cat: "Médias Móveis", emoji: "〰️", def: "Simple Moving Average (Média Móvel Simples). Calcula a média aritmética dos últimos N fechamentos, dando peso igual a todos os períodos. Mais estável que a EMA, mas reage mais lentamente ao preço." },
  { term: "Smart Money", cat: "SMC", emoji: "💰", def: "Capital controlado por grandes players institucionais: bancos, hedge funds, market makers, fundos soberanos. Têm acesso superior a informação, tecnologia e capital. Operam em fases: acumulação → markup → distribuição → markdown." },
  { term: "Smart Money Concepts (SMC)", cat: "SMC", emoji: "🏛️", def: "Metodologia que analisa o mercado pela perspectiva das instituições. Conceitos principais: Order Blocks, Fair Value Gaps, Liquidity Sweeps, Inducement, Premium/Discount. Foca em identificar e seguir as 'pegadas' do Smart Money." },
  { term: "Sobrecomprado", cat: "Indicadores", emoji: "🔴", def: "Condição onde um ativo subiu rápido demais em pouco tempo. Indicada por RSI > 70 ou Estocástico > 80. Não é sinal automático de venda — em tendências fortes, o mercado pode permanecer sobrecomprado por longos períodos." },
  { term: "Sobrevendido", cat: "Indicadores", emoji: "🟢", def: "Condição onde um ativo caiu rápido demais em pouco tempo. Indicada por RSI < 30 ou Estocástico < 20. Não é sinal automático de compra — em tendências de baixa, o mercado pode permanecer sobrevendido por longos períodos." },
  { term: "Spinning Top", cat: "Candlestick", emoji: "🌀", def: "Candlestick com corpo pequeno e sombras longas em ambos os lados. Indica equilíbrio temporário — uma pausa na tendência, não uma reversão. Em tendência clara, é sinal de continuação após a consolidação." },
  { term: "Spike de Volume", cat: "Volume", emoji: "📊", def: "Volume muito acima da média (5-10x ou mais) em um candle. Pode indicar: clímax de compra ou venda (exaustão), entrada de instituição, notícia importante ou stop hunt. Sempre merece atenção." },
  { term: "Spread", cat: "Fundamentos", emoji: "↔️", def: "Diferença entre o preço de compra (Ask) e o preço de venda (Bid). É um custo de transação: ao entrar a mercado, você já começa ligeiramente no negativo. Spreads menores = menor custo de operação." },
  { term: "Stop Hunt", cat: "SMC", emoji: "🎯", def: "Quando grandes players empurram o preço brevemente além de um nível óbvio (onde stops do varejo estão concentrados), acionam essas ordens (coletando liquidez) e então revertem violentamente na direção oposta." },
  { term: "Stop Loss", cat: "Gestão de Risco", emoji: "🛑", def: "Ordem automática que fecha sua posição com uma perda limitada caso o preço atinja um nível que invalida sua análise. OBRIGATÓRIO em 100% das operações. Deve ser definido ANTES de entrar no trade." },
  { term: "Suporte", cat: "Suporte e Resistência", emoji: "🟢", def: "Zona de preço onde a demanda (compradores) foi historicamente forte o suficiente para impedir quedas. Quando o preço retorna, novos compradores tendem a aparecer. Quanto mais testado sem romper, mais forte." },
  { term: "Swing High", cat: "Estrutura", emoji: "⬆️", def: "Topo local — um candle (ou grupo) que tem máxima maior que os candles imediatamente à sua esquerda e direita. Usado como referência para traçar Fibonacci, identificar resistências e analisar estrutura de mercado." },
  { term: "Swing Low", cat: "Estrutura", emoji: "⬇️", def: "Fundo local — um candle (ou grupo) que tem mínima menor que os candles à esquerda e direita. Usado para traçar Fibonacci, identificar suportes e analisar estrutura de mercado." },
  // T
  { term: "Tape Reading", cat: "Order Flow", emoji: "📜", def: "Análise em tempo real do Time & Sales — registro de cada transação individual executada no mercado. Traders de tape reading leem velocidade, tamanho e direção das transações para antecipar movimentos iminentes." },
  { term: "Taxa de Acerto", cat: "Gestão de Risco", emoji: "🎯", def: "Percentual de operações vencedoras sobre o total. Uma taxa de acerto alta NÃO garante lucro — o que importa é a combinação de taxa de acerto com o RR. Com RR de 1:2, 34% de acerto já é lucrativo." },
  { term: "Tendência", cat: "Tendências", emoji: "📈", def: "Direção predominante do mercado ao longo do tempo. Três tipos: tendência de alta (HH e HL), tendência de baixa (LH e LL) e lateral (sem progressão de topos/fundos). 'A tendência é sua amiga.'" },
  { term: "Timeframe", cat: "Análise", emoji: "⏱️", def: "Período de tempo de cada candlestick no gráfico. Ex: no gráfico de 5 minutos, cada candle representa 5 minutos de negociação. Diferentes timeframes mostram diferentes perspectivas do mesmo movimento." },
  { term: "Time & Sales", cat: "Order Flow", emoji: "📋", def: "Registro cronológico de todas as transações executadas: horário, preço, volume e direção (bid ou ask). É a 'fita' usada no Tape Reading. Para ativos líquidos como WIN, pode ter centenas de transações por segundo." },
  { term: "Trailing Stop", cat: "Gestão de Risco", emoji: "🔄", def: "Stop loss móvel que acompanha o preço na direção favorável, travando lucros progressivamente. Ex: stop em 100 pontos abaixo do preço atual. Quando o preço sobe, o stop sobe junto. Se o preço cai, o stop fica fixo." },
  { term: "Troca de Polaridade", cat: "Suporte e Resistência", emoji: "🔄", def: "Quando um suporte rompido se torna resistência (e vice-versa). Fenômeno baseado na psicologia do mercado: traders presos em posições perdedoras usam o retorno ao nível para sair, criando pressão na direção oposta." },
  // V
  { term: "Viés Cognitivo", cat: "Psicologia", emoji: "🧠", def: "Distorção sistemática no pensamento que leva a erros de julgamento. No trading: confirmação (buscar só o que confirma), ancoragem (preço de compra como referência), aversão à perda (medo assimétrico de perder)." },
  { term: "Volume", cat: "Volume", emoji: "📊", def: "Número de contratos ou ações negociados em um período. É o dado mais honesto do mercado — não pode ser manipulado. Confirma tendências (alta + volume crescente = saudável) e valida rompimentos." },
  { term: "Volume Spread Analysis (VSA)", cat: "Volume", emoji: "🔬", def: "Metodologia que analisa a relação entre volume e o spread (range) de cada candle para identificar ação dos grandes players. Conceitos: No Demand (alta com volume baixo), No Supply (baixa com volume baixo), Climax." },
  { term: "VWAP", cat: "Volume", emoji: "📊", def: "Volume Weighted Average Price — Preço Médio Ponderado por Volume. Referência institucional do dia. Acima do VWAP = compradores do dia no lucro (viés de alta). Abaixo = compradores no prejuízo (viés de baixa). Reseta a cada sessão." },
  // W
  { term: "WDO (Mini Dólar)", cat: "Fundamentos", emoji: "💵", def: "Contrato futuro de Mini Dólar negociado na B3. Cada ponto vale R$ 10. Um dos ativos mais operados no day trade brasileiro. Acompanha a variação do dólar americano em relação ao real." },
  { term: "Whipsaw", cat: "Indicadores", emoji: "📉", def: "Sinal falso seguido de reversão rápida. Comum com indicadores de médias móveis em mercados laterais. A média indica alta → você compra → mercado cai → stop atingido. Solução: use filtros de tendência como ADX." },
  { term: "WIN (Mini Índice)", cat: "Fundamentos", emoji: "📈", def: "Contrato futuro de Mini Índice Bovespa negociado na B3. Cada ponto vale R$ 0,20. O mais popular para day trade no Brasil. Acompanha a variação do Ibovespa." },
  // Z
  { term: "Zona de Ouro (Fibonacci)", cat: "Fibonacci", emoji: "✨", def: "Intervalo entre 61,8% e 78,6% de retração de Fibonacci. É a região de maior probabilidade para reversão e entrada em pullbacks. O preço recuou o suficiente para 'limpar' stops fracos mas manteve a estrutura da tendência." },
];

const GLOSSARY_CATEGORIES = [...new Set(GLOSSARY.map(g => g.cat))].sort();

function GlossaryTab() {
  const [search, setSearch] = useState("");
  const [activeCategory, setActiveCategory] = useState("Todos");
  const [expanded, setExpanded] = useState(null);

  const filtered = GLOSSARY.filter(g => {
    const matchSearch = search === "" ||
      g.term.toLowerCase().includes(search.toLowerCase()) ||
      g.def.toLowerCase().includes(search.toLowerCase());
    const matchCat = activeCategory === "Todos" || g.cat === activeCategory;
    return matchSearch && matchCat;
  });

  // Group by first letter
  const grouped = filtered.reduce((acc, g) => {
    const letter = g.term[0].toUpperCase();
    if (!acc[letter]) acc[letter] = [];
    acc[letter].push(g);
    return acc;
  }, {});

  const letters = Object.keys(grouped).sort();
  const catColors = {
    "Gestão de Risco": "#00ff88", "Indicadores": "#00d4ff", "Fundamentos": "#f59e0b",
    "Price Action": "#7c3aed", "SMC": "#ef4444", "Order Flow": "#ec4899",
    "Volume": "#06b6d4", "Psicologia": "#a78bfa", "Fibonacci": "#fbbf24",
    "Tendências": "#34d399", "Médias Móveis": "#60a5fa", "Estrutura": "#fb923c",
    "Análise": "#e879f9", "Suporte e Resistência": "#4ade80",
    "Candlestick": "#fca5a5", "Operações": "#93c5fd", "Gráficos": "#86efac",
  };

  return (
    <div style={{paddingBottom:20}}>
      {/* Header */}
      <div style={{padding:"16px 16px 0"}}>
        <div style={{fontFamily:"Orbitron",fontSize:16,color:"#fff",marginBottom:2}}>Glossário</div>
        <div style={{fontSize:13,color:"#888",marginBottom:14}}>{GLOSSARY.length} termos do trading explicados</div>

        {/* Search */}
        <div style={{position:"relative",marginBottom:12}}>
          <Search size={16} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#555"}}/>
          <input
            value={search} onChange={e => setSearch(e.target.value)}
            placeholder="Buscar termo..."
            style={{width:"100%",background:"#111118",border:"1px solid #00d4ff22",borderRadius:10,
              padding:"10px 12px 10px 36px",color:"#fff",fontFamily:"Rajdhani",fontSize:15,outline:"none"}}
          />
          {search && (
            <button onClick={() => setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
              background:"none",border:"none",cursor:"pointer",color:"#555"}}>
              <X size={14}/>
            </button>
          )}
        </div>

        {/* Category filter */}
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:4,
          scrollbarWidth:"none",msOverflowStyle:"none"}}>
          {["Todos",...GLOSSARY_CATEGORIES].map(cat => (
            <button key={cat} onClick={() => setActiveCategory(cat)} style={{
              flexShrink:0,padding:"6px 12px",borderRadius:20,border:"none",cursor:"pointer",
              background:activeCategory===cat?"#00d4ff22":"#111118",
              color:activeCategory===cat?"#00d4ff":"#666",
              fontFamily:"Rajdhani",fontSize:12,fontWeight:600,letterSpacing:0.5,
              borderBottom:activeCategory===cat?"2px solid #00d4ff":"2px solid transparent",
              transition:"all 0.2s"}}>
              {cat}
            </button>
          ))}
        </div>

        {filtered.length === 0 && (
          <div style={{textAlign:"center",padding:40,color:"#555",fontSize:14}}>
            Nenhum termo encontrado para "{search}"
          </div>
        )}
      </div>

      {/* Terms grouped by letter */}
      <div style={{padding:"0 16px"}}>
        {letters.map(letter => (
          <div key={letter}>
            <div style={{fontFamily:"Orbitron",fontSize:13,color:"#00d4ff44",
              marginTop:16,marginBottom:6,letterSpacing:2,paddingLeft:2}}>
              — {letter} —
            </div>
            {grouped[letter].map((g, idx) => {
              const isOpen = expanded === `${letter}_${idx}`;
              const catColor = catColors[g.cat] || "#888";
              return (
                <div key={idx}
                  onClick={() => setExpanded(isOpen ? null : `${letter}_${idx}`)}
                  className={isOpen ? "fade-in" : ""}
                  style={{marginBottom:6,borderRadius:10,overflow:"hidden",cursor:"pointer",
                    border:`1px solid ${isOpen ? catColor+"44" : "#1a1a2e"}`,
                    background:isOpen?"#111118":"#0d0d15",
                    transition:"border-color 0.2s, background 0.2s"}}>
                  {/* Term header */}
                  <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px"}}>
                    <span style={{fontSize:18,flexShrink:0}}>{g.emoji}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:15,fontWeight:700,color:isOpen?catColor:"#ddd"}}>{g.term}</div>
                      <div style={{fontSize:11,color:catColor+"99",letterSpacing:0.5,marginTop:1}}>{g.cat}</div>
                    </div>
                    <div style={{flexShrink:0,color:isOpen?catColor:"#333",transition:"transform 0.2s",
                      transform:isOpen?"rotate(180deg)":"rotate(0deg)"}}>
                      <ChevronDown size={16}/>
                    </div>
                  </div>
                  {/* Definition */}
                  {isOpen && (
                    <div style={{padding:"0 14px 14px"}}>
                      <div style={{height:1,background:`${catColor}22`,marginBottom:10}}/>
                      <p style={{fontSize:14,color:"#aaa",lineHeight:1.7,margin:0}}>{g.def}</p>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {!search && activeCategory === "Todos" && (
        <div style={{textAlign:"center",padding:"20px 0 0",color:"#333",fontSize:11,fontFamily:"Orbitron",letterSpacing:1}}>
          — FIM DO GLOSSÁRIO —
        </div>
      )}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
export default function App() {
  const [user, setUser] = useState(null);
  const [username, setUsername] = useState("");
  const [userData, setUserData] = useState(null);
  const [activeTab, setActiveTab] = useState("journey");
  const [xpFloats, setXpFloats] = useState([]);
  const [showLevelUp, setShowLevelUp] = useState(null);
  const [confetti, setConfetti] = useState(false);
  const [selectedModule, setSelectedModule] = useState(null);
  const [quizModule, setQuizModule] = useState(null);
  const prevLevel = useRef(null);

  function handleLogin(uname, data) {
    setUsername(uname); setUserData(data); setUser(true);
    prevLevel.current = getLevelInfo(data.xp).level;
  }

  function addXp(amount) {
    setUserData(prev => {
      const newXp = prev.xp + amount;
      const nd = { ...prev, xp: newXp };
      saveUser(username, nd);
      const nl = getLevelInfo(newXp);
      if (nl.level > (prevLevel.current || 1)) {
        prevLevel.current = nl.level;
        setTimeout(() => { setShowLevelUp(nl); setConfetti(true); setTimeout(() => setConfetti(false), 3000); }, 300);
      }
      return nd;
    });
    const id = Date.now() + Math.random();
    setXpFloats(f => [...f, { id, amount }]);
  }

  function markReading(moduleId, readingIdx) {
    setUserData(prev => {
      const key = `${moduleId}_${readingIdx}`;
      if (prev.completedReadings[key]) return prev;
      const updated = { ...prev, completedReadings: { ...prev.completedReadings, [key]: true } };
      const mod = MODULES.find(m => m.id === moduleId);
      const keys = Array.from({length:10},(_,i)=>i).filter(i=>READING_CONTENT[`${moduleId}_${i}`]);
      const allDone = keys.every(i => updated.completedReadings[`${moduleId}_${i}`]);
      if (allDone && !prev.completedModules.includes(moduleId)) {
        updated.completedModules = [...prev.completedModules, moduleId];
        setConfetti(true); setTimeout(() => setConfetti(false), 3000);
        const newAch = [...(updated.achievements||[])];
        if (moduleId===1 && !newAch.includes("first_trade")) newAch.push("first_trade");
        if (moduleId===1 && !newAch.includes("risk_master")) newAch.push("risk_master");
        if (moduleId===2 && !newAch.includes("candle_reader")) newAch.push("candle_reader");
        if (moduleId===5 && !newAch.includes("fibonacci_student")) newAch.push("fibonacci_student");
        if (moduleId===11 && !newAch.includes("smart_money")) newAch.push("smart_money");
        if (updated.completedModules.length===MODULES.length && !newAch.includes("all_modules")) newAch.push("all_modules");
        updated.achievements = newAch;
      }
      saveUser(username, updated);
      return updated;
    });
    addXp(50);
  }

  function markLink(moduleId, linkIdx) {
    setUserData(prev => {
      const key = `${moduleId}_lnk_${linkIdx}`;
      if (prev.visitedLinks[key]) return prev;
      const updated = { ...prev, visitedLinks: { ...prev.visitedLinks, [key]: true } };
      saveUser(username, updated);
      return updated;
    });
    addXp(30);
  }

  function logout() { setUser(null); setUserData(null); setUsername(""); setSelectedModule(null); setQuizModule(null); }

  if (!user) return <AuthScreen onLogin={handleLogin}/>;

  const lvl = getLevelInfo(userData.xp);
  const xpPct = getXpProgress(userData.xp);
  const nextLvl = LEVELS.find(l => l.level === lvl.level+1);

  return (
    <div className="hex-bg" style={{minHeight:"100vh",maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column",background:"#0a0a0f"}}>
      <Confetti active={confetti}/>
      {xpFloats.map(f => <XpFloat key={f.id} amount={f.amount} onDone={() => setXpFloats(x => x.filter(i => i.id !== f.id))}/>)}
      {showLevelUp && <LevelUpScreen level={showLevelUp} onClose={() => setShowLevelUp(null)}/>}

      {quizModule && <QuizScreen module={quizModule} addXp={addXp} onClose={() => setQuizModule(null)}/>}

      {selectedModule && !quizModule && (
        <ModuleDetail module={selectedModule} userData={userData}
          markReading={markReading} markLink={markLink}
          onClose={() => setSelectedModule(null)}
          onQuiz={() => setQuizModule(selectedModule)}/>
      )}

      {!selectedModule && !quizModule && (
        <>
          {/* HEADER */}
          <div style={{background:"#111118",borderBottom:"1px solid #00d4ff22",padding:"12px 16px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:38,height:38,borderRadius:"50%",background:"linear-gradient(135deg,#00d4ff,#7c3aed)",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontFamily:"Orbitron",fontSize:14,fontWeight:700,color:"#fff"}}>
                  {username.slice(0,2).toUpperCase()}
                </div>
                <div>
                  <div style={{fontFamily:"Orbitron",fontSize:12,color:"#00d4ff"}}>{username}</div>
                  <div style={{fontSize:12,color:lvl.color}}>{lvl.icon} {lvl.name}</div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"Orbitron",fontSize:14,color:"#ffd700",fontWeight:700}}>{userData.xp.toLocaleString()} XP</div>
                  <div style={{fontSize:11,color:"#666"}}>Nível {lvl.level}</div>
                </div>
                <button onClick={logout} style={{background:"none",border:"none",cursor:"pointer",color:"#666",padding:4}}>
                  <LogOut size={18}/>
                </button>
              </div>
            </div>
            <div style={{background:"#1a1a2e",borderRadius:4,height:6,overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:4,transition:"width 0.6s ease",width:`${xpPct}%`,
                background:`linear-gradient(90deg,${lvl.color},${nextLvl?.color||lvl.color})`,
                boxShadow:`0 0 8px ${lvl.color}88`}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
              <div style={{fontSize:10,color:"#666"}}>{xpPct}% para nível {lvl.level+1}</div>
              {nextLvl && <div style={{fontSize:10,color:"#666"}}>{nextLvl.xpMin-userData.xp} XP restantes</div>}
            </div>
          </div>

          {/* CONTENT */}
          <div style={{flex:1,overflowY:"auto",paddingBottom:80}}>
            {activeTab==="journey" && <JourneyTab userData={userData} onSelect={setSelectedModule}/>}
            {activeTab==="study" && <StudyTab userData={userData} onSelect={setSelectedModule} onQuiz={setQuizModule}/>}
            {activeTab==="achievements" && <AchievementsTab userData={userData}/>}
            {activeTab==="glossary" && <GlossaryTab/>}
            {activeTab==="profile" && <ProfileTab username={username} userData={userData}/>}
          </div>

          {/* BOTTOM NAV */}
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
            width:"100%",maxWidth:430,background:"#111118",borderTop:"1px solid #00d4ff22",display:"flex",zIndex:100}}>
            {[{id:"journey",icon:Map,label:"Jornada"},{id:"study",icon:BookOpen,label:"Estudar"},
              {id:"achievements",icon:Trophy,label:"Conquistas"},{id:"glossary",icon:BookMarked,label:"Glossário"},{id:"profile",icon:User,label:"Perfil"}].map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
                flex:1,padding:"10px 0 6px",background:"none",border:"none",cursor:"pointer",
                display:"flex",flexDirection:"column",alignItems:"center",gap:2,
                color:activeTab===t.id?"#00d4ff":"#555",
                borderTop:activeTab===t.id?"2px solid #00d4ff":"2px solid transparent"}}>
                <t.icon size={18}/>
                <span style={{fontFamily:"Rajdhani",fontSize:10,letterSpacing:0.5}}>{t.label}</span>
              </button>
            ))}
          </div>
        </>
      )}
    </div>
  );
}


    // ─── Mount ────────────────────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById("root")).render(
      React.createElement(React.StrictMode, null, React.createElement(App))
    );
  </script>
</body>
</html>
