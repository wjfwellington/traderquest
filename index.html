    { q: "Três candles de alta consecutivos com fechamentos crescentes formam:", opts: ["Estrela da Tarde", "Três Soldados Brancos", "Três Corvos Negros", "Engolfo"], c: 1, exp: "Três Soldados Brancos indicam forte momentum bullish — três sessões de alta seguidas com cada fechamento mais alto." },
    { q: "Gravestone Doji tem característica de:", opts: ["Sem sombras", "Sombra superior longa com abertura e fechamento na mínima", "Corpo longo de alta", "Sombra inferior longa"], c: 1, exp: "Gravestone Doji: compradores tentaram subir mas vendedores dominaram, fechando na mínima — possível topo." }
  ],
  3: [
    { q: "O que acontece quando um suporte \xE9 rompido?", opts: ["Desaparece", "Pre\xE7o volta imediatamente", "Pode se tornar resist\xEAncia", "Mercado para"], c: 2, exp: "Troca de polaridade: suporte rompido pode se tornar resist\xEAncia, pois traders presos naquele n\xEDvel tendem a vender." },
    { q: "N\xEDvel psicol\xF3gico refere-se a:", opts: ["Pre\xE7os definidos por institui\xE7\xF5es", "Pre\xE7os que afetam a psicologia", "N\xFAmeros redondos onde o pre\xE7o frequentemente reage", "Pre\xE7os de anos anteriores"], c: 2, exp: "N\xFAmeros redondos como 50.000, 100 s\xE3o psicol\xF3gicos porque compradores e vendedores concentram ordens nesses n\xEDveis." },
    { q: "Suporte din\xE2mico \xE9 formado por:", opts: ["Fibonacci apenas", "Linhas horizontais", "M\xE1ximos anteriores", "M\xE9dias m\xF3veis ou linhas de tend\xEAncia"], c: 3, exp: "Suportes din\xE2micos seguem o pre\xE7o ao longo do tempo, sendo representados por m\xE9dias m\xF3veis ou linhas de tend\xEAncia." },
    { q: "Quanto mais vezes um n\xEDvel \xE9 testado sem rompimento:", opts: ["N\xE3o faz diferen\xE7a", "Mais forte se torna", "Desaparece", "Mais fraco fica"], c: 1, exp: "M\xFAltiplos testes sem rompimento indicam concentra\xE7\xE3o de ordens e fortalecem o n\xEDvel como refer\xEAncia." },
    { q: "Onde N\xC3O se deve colocar o stop?", opts: ["Abaixo de suporte", "Abaixo de m\xEDnima importante", "Al\xE9m da zona de S/R", "Exatamente em n\xFAmero redondo"], c: 3, exp: "Stops em n\xFAmeros redondos s\xE3o alvos \xF3bvios \u2014 traders experientes e algoritmos 'ca\xE7am' esses stops." },
    { q: "O que é 'teste de suporte'?", opts: ["Preço se aproxima do suporte sem romper e reage", "Rompimento confirmado", "Análise fundamentalista", "Indicador RSI"], c: 0, exp: "Teste de suporte confirma a validade do nível — o preço chega, encontra compradores e reverte para cima." },
    { q: "Resistência rompida com volume alto indica:", opts: ["Possível início de tendência de alta com participação institucional", "Zona de stop", "Sinal de venda imediata", "Fraqueza do mercado"], c: 0, exp: "Rompimento com volume alto confirma interesse real dos grandes players — validando a nova direção do movimento." },
    { q: "Zonas de oferta e demanda são:", opts: ["Horários de operação", "Regiões com concentração de ordens compradoras ou vendedoras", "Tipos de ordens no book", "Preços de commodities"], c: 1, exp: "Zonas de oferta/demanda são áreas onde ordens institucionais foram executadas — o preço tende a reagir ao revisitá-las." },
    { q: "Suporte histórico mais antigo tende a ser:", opts: ["Inválido após 1 ano", "Válido apenas no curto prazo", "Menos relevante por ser velho", "Mais relevante — mais traders o reconhecem"], c: 3, exp: "Suportes históricos têm mais memória de mercado — quanto mais traders os reconhecem, maior concentração de ordens no nível." },
    { q: "Após rompimento de resistência, a estratégia clássica é:", opts: ["Ignorar o movimento", "Dobrar posição vendida", "Vender imediatamente", "Aguardar pullback ao nível rompido para comprar"], c: 3, exp: "Resistência rompida vira suporte. Pullback ao nível rompido oferece entrada com risco menor e melhor relação risco/retorno." }
  ],
  4: [
    { q: "Qual m\xE9dia reage mais r\xE1pido ao pre\xE7o?", opts: ["EMA 9", "SMA 200", "SMA 20", "SMA 50"], c: 0, exp: "A EMA d\xE1 mais peso aos pre\xE7os recentes, sendo a EMA 9 a de per\xEDodo mais curto e portanto a mais reativa." },
    { q: "Golden Cross \xE9 quando:", opts: ["M\xE9dia lenta cruza a r\xE1pida", "SMA 200 rompe suporte", "RSI cruza 50", "M\xE9dia r\xE1pida cruza de baixo para cima a m\xE9dia lenta"], c: 3, exp: "Golden Cross: m\xE9dia r\xE1pida cruza de baixo para cima a m\xE9dia lenta, indicando momentum bullish." },
    { q: "Em tend\xEAncia de alta, a EMA 20 funciona como:", opts: ["Sinal de venda", "Irrelevante", "Resist\xEAncia", "Suporte din\xE2mico"], c: 3, exp: "Em tend\xEAncia de alta, a EMA 20 atua como suporte din\xE2mico \u2014 o pre\xE7o recua e encontra compradores nessa zona." },
    { q: "O principal problema das m\xE9dias m\xF3veis \xE9:", opts: ["Funcionam apenas em cripto", "S\xE3o complexas", "Lag (defasagem) \u2014 mostram o passado", "S\xE3o caras"], c: 2, exp: "M\xE9dias s\xE3o indicadores lagging \u2014 reagem depois que o movimento j\xE1 ocorreu, sempre com algum atraso." },
    { q: "M\xE9dias m\xF3veis s\xE3o mais perigosas em:", opts: ["Abertura do mercado", "Tend\xEAncia de baixa", "Tend\xEAncia de alta", "Mercado lateral"], c: 3, exp: "Em mercados laterais, as m\xE9dias cruzam repetidamente gerando falsos sinais (whipsaws)." },
    { q: "Diferença entre EMA e SMA:", opts: ["EMA usa mais períodos", "SMA é mais precisa para curto prazo", "EMA dá mais peso aos preços recentes, reage mais rápido", "Não há diferença prática"], c: 2, exp: "EMA (Exponential) pondera preços recentes com mais peso, tornando-a mais responsiva que a SMA (Simple) ao mesmo período." },
    { q: "Sinal de compra no cruzamento de médias ocorre quando:", opts: ["Preço toca a média", "RSI chega a 70", "Média rápida cruza de baixo para cima a média lenta", "Volume cai abaixo da média"], c: 2, exp: "Golden Cross: média de período menor cruza acima da média mais lenta — momentum bullish se formando." },
    { q: "Qual média móvel é mais monitorada por instituições para tendência de longo prazo?", opts: ["SMA 21", "SMA 50", "SMA 200", "EMA 9"], c: 2, exp: "SMA 200 é a referência institucional para tendência de longo prazo. Acima dela = mercado em território bullish." },
    { q: "Médias móveis funcionam melhor em:", opts: ["Mercados totalmente laterais", "Mercados com tendência definida e consistente", "Qualquer cenário sem distinção", "Alta volatilidade em range"], c: 1, exp: "Em mercados sem tendência, médias cruzam repetidamente gerando sinais falsos (whipsaws). Em tendência, são altamente eficazes." },
    { q: "'Death Cross' é:", opts: ["Padrão de reversão de candle", "Média rápida cruzando de cima para baixo a média lenta", "Queda abrupta do Bitcoin", "Indicador de volume negativo"], c: 1, exp: "Death Cross é o cruzamento bearish: média rápida desce abaixo da média lenta, indicando mudança para momentum negativo." }
  ],
  5: [
    { q: "Qual n\xEDvel de retra\xE7\xE3o de Fibonacci \xE9 chamado de 'propor\xE7\xE3o \xE1urea'?", opts: ["38.2%", "50%", "78.6%", "61.8%"], c: 3, exp: "61,8% \xE9 a propor\xE7\xE3o \xE1urea invertida (1 \xF7 1,618). \xC9 o n\xEDvel mais poderoso das retra\xE7\xF5es." },
    { q: "A Zona de Ouro do Fibonacci \xE9 entre:", opts: ["38,2% e 50%", "50% e 61,8%", "61,8% e 78,6%", "23,6% e 38,2%"], c: 2, exp: "A Zona de Ouro entre 61,8% e 78,6% \xE9 onde as m\xE3os fortes frequentemente entram ap\xF3s retra\xE7\xF5es profundas." },
    { q: "Para tra\xE7ar a retra\xE7\xE3o de Fibonacci em uma alta, voc\xEA:", opts: ["Do topo ao fundo", "Do fundo ao topo", "De qualquer ponto", "Apenas no di\xE1rio"], c: 1, exp: "Em uma alta, trace do swing low (fundo) ao swing high (topo) para obter os n\xEDveis de retra\xE7\xE3o corretamente." },
    { q: "Conflu\xEAncia de Fibonacci \xE9 quando:", opts: ["O RSI confirma", "Voc\xEA tem 2 tra\xE7ados diferentes", "O volume \xE9 alto", "Um n\xEDvel Fib coincide com suporte/resist\xEAncia"], c: 3, exp: "Conflu\xEAncia aumenta a probabilidade: quando Fibonacci coincide com S/R, EMA ou n\xEDvel psicol\xF3gico, o sinal \xE9 mais forte." },
    { q: "Extens\xE3o de 161,8% \xE9 usada para:", opts: ["Calcular position sizing", "Definir alvos de lucro", "Definir stop loss", "Confirmar tend\xEAncia"], c: 1, exp: "Extens\xF5es de Fibonacci projetam para onde o pre\xE7o pode ir ap\xF3s retomar o movimento \u2014 s\xE3o alvos de lucro." },
    { q: "O nível de Fibonacci 0.618 é chamado de:", opts: ["Stop Loss ideal", "Razão Áurea — o mais importante de Fibonacci", "Nível de extensão básico", "Nível fraco de suporte"], c: 1, exp: "61.8% é a Razão Áurea derivada da sequência de Fibonacci. É o nível de retração mais respeitado institucionalmente." },
    { q: "Fibonacci é principalmente usado para:", opts: ["Definir horários de entrada", "Calcular volume negociado", "Identificar zonas de suporte/resistência e alvos de preço", "Medir volatilidade histórica"], c: 2, exp: "Fibonacci mede proporções naturais do mercado — identifica onde pullbacks terminam (retrações) e onde o preço pode chegar (extensões)." },
    { q: "Extensões de Fibonacci servem para:", opts: ["Identificar retrações abaixo de 0%", "Definir suportes horizontais", "Projetar alvos de preço além do movimento original", "Criar médias móveis especiais"], c: 2, exp: "Extensões (127.2%, 161.8%, 261.8%) projetam alvos além do movimento original — usadas para definir take profit." },
    { q: "Para traçar Fibonacci corretamente deve-se:", opts: ["Do fundo para o topo em alta, ou do topo para o fundo em baixa", "Escolher pontos aleatórios", "Usar apenas fechamentos de candle", "Traçar somente em gráfico diário"], c: 0, exp: "Fibonacci é traçado entre pontos extremos significativos: fundo→topo para retração de alta, topo→fundo para retração de baixa." },
    { q: "A 'Zona de Ouro' de Fibonacci fica entre:", opts: ["23.6% e 38.2%", "100% e 127.2%", "50% e 61.8%", "61.8% e 78.6%"], c: 3, exp: "Zona de Ouro (61.8%-78.6%) é onde a maioria dos pullbacks terminam em tendências fortes — região de maior probabilidade de reversão." }
  ],
  6: [
    { q: "RSI acima de 70 indica:", opts: ["Sobrecomprado", "Sobrevendido", "Tend\xEAncia neutra", "Sinal de compra"], c: 0, exp: "RSI acima de 70 = sobrecomprado. Pode indicar excesso de alta, mas n\xE3o \xE9 autom\xE1tico para venda em tend\xEAncias fortes." },
    { q: "O MACD \xE9 formado por:", opts: ["EMA 12, EMA 26 e Signal", "Bollinger + ADX", "SMA + Volume", "RSI + Estoc\xE1stico"], c: 0, exp: "MACD = EMA 12 - EMA 26. A Signal \xE9 a EMA 9 do MACD. O histograma \xE9 a diferen\xE7a entre ambos." },
    { q: "Bandas de Bollinger estreitas indicam:", opts: ["Baixa volatilidade \u2014 squeeze antes de movimento", "Volume alto", "Tend\xEAncia de baixa", "Alta volatilidade"], c: 0, exp: "Bollinger Squeeze = compress\xE3o de volatilidade. Uma explos\xE3o de movimento (breakout) \xE9 iminente." },
    { q: "O Estoc\xE1stico \xE9 mais eficaz em:", opts: ["Abertura do mercado", "Not\xEDcias econ\xF4micas", "Tend\xEAncias fortes", "Mercados laterais (range)"], c: 3, exp: "O Estoc\xE1stico funciona melhor em mercados laterais, identificando sobrecomprado/sobrevendido dentro de um range." },
    { q: "A regra dos 3 indicadores diz: use um de TEND\xCANCIA, um de MOMENTUM e:", opts: ["Um de not\xEDcias", "Um de volatilidade/volume", "Um de Price Action", "Dois de momentum"], c: 1, exp: "A combina\xE7\xE3o ideal: 1 indicador de tend\xEAncia + 1 de momentum + 1 de volatilidade/volume. Mais do que isso = paralisia." },
    { q: "RSI acima de 70 indica:", opts: ["Ótima hora de comprar", "Tendência de baixa confirmada", "Volume muito baixo", "Ativo possivelmente sobrecomprado — atenção para correção"], c: 3, exp: "RSI > 70 não é sinal automático de venda, mas indica que o ativo subiu muito rápido — monitorar divergências ou perda de momentum." },
    { q: "MACD gera sinal de compra quando:", opts: ["Linha MACD cruza acima da linha de sinal", "Histograma se torna negativo", "Linha MACD cruza abaixo do sinal", "RSI cai abaixo de 50"], c: 0, exp: "Cruzamento bullish do MACD: linha MACD sobe acima da linha de sinal, indicando aumento do momentum positivo." },
    { q: "Bandas de Bollinger estreitas (squeeze) indicam:", opts: ["Tendência de alta confirmada", "Sinal direto de venda", "Alta volatilidade atual", "Baixa volatilidade — compressão que frequentemente precede movimento explosivo"], c: 3, exp: "Squeeze do Bollinger indica acumulação de energia. Historicamente, períodos de baixa volatilidade precedem movimentos expressivos." },
    { q: "Volume crescente em tendência de alta indica:", opts: ["Fraqueza da tendência — reversão iminente", "Volume irrelevante para análise", "Reversão certa", "Confirmação e força da tendência"], c: 3, exp: "Volume crescendo junto com o preço confirma a tendência — mais participantes entrando na mesma direção indica sustentabilidade." },
    { q: "Divergência bearish de RSI ocorre quando:", opts: ["RSI e preço sobem juntos harmoniosamente", "RSI fica estabilizado em 50", "Volume aumenta com RSI", "Preço faz nova máxima mas RSI faz máxima menor"], c: 3, exp: "Divergência bearish: preço faz topo mais alto, RSI faz topo mais baixo — momentum enfraquecendo, alerta de possível reversão." }
  ],
  7: [
    { q: "FOMO significa:", opts: ["Fund of Market Operations", "Fear of Market Orders", "Feeling of Market Overreaction", "Fear of Missing Out"], c: 3, exp: "FOMO = Fear of Missing Out: o medo de perder um movimento. Leva a entradas fora do setup, geralmente no topo." },
    { q: "O di\xE1rio de opera\xE7\xF5es \xE9 importante porque:", opts: ["Converte experi\xEAncias em conhecimento sistem\xE1tico sobre si mesmo", "\xC9 exigido por lei", "Apenas para traders profissionais", "Substitui a an\xE1lise t\xE9cnica"], c: 0, exp: "O di\xE1rio transforma experi\xEAncias isoladas em dados analis\xE1veis, revelando padr\xF5es de comportamento e hor\xE1rios de melhor desempenho." },
    { q: "Revenge trading \xE9:", opts: ["Uma estrat\xE9gia avan\xE7ada", "Operar com mais disciplina ap\xF3s perdas", "Tentar recuperar perdas rapidamente aumentando posi\xE7\xF5es", "Operar em ativos de concorrentes"], c: 2, exp: "Revenge trading: a urg\xEAncia de 'recuperar' elimina a objetividade e frequentemente transforma uma sequ\xEAncia gerenci\xE1vel em cat\xE1strofe." },
    { q: "O vi\xE9s de confirma\xE7\xE3o leva o trader a:", opts: ["Confirmar todos os trades", "Usar m\xFAltiplos timeframes", "Confirmar com volume", "Buscar apenas informa\xE7\xF5es que confirmam sua vis\xE3o"], c: 3, exp: "Vi\xE9s de confirma\xE7\xE3o: ignoramos informa\xE7\xF5es contr\xE1rias \xE0 nossa posi\xE7\xE3o e buscamos apenas as que confirmam o que queremos ver." },
    { q: "Meta de PROCESSO vs meta de RESULTADO: qual voc\xEA controla?", opts: ["Processo", "Nenhuma", "Ambas igualmente", "Resultado"], c: 0, exp: "'Seguir meu plano em 100% das opera\xE7\xF5es' \xE9 control\xE1vel. 'Ganhar R$ 500 hoje' depende do mercado. Foque no processo." },
    { q: "FOMO em trading é:", opts: ["Tipo de ordem condicional", "Técnica de gestão de risco", "Estratégia de scalping avançada", "Entrar por impulso com medo de perder o movimento, sem análise"], c: 3, exp: "FOMO (Fear Of Missing Out) leva a entrar no topo após ver o preço disparar — geralmente o pior ponto de entrada." },
    { q: "'Revenge trading' significa:", opts: ["Análise do mercado após perda", "Operar por impulso logo após perda para tentar recuperar", "Estratégia avançada de recuperação", "Técnica de scalping agressivo"], c: 1, exp: "Revenge trading é vingança emocional contra o mercado — operar sem critério para recuperar perdas, geralmente ampliando o prejuízo." },
    { q: "O diário de operações serve para:", opts: ["Calcular impostos sobre ganhos", "Obrigação legal ou fiscal", "Identificar padrões, acertos e erros para melhorar continuamente", "Controle bancário das operações"], c: 2, exp: "O diário revela padrões comportamentais e técnicos — quais setups funcionam, em quais condições você opera melhor ou pior." },
    { q: "Após sequência de 5 perdas consecutivas, o correto é:", opts: ["Dobrar posições para recuperar rapidamente", "Mudar completamente a estratégia", "Continuar ignorando as perdas", "Pausar, revisar o plano e voltar apenas com clareza mental"], c: 3, exp: "Sequências de perda podem indicar mercado desfavorável ou deterioração psicológica. Pausa estratégica é disciplina, não fraqueza." },
    { q: "Estado mental ideal para operar:", opts: ["Ansioso para recuperar perdas recentes", "Eufórico e confiante após ganhos seguidos", "Neutro, disciplinado e focado no processo", "Extremamente confiante em qualquer cenário"], c: 2, exp: "Estado neutro e focado no processo permite executar o plano sem interferência emocional — consistência vem da disciplina." }
  ],
  8: [
    { q: "Price Action puro significa operar com:", opts: ["Muitos indicadores", "Apenas o movimento do pre\xE7o, sem indicadores", "Apenas RSI e MACD", "Fibonacci obrigat\xF3rio"], c: 1, exp: "Price Action usa apenas o pre\xE7o e seus padr\xF5es \u2014 sem indicadores derivados. \xC9 a an\xE1lise mais direta do mercado." },
    { q: "Higher Highs e Higher Lows indicam:", opts: ["Tend\xEAncia de alta", "Mudan\xE7a de tend\xEAncia", "Mercado lateral", "Tend\xEAncia de baixa"], c: 0, exp: "Topos e fundos progressivamente mais altos (HH e HL) definem uma tend\xEAncia de alta estrutural." },
    { q: "Um Pin Bar tem:", opts: ["Corpo grande sem sombras", "Corpo pequeno e sombra longa em um lado", "Sombras iguais nos dois lados", "Dois corpos iguais"], c: 1, exp: "Pin Bar: corpo pequeno + sombra longa em um lado = rejei\xE7\xE3o forte. O mercado tentou ir em uma dire\xE7\xE3o mas foi recusado." },
    { q: "Um fakeout (falso rompimento) geralmente tem:", opts: ["Confirma\xE7\xE3o de candle", "Suporte no n\xEDvel", "Volume baixo e r\xE1pida revers\xE3o", "Volume muito alto"], c: 2, exp: "Fakeout: volume baixo no 'rompimento' + r\xE1pida revers\xE3o = armadilha para quem entrou no breakout." },
    { q: "No setup de Rompimento com Reteste, voc\xEA entra quando:", opts: ["No reteste da zona rompida (troca de polaridade)", "Na pr\xF3xima abertura", "Ap\xF3s 3 candles de confirma\xE7\xE3o", "No rompimento imediato"], c: 0, exp: "Aguardar o reteste \xE9 mais seguro: confirma a troca de polaridade (resist\xEAncia \u2192 suporte) antes de entrar." },
    { q: "Price Action puro significa operar:", opts: ["Somente baseado em notícias", "Exclusivamente com robôs", "Baseado apenas no comportamento do preço sem indicadores", "Com o máximo de indicadores possível"], c: 2, exp: "Price Action analisa o movimento bruto do preço — estrutura, fluxo e candles — sem depender de indicadores lagging." },
    { q: "Inside Bar é:", opts: ["Padrão de reversão explosivo", "Candle de alta com volume", "Candle com máxima e mínima completamente dentro do candle anterior", "Candle de suporte forte"], c: 2, exp: "Inside Bar representa compressão — preço se move dentro do range anterior, indicando pausa antes de continuação ou reversão." },
    { q: "Pin Bar se caracteriza por:", opts: ["Corpo pequeno e sombra longa indicando rejeição forte de preço", "Corpo longo sem sombras", "Volume crescente no período", "Dois candles opostos sobrepostos"], c: 0, exp: "Pin Bar tem sombra (pavio) longa mostrando rejeição — compradores ou vendedores tentaram mover o preço mas foram rejeitados." },
    { q: "'Liquidity Grab' em Price Action é:", opts: ["Compra de ações por ETFs", "Indicador de volume acumulado", "Movimento que varre stops além de um nível antes de reverter", "Estratégia de scalping em tendência"], c: 2, exp: "Liquidity Grab: mercado vai buscar stops acumulados além de um nível óbvio, cria movimento falso e reverte — armadilha de liquidez." },
    { q: "Break of Structure (BOS) significa:", opts: ["Stop Loss atingido na operação", "Padrão de três candles", "Falha técnica no sistema de ordens", "Rompimento de máxima/mínima anterior confirmando mudança de tendência"], c: 3, exp: "BOS confirma mudança estrutural: rompimento da última máxima relevante (bullish) ou mínima relevante (bearish)." }
  ],
  9: [
    { q: "Alta de pre\xE7o com volume decrescente indica:", opts: ["Compra institucional", "Tend\xEAncia forte", "Sinal de compra", "Poss\xEDvel exaust\xE3o da alta"], c: 3, exp: "Alta com volume decrescente = compradores perdendo for\xE7a. \xC9 sinal de alerta que a tend\xEAncia pode se esgotar." },
    { q: "No VSA, 'No Demand' \xE9:", opts: ["Candle de alta com volume baixo \u2014 compradores perdendo interesse", "Spike de volume", "Aus\xEAncia de volume", "Falta de vendedores"], c: 0, exp: "No Demand: rally com volume baixo indica que as m\xE3os fortes n\xE3o est\xE3o comprando. Alta sem combust\xEDvel." },

const GLOSSARY = [
  // A
  { term: "Absor\xE7\xE3o", cat: "Order Flow", emoji: "🏦", def: "Quando um grande player usa ordens passivas para absorver toda a press\xE3o do lado oposto sem deixar o pre\xE7o se mover. Sinal de acumula\xE7\xE3o ou distribui\xE7\xE3o institucional iminente." },
  { term: "ADX", cat: "Indicadores", emoji: "📊", def: "Average Directional Index. Mede a FOR\xC7A da tend\xEAncia (n\xE3o a dire\xE7\xE3o) em uma escala de 0 a 100. ADX > 25 indica tend\xEAncia definida; < 20 indica mercado lateral. Use para filtrar sinais de m\xE9dias m\xF3veis." },
  { term: "Alavancagem", cat: "Fundamentos", emoji: "\u26A1", def: "Permite controlar uma posi\xE7\xE3o maior do que o capital depositado. Ex: alavancagem de 10x significa que com R$ 1.000 voc\xEA controla R$ 10.000. Amplifica tanto os ganhos quanto as perdas." },
  { term: "All Time High (ATH)", cat: "Estrutura", emoji: "🏔\uFE0F", def: "Maior pre\xE7o hist\xF3rico j\xE1 registrado por um ativo. \xC9 uma resist\xEAncia psicol\xF3gica fort\xEDssima \u2014 e quando rompida com volume, tende a gerar movimentos expressivos pois n\xE3o h\xE1 resist\xEAncia hist\xF3rica acima." },
  { term: "Alvo (Target)", cat: "Gest\xE3o de Risco", emoji: "🎯", def: "N\xEDvel de pre\xE7o pr\xE9-definido onde voc\xEA pretende fechar a opera\xE7\xE3o com lucro. Deve ser definido ANTES de entrar na opera\xE7\xE3o, junto com o stop loss, para calcular o RR." },
  { term: "Ask", cat: "Order Flow", emoji: "📋", def: "Pre\xE7o de venda \u2014 o menor pre\xE7o que um vendedor est\xE1 disposto a aceitar. Quando voc\xEA compra a mercado, paga o Ask. A diferen\xE7a entre Bid e Ask \xE9 o spread." },
  { term: "ATR", cat: "Indicadores", emoji: "📏", def: "Average True Range. Mede a volatilidade m\xE9dia de um ativo em N per\xEDodos. \xDAtil para dimensionar stops (ex: stop = 1,5x ATR) e entender o 'ru\xEDdo' normal do mercado." },
  // B
  { term: "Bandas de Bollinger", cat: "Indicadores", emoji: "📉", def: "Indicador de volatilidade composto por uma SMA 20 e duas bandas a 2 desvios-padr\xE3o. Bandas estreitas (squeeze) antecedem grandes movimentos. Bandas largas indicam alta volatilidade." },
  { term: "Bear Market", cat: "Tend\xEAncias", emoji: "🐻", def: "Mercado em queda prolongada, geralmente definido como queda de 20% ou mais a partir do topo. Caracterizado por Lower Lows e Lower Highs. O sentimento dominante \xE9 o medo." },
  { term: "Bearish", cat: "Tend\xEAncias", emoji: "🔴", def: "Vi\xE9s ou sinal de baixa. Indica que o analista ou o padr\xE3o sugere que o pre\xE7o deve cair. Oposto de Bullish." },
  { term: "Bid", cat: "Order Flow", emoji: "📋", def: "Pre\xE7o de compra \u2014 o maior pre\xE7o que um comprador est\xE1 disposto a pagar. Quando voc\xEA vende a mercado, recebe o Bid. A diferen\xE7a entre Bid e Ask \xE9 o spread." },
  { term: "Bid Wall", cat: "Order Flow", emoji: "🧱", def: "Grande concentra\xE7\xE3o de ordens de compra no book em um n\xEDvel espec\xEDfico de pre\xE7o, formando uma 'parede' que dificulta a queda do pre\xE7o naquele ponto. Sinal de interesse institucional." },
  { term: "Book de Ordens", cat: "Order Flow", emoji: "📖", def: "Registro em tempo real de todas as ordens de compra (bids) e venda (asks) pendentes em diferentes n\xEDveis de pre\xE7o. Traders de Order Flow leem o book para antecipar movimentos." },
  { term: "Breakout", cat: "Price Action", emoji: "🚀", def: "Rompimento de um n\xEDvel de suporte ou resist\xEAncia pelo pre\xE7o. Um breakout verdadeiro \xE9 confirmado por volume alto (2x ou mais a m\xE9dia). Breakout falso \xE9 chamado de Fakeout." },
  { term: "Bull Market", cat: "Tend\xEAncias", emoji: "🐂", def: "Mercado em alta prolongada, caracterizado por Higher Highs e Higher Lows. Definido geralmente como alta de 20% ou mais a partir do fundo. O sentimento dominante \xE9 a euforia e o otimismo." },
  { term: "Bullish", cat: "Tend\xEAncias", emoji: "🟢", def: "Vi\xE9s ou sinal de alta. Indica que o analista ou o padr\xE3o sugere que o pre\xE7o deve subir. Oposto de Bearish." },
  // C
  { term: "Candlestick", cat: "Gr\xE1ficos", emoji: "🕯\uFE0F", def: "Representa\xE7\xE3o gr\xE1fica do pre\xE7o em um per\xEDodo, mostrando abertura, fechamento, m\xE1xima e m\xEDnima. Desenvolvido no Jap\xE3o no s\xE9culo XVIII. O corpo (ret\xE2ngulo) vai da abertura ao fechamento; as sombras (pavios) mostram os extremos." },
  { term: "Candle de Alta", cat: "Gr\xE1ficos", emoji: "🟢", def: "Candlestick onde o fechamento est\xE1 ACIMA da abertura. Geralmente verde ou branco. Indica que os compradores dominaram o per\xEDodo, elevando o pre\xE7o do in\xEDcio ao fim." },
  { term: "Candle de Baixa", cat: "Gr\xE1ficos", emoji: "🔴", def: "Candlestick onde o fechamento est\xE1 ABAIXO da abertura. Geralmente vermelho ou preto. Indica que os vendedores dominaram o per\xEDodo, reduzindo o pre\xE7o do in\xEDcio ao fim." },
  { term: "Capital", cat: "Gest\xE3o de Risco", emoji: "💰", def: "Dinheiro dispon\xEDvel na conta para operar. A preserva\xE7\xE3o do capital \xE9 o objetivo n\xFAmero 1 do trader profissional \u2014 sem capital, n\xE3o h\xE1 opera\xE7\xF5es futuras." },
  { term: "Contrato Futuro", cat: "Fundamentos", emoji: "📜", def: "Acordo padronizado para comprar ou vender um ativo a um pre\xE7o determinado numa data futura. No Brasil, os mais operados no day trade s\xE3o WIN (Mini \xCDndice) e WDO (Mini D\xF3lar)." },
  { term: "Corretora", cat: "Fundamentos", emoji: "🏢", def: "Institui\xE7\xE3o financeira que serve de intermedi\xE1ria entre o trader e o mercado. No Brasil, \xE9 necess\xE1rio ter conta em corretora habilitada pela B3 para operar mini-contratos." },
  { term: "Corre\xE7\xE3o", cat: "Tend\xEAncias", emoji: "📉", def: "Movimento de pre\xE7o tempor\xE1rio contra a tend\xEAncia principal. Em uma tend\xEAncia de alta, a corre\xE7\xE3o \xE9 uma queda tempor\xE1ria (pullback). N\xE3o confundir com revers\xE3o, que \xE9 permanente." },
  { term: "Cumulative Delta", cat: "Order Flow", emoji: "\u2795", def: "Soma acumulada de todos os deltas durante a sess\xE3o. Mostra quem foi mais agressivo no total do dia. Diverg\xEAncia entre Cumulative Delta e pre\xE7o \xE9 um dos sinais mais poderosos do Order Flow." },
  // D
  { term: "Day Trade", cat: "Fundamentos", emoji: "📅", def: "Modalidade de opera\xE7\xE3o onde todas as posi\xE7\xF5es s\xE3o abertas e fechadas no mesmo dia. N\xE3o h\xE1 posi\xE7\xE3o mantida overnight (de um dia para o outro). Exige agilidade, gest\xE3o de risco rigorosa e foco total." },
  { term: "Death Cross", cat: "M\xE9dias M\xF3veis", emoji: "💀", def: "Cruzamento bearish: a m\xE9dia m\xF3vel de per\xEDodo curto (r\xE1pida) cruza de cima para baixo a de per\xEDodo longo (lenta). Ex: EMA 9 cruza abaixo da EMA 20. Sinal de enfraquecimento do momentum de alta." },
  { term: "Delta", cat: "Order Flow", emoji: "\u0394", def: "Diferen\xE7a entre o volume de compras agressivas e vendas agressivas em um per\xEDodo. Delta positivo = compradores dominaram; negativo = vendedores dominaram. Ferramenta core do Order Flow." },
  { term: "Desconto (Discount)", cat: "SMC", emoji: "💲", def: "No SMC, \xE9 quando o pre\xE7o est\xE1 abaixo de 50% do range do \xFAltimo swing \u2014 considerado 'barato'. Zona preferida para entradas de compra pelo Smart Money, pois oferece melhor pre\xE7o m\xE9dio." },
  { term: "Diverg\xEAncia", cat: "Indicadores", emoji: "\u2194\uFE0F", def: "Ocorre quando o pre\xE7o e um indicador (RSI, MACD) seguem dire\xE7\xF5es opostas. Bearish divergence: pre\xE7o faz nova m\xE1xima mas indicador n\xE3o confirma = fraqueza. Bullish divergence: o inverso." },
  { term: "Doji", cat: "Candlestick", emoji: "\u2795", def: "Padr\xE3o de candlestick onde abertura e fechamento s\xE3o quase iguais, formando corpo min\xFAsculo. Indica indecis\xE3o entre compradores e vendedores. Mais relevante quando aparece em zonas de suporte/resist\xEAncia." },
  { term: "Drawdown", cat: "Gest\xE3o de Risco", emoji: "📉", def: "Queda percentual do capital desde um pico at\xE9 um fundo. Ex: conta de R$ 10.000 vai a R$ 8.000 = drawdown de 20%. Essencial monitorar: uma perda de 50% exige 100% de retorno para se recuperar." },
  // E
  { term: "Edge (Vantagem)", cat: "Fundamentos", emoji: "\u2694\uFE0F", def: "Qualquer caracter\xEDstica da estrat\xE9gia que matematicamente resulta em expectativa positiva ao longo de muitas opera\xE7\xF5es. Sem edge, o trading \xE9 puro jogo. Com edge, \xE9 um neg\xF3cio." },
  { term: "EMA", cat: "M\xE9dias M\xF3veis", emoji: "\u3030\uFE0F", def: "Exponential Moving Average (M\xE9dia M\xF3vel Exponencial). D\xE1 mais peso aos pre\xE7os recentes, reagindo mais r\xE1pido que a SMA. A mais utilizada no day trade. Configura\xE7\xF5es cl\xE1ssicas: 9, 20, 50." },
  { term: "Engolfo de Alta", cat: "Candlestick", emoji: "🟢", def: "Padr\xE3o de revers\xE3o bullish formado por 2 candles: um de baixa seguido de um de alta que engloba completamente o corpo do anterior. Mais forte com volume alto no segundo candle." },
  { term: "Engolfo de Baixa", cat: "Candlestick", emoji: "🔴", def: "Padr\xE3o de revers\xE3o bearish: candle de alta seguido de candle de baixa que engloba completamente o corpo do anterior. Sinal de que vendedores assumiram o controle \u2014 especialmente em resist\xEAncias." },
  { term: "Entrada", cat: "Opera\xE7\xF5es", emoji: "🚪", def: "O momento e o pre\xE7o em que uma posi\xE7\xE3o \xE9 aberta. Uma boa entrada maximiza o RR e minimiza o risco, entrando pr\xF3ximo ao stop loss e longe do alvo. Setup define o crit\xE9rio de entrada." },
  { term: "Estoc\xE1stico", cat: "Indicadores", emoji: "📊", def: "Oscilador que mede onde o pre\xE7o fechou em rela\xE7\xE3o ao range dos \xFAltimos N per\xEDodos. Escala de 0 a 100. Acima de 80 = sobrecomprado; abaixo de 20 = sobrevendido. Funciona melhor em mercados laterais." },
  { term: "Exchange", cat: "Fundamentos", emoji: "🏦", def: "Bolsa de valores ou plataforma onde os ativos s\xE3o negociados. No Brasil: B3. Para criptomoedas: Binance, Bybit, OKX. Para futuros de cripto: Binance Futures, Bybit Derivatives." },
  { term: "Expectativa Matem\xE1tica", cat: "Gest\xE3o de Risco", emoji: "🧮", def: "C\xE1lculo que determina se uma estrat\xE9gia \xE9 lucrativa a longo prazo. F\xF3rmula: (% acerto \xD7 ganho m\xE9dio) \u2212 (% erro \xD7 perda m\xE9dia). Positivo = estrat\xE9gia vi\xE1vel. Negativo = perde dinheiro inevitavelmente." },
  { term: "Extens\xE3o de Fibonacci", cat: "Fibonacci", emoji: "📏", def: "Ferramenta que projeta para onde o pre\xE7o pode ir AP\xD3S retomar o movimento principal. Principais n\xEDveis: 127,2%, 161,8%, 261,8%. Usados como alvos de lucro ap\xF3s retra\xE7\xF5es." },
  // F
  { term: "Fair Value Gap (FVG)", cat: "SMC", emoji: "🌀", def: "Lacuna no gr\xE1fico criada por movimento t\xE3o r\xE1pido que n\xE3o houve negocia\xE7\xE3o equilibrada em todos os n\xEDveis. O mercado frequentemente retorna para preencher o FVG. Identificado por 3 candles onde o 1\xB0 e 3\xB0 n\xE3o se sobrep\xF5em." },
  { term: "Fakeout", cat: "Price Action", emoji: "🎭", def: "Falso rompimento: o pre\xE7o ultrapassa brevemente um n\xEDvel de suporte/resist\xEAncia e rapidamente retorna. Geralmente acompanhado de volume baixo. \xC9 uma armadilha para quem entra no breakout." },
  { term: "Fibonacci", cat: "Fibonacci", emoji: "🌀", def: "Sequ\xEAncia matem\xE1tica (0,1,1,2,3,5,8,13...) cujos n\xFAmeros, ao serem divididos, geram ratios usados em an\xE1lise t\xE9cnica: 23,6%, 38,2%, 50%, 61,8%, 78,6%. Baseada na Propor\xE7\xE3o \xC1urea (1,618)." },
  { term: "FOMO", cat: "Psicologia", emoji: "😰", def: "Fear of Missing Out \u2014 Medo de Ficar de Fora. Estado emocional que leva o trader a entrar em opera\xE7\xF5es fora do setup por medo de perder um movimento. Causa entradas no topo e perdas evit\xE1veis." },
  { term: "Footprint Chart", cat: "Order Flow", emoji: "🔬", def: "Gr\xE1fico que mostra o volume negociado em cada n\xEDvel de pre\xE7o dentro de cada candle, separado entre compras e vendas agressivas. Permite identificar imbalances, delta e interesse institucional por n\xEDvel." },
  { term: "Futuros", cat: "Fundamentos", emoji: "📜", def: "Contratos padronizados negociados em bolsa para compra/venda de um ativo no futuro. Permitem alavancagem e opera\xE7\xF5es de venda a descoberto (short). Os mais operados no Brasil: WIN e WDO." },
  // G
  { term: "Gest\xE3o de Risco", cat: "Gest\xE3o de Risco", emoji: "🛡\uFE0F", def: "Conjunto de t\xE9cnicas para proteger o capital de perdas catastr\xF3ficas. Inclui: risco por opera\xE7\xE3o (1-2%), rela\xE7\xE3o RR m\xEDnima (1:2), stop loss obrigat\xF3rio, drawdown m\xE1ximo e position sizing adequado." },
  { term: "Golden Cross", cat: "M\xE9dias M\xF3veis", emoji: "\u2728", def: "Cruzamento bullish: a m\xE9dia m\xF3vel de per\xEDodo curto (r\xE1pida) cruza de baixo para cima a de per\xEDodo longo (lenta). Ex: EMA 9 cruza acima da EMA 20. Sinal de fortalecimento do momentum de alta." },
  // H
  { term: "Higher High (HH)", cat: "Estrutura", emoji: "\u2B06\uFE0F", def: "Topo mais alto que o anterior. Em tend\xEAncia de alta, cada topo deve ser mais alto que o precedente. A sequ\xEAncia de HH e HL (Higher Low) define estrutura bullish. Quebra dessa sequ\xEAncia = poss\xEDvel revers\xE3o." },
  { term: "Higher Low (HL)", cat: "Estrutura", emoji: "\u2197\uFE0F", def: "Fundo mais alto que o anterior. Em tend\xEAncia de alta, cada corre\xE7\xE3o deve parar acima da corre\xE7\xE3o anterior. Junto com o HH, confirma a estrutura de alta. Perda de um HL = alerta de revers\xE3o." },
  { term: "Histograma (MACD)", cat: "Indicadores", emoji: "📊", def: "Barras que representam a diferen\xE7a entre a linha MACD e a linha Signal. Barras crescendo acima do zero = momentum de alta aumentando; barras abaixo do zero = momentum de baixa." },
  // I
  { term: "Iceberg Order", cat: "Order Flow", emoji: "🧊", def: "Ordem gigante dividida em muitas pequenas partes para n\xE3o revelar o tamanho real no book. Identificada no tape como lotes repetidos no mesmo pre\xE7o que 'nunca acabam'. Sinal de interesse institucional num n\xEDvel espec\xEDfico." },
  { term: "Imbalance", cat: "Order Flow", emoji: "\u2696\uFE0F", def: "Desequil\xEDbrio no Footprint Chart onde um lado (compra ou venda) supera o outro em 3x ou mais num n\xEDvel de pre\xE7o. Clusters de imbalances indicam forte press\xE3o direcional e poss\xEDvel continua\xE7\xE3o do movimento." },
  { term: "Indicador T\xE9cnico", cat: "Indicadores", emoji: "📊", def: "Ferramenta matem\xE1tica calculada a partir do hist\xF3rico de pre\xE7o e/ou volume para auxiliar na tomada de decis\xE3o. S\xE3o sempre derivados do pre\xE7o (lagging). Exemplos: RSI, MACD, Bollinger, Estoc\xE1stico." },
  { term: "Inducement", cat: "SMC", emoji: "🎣", def: "Movimento falso criado pelo Smart Money para atrair o varejo para o lado errado antes do movimento real. Ex: SM empurra o pre\xE7o para baixo (induzindo vendas), coleta os stops dos comprados e ent\xE3o dispara para cima." },
  { term: "Inside Bar", cat: "Price Action", emoji: "📦", def: "Candle cujo range completo (m\xE1xima e m\xEDnima) est\xE1 dentro do range do candle anterior. Indica compress\xE3o de pre\xE7o e acumula\xE7\xE3o de energia. O rompimento (para cima ou baixo) sinaliza a pr\xF3xima dire\xE7\xE3o." },
  // L
  { term: "Lag (Defasagem)", cat: "Indicadores", emoji: "\u23F1\uFE0F", def: "Atraso dos indicadores t\xE9cnicos em rela\xE7\xE3o ao pre\xE7o. Como calculam dados passados, sempre reagem depois que o movimento j\xE1 come\xE7ou. Quanto maior o per\xEDodo do indicador, maior o lag." },
  { term: "Limit Order", cat: "Opera\xE7\xF5es", emoji: "📋", def: "Ordem que executa apenas em um pre\xE7o espec\xEDfico ou melhor. Ordens limit ficam no book aguardando o pre\xE7o chegar at\xE9 elas (passiva). Garantem o pre\xE7o de execu\xE7\xE3o, mas n\xE3o garantem que ser\xE3o executadas." },
  { term: "Liquidez", cat: "Order Flow", emoji: "💧", def: "No contexto do SMC: as ordens de stop loss dos traders que aguardam serem acionadas. Stops acima de topos = liquidez de vendedores. Stops abaixo de fundos = liquidez de compradores. O SM vai 'buscar' essa liquidez." },
  { term: "Liquidity Sweep", cat: "SMC", emoji: "🌊", def: "Quando o pre\xE7o vai rapidamente al\xE9m de um n\xEDvel de liquidez (topo/fundo anterior), aciona os stops do varejo e imediatamente reverte. O SM coletou a liquidez que precisava para mover o mercado na dire\xE7\xE3o real." },
  { term: "Long", cat: "Opera\xE7\xF5es", emoji: "📈", def: "Posi\xE7\xE3o comprada \u2014 voc\xEA lucra se o pre\xE7o subir. Voc\xEA compra o ativo esperando vend\xEA-lo a um pre\xE7o mais alto. No mercado de futuros, pode abrir uma posi\xE7\xE3o long sem ter o ativo previamente." },
  { term: "Lower High (LH)", cat: "Estrutura", emoji: "\u2198\uFE0F", def: "Topo mais baixo que o anterior. Em tend\xEAncia de baixa, cada rally (recupera\xE7\xE3o) deve parar abaixo do rally anterior. Junto com o LL, confirma a estrutura de baixa." },
  { term: "Lower Low (LL)", cat: "Estrutura", emoji: "\u2B07\uFE0F", def: "Fundo mais baixo que o anterior. Em tend\xEAncia de baixa, cada queda atinge n\xEDveis mais baixos que a anterior. A sequ\xEAncia de LL e LH define estrutura bearish." },
  // M
  { term: "MACD", cat: "Indicadores", emoji: "📊", def: "Moving Average Convergence Divergence. Combina EMAs (12 e 26) para medir tend\xEAncia e momentum simultaneamente. Composto por linha MACD, linha Signal (EMA 9 do MACD) e Histograma." },
  { term: "M\xE3o Forte", cat: "Volume", emoji: "🏦", def: "Termo para os grandes players institucionais: fundos, bancos, hedge funds, market makers. Operam com capital, tecnologia e informa\xE7\xE3o superiores ao varejo. Suas 'pegadas' podem ser identificadas no volume e no Order Flow." },
  { term: "Margem", cat: "Fundamentos", emoji: "💳", def: "Valor depositado na corretora como garantia para operar contratos futuros. Com margem de R$ 1.000 e alavancagem de 10x, voc\xEA controla R$ 10.000. Se a posi\xE7\xE3o vai contra voc\xEA, pode receber margin call." },
  { term: "Margin Call", cat: "Fundamentos", emoji: "🚨", def: "Chamada de margem \u2014 quando a perda na posi\xE7\xE3o consome a margem depositada e a corretora exige mais dinheiro ou fecha a posi\xE7\xE3o automaticamente. Resultado de operar sem gest\xE3o de risco adequada." },
  { term: "Market Order", cat: "Opera\xE7\xF5es", emoji: "\u26A1", def: "Ordem a mercado \u2014 executa imediatamente ao melhor pre\xE7o dispon\xEDvel. Agressiva por natureza (toma liquidez do book). Garante a execu\xE7\xE3o mas n\xE3o garante o pre\xE7o exato \u2014 especialmente em ativos pouco l\xEDquidos." },
  { term: "Marubozu", cat: "Candlestick", emoji: "🔲", def: "Candlestick sem sombras (ou com sombras m\xEDnimas). Indica dom\xEDnio total de um lado: Marubozu de Alta = abriu na m\xEDnima, fechou na m\xE1xima; Marubozu de Baixa = o contr\xE1rio. Sinal de for\xE7a m\xE1xima." },
  { term: "Martelo", cat: "Candlestick", emoji: "🔨", def: "Padr\xE3o de revers\xE3o bullish: corpo pequeno no topo + sombra inferior longa (2x ou mais o corpo). Aparece ap\xF3s tend\xEAncia de baixa e indica que vendedores tentaram pressionar mas compradores reagiram com for\xE7a." },
  { term: "Mini Contratos", cat: "Fundamentos", emoji: "📦", def: "Vers\xE3o reduzida dos contratos futuros, com menor custo de margem. No Brasil: WIN (Mini \xCDndice Bovespa) e WDO (Mini D\xF3lar). Acess\xEDveis ao trader de varejo com capital menor." },
  { term: "Momentum", cat: "Indicadores", emoji: "\u26A1", def: "A velocidade e for\xE7a de um movimento de pre\xE7o. Momentum alto = tend\xEAncia acelerando. Momentum baixo = tend\xEAncia perdendo for\xE7a. Diverg\xEAncias de momentum (indicador vs pre\xE7o) antecedem revers\xF5es." },
  { term: "M\xFAltiplos Timeframes (MTF)", cat: "An\xE1lise", emoji: "🌐", def: "T\xE9cnica de an\xE1lise que observa o mesmo ativo em diferentes escalas de tempo. Princ\xEDpio top-down: analisa do maior para o menor. O timeframe maior define o contexto e sempre domina os menores." },
  // O
  { term: "OBV", cat: "Volume", emoji: "📊", def: "On-Balance Volume. Indicador que acumula volume positivo nos dias de alta e subtrai nos dias de baixa. Diverg\xEAncia entre OBV e pre\xE7o antecipa revers\xF5es: OBV subindo + pre\xE7o caindo = bullish divergence." },
  { term: "Order Block (OB)", cat: "SMC", emoji: "🧱", def: "Zona onde o Smart Money executou grandes ordens. Bullish OB = \xFAltimo candle de baixa antes de expans\xE3o de alta forte. Quando o pre\xE7o retorna ao OB, as mesmas ordens institucionais tendem a estar presentes." },
  { term: "Order Flow", cat: "Order Flow", emoji: "🔬", def: "Estudo do fluxo real de ordens que movem o mercado. Trabalha com a causa do movimento (ordens individuais) em vez do efeito (pre\xE7o). O n\xEDvel mais profundo de an\xE1lise t\xE9cnica dispon\xEDvel." },
  { term: "Oscilador", cat: "Indicadores", emoji: "\u3030\uFE0F", def: "Indicador que oscila entre valores extremos (geralmente 0-100 ou +/-100). Exemplos: RSI, Estoc\xE1stico. Usados para identificar condi\xE7\xF5es de sobrecompra/sobrevenda e diverg\xEAncias com o pre\xE7o." },
  { term: "Outside Bar", cat: "Price Action", emoji: "📊", def: "Candle cujo range (m\xE1xima e m\xEDnima) engloba completamente o range do candle anterior. Se fecha perto da m\xE1xima = bullish; perto da m\xEDnima = bearish. Indica tomada de controle decisiva por um lado." },
  // P
  { term: "Padr\xE3o Gr\xE1fico", cat: "An\xE1lise", emoji: "📐", def: "Forma\xE7\xE3o recorrente no gr\xE1fico de pre\xE7os com implica\xE7\xF5es direcionais conhecidas. Exemplos: Cabe\xE7a e Ombros (revers\xE3o de alta), Tri\xE2ngulo Ascendente (continua\xE7\xE3o de alta), Fundo Duplo (revers\xE3o de baixa)." },
  { term: "Pin Bar", cat: "Price Action", emoji: "📍", def: "Padr\xE3o de revers\xE3o com corpo pequeno e sombra muito longa em um lado (pelo menos 2/3 do candle total). A sombra longa = rejei\xE7\xE3o forte. \xC9 o padr\xE3o de revers\xE3o mais confi\xE1vel no Price Action." },
  { term: "Pivot", cat: "Estrutura", emoji: "🔄", def: "N\xEDvel de pre\xE7o calculado a partir do dia anterior (m\xE1xima, m\xEDnima, fechamento) que funciona como refer\xEAncia para suporte e resist\xEAncia no dia seguinte. Muito utilizado por day traders como guia de opera\xE7\xE3o." },
  { term: "Position Sizing", cat: "Gest\xE3o de Risco", emoji: "📐", def: "C\xE1lculo do n\xFAmero exato de contratos ou a\xE7\xF5es a operar baseado no capital, percentual de risco e dist\xE2ncia do stop. F\xF3rmula: N\xBA contratos = Valor em risco \xF7 (Stop em pontos \xD7 Valor por ponto)." },
  { term: "Premium", cat: "SMC", emoji: "💎", def: "No SMC, \xE9 quando o pre\xE7o est\xE1 acima de 50% do range do \xFAltimo swing \u2014 considerado 'caro'. Zona preferida pelo Smart Money para distribuir (vender) posi\xE7\xF5es, pois consegue o melhor pre\xE7o m\xE9dio." },
  { term: "Price Action", cat: "Price Action", emoji: "📉", def: "Metodologia de an\xE1lise e opera\xE7\xE3o baseada exclusivamente no movimento do pre\xE7o, sem indicadores derivados. Usa estrutura de mercado, candlesticks, suporte/resist\xEAncia e padr\xF5es de topos/fundos." },
  { term: "Propor\xE7\xE3o \xC1urea", cat: "Fibonacci", emoji: "🌿", def: "O n\xFAmero Phi (\u03C6 = 1,618...). Aparece em toda a natureza e \xE9 base do Fibonacci no trading. O n\xEDvel de 61,8% de retra\xE7\xE3o (1 \xF7 1,618) \xE9 o mais importante e chamado de 'Zona de Ouro'." },
  { term: "Pullback", cat: "Price Action", emoji: "🔙", def: "Recuo tempor\xE1rio contra a tend\xEAncia principal. Em uma tend\xEAncia de alta, \xE9 uma queda tempor\xE1ria antes de continuar subindo. Oportunidade de entrada: comprar o pullback em zona de suporte." },
  // R
  { term: "Range", cat: "Estrutura", emoji: "\u2194\uFE0F", def: "Mercado sem tend\xEAncia definida, oscilando entre suporte e resist\xEAncia horizontais. Tamb\xE9m chamado de mercado lateral ou consolida\xE7\xE3o. Estrat\xE9gia: comprar na base e vender no topo do range." },
  { term: "Resist\xEAncia", cat: "Suporte e Resist\xEAncia", emoji: "🔴", def: "Zona de pre\xE7o onde a oferta (vendedores) foi historicamente forte o suficiente para impedir altas. O pre\xE7o tentou superar o n\xEDvel e foi rejeitado. Quando o pre\xE7o retorna, novos vendedores tendem a aparecer." },
  { term: "Retra\xE7\xE3o de Fibonacci", cat: "Fibonacci", emoji: "🌀", def: "N\xEDveis de pre\xE7o (23,6%, 38,2%, 50%, 61,8%, 78,6%) onde um movimento provavelmente encontrar\xE1 suporte ou resist\xEAncia antes de continuar. Usados para encontrar entradas em pullbacks de tend\xEAncia." },
  { term: "Revenge Trading", cat: "Psicologia", emoji: "😤", def: "Tentar recuperar perdas rapidamente aumentando o tamanho das posi\xE7\xF5es ap\xF3s uma sequ\xEAncia de perdas. \xC9 um dos comportamentos mais destrutivos no trading \u2014 a urg\xEAncia elimina a objetividade e transforma sequ\xEAncias gerenci\xE1veis em cat\xE1strofes." },
  { term: "Risco/Retorno (RR)", cat: "Gest\xE3o de Risco", emoji: "\u2696\uFE0F", def: "Rela\xE7\xE3o entre o risco assumido e o ganho potencial em uma opera\xE7\xE3o. RR 1:2 significa arriscar R$ 1 para ganhar R$ 2. O RR m\xEDnimo recomendado \xE9 1:2, pois permite ser lucrativo com apenas 34% de acerto." },
  { term: "Rompimento", cat: "Price Action", emoji: "💥", def: "Quando o pre\xE7o supera um n\xEDvel de suporte ou resist\xEAncia. Para ser v\xE1lido: volume 2x acima da m\xE9dia, candle fechando claramente al\xE9m do n\xEDvel, sem retorno imediato. Sem volume = prov\xE1vel Fakeout." },
  { term: "RSI", cat: "Indicadores", emoji: "📊", def: "Relative Strength Index. Oscilador (0-100) que mede a velocidade e magnitude das mudan\xE7as de pre\xE7o. Acima de 70 = sobrecomprado; abaixo de 30 = sobrevendido. Tamb\xE9m usado para detectar diverg\xEAncias." },
  // S
  { term: "Scalping", cat: "Fundamentos", emoji: "\u26A1", def: "Estilo de trading de curt\xEDssimo prazo: opera\xE7\xF5es duram segundos a poucos minutos. Busca ganhos pequenos mas frequentes. Exige plataforma r\xE1pida, spreads baixos e alta concentra\xE7\xE3o do trader." },
  { term: "Setup", cat: "Opera\xE7\xF5es", emoji: "🎯", def: "Conjunto de crit\xE9rios que definem uma oportunidade de opera\xE7\xE3o v\xE1lida: padr\xE3o de pre\xE7o, zona relevante, confirma\xE7\xE3o de volume e alinhamento com tend\xEAncia. Um bom setup tem crit\xE9rios claros e objetivos." },
  { term: "Short", cat: "Opera\xE7\xF5es", emoji: "📉", def: "Posi\xE7\xE3o vendida a descoberto \u2014 voc\xEA lucra se o pre\xE7o cair. Voc\xEA vende o ativo (que n\xE3o possui) esperando recompr\xE1-lo mais barato. No mercado de futuros, \xE9 t\xE3o simples quanto abrir um Long." },
  { term: "SMA", cat: "M\xE9dias M\xF3veis", emoji: "\u3030\uFE0F", def: "Simple Moving Average (M\xE9dia M\xF3vel Simples). Calcula a m\xE9dia aritm\xE9tica dos \xFAltimos N fechamentos, dando peso igual a todos os per\xEDodos. Mais est\xE1vel que a EMA, mas reage mais lentamente ao pre\xE7o." },
  { term: "Smart Money", cat: "SMC", emoji: "💰", def: "Capital controlado por grandes players institucionais: bancos, hedge funds, market makers, fundos soberanos. T\xEAm acesso superior a informa\xE7\xE3o, tecnologia e capital. Operam em fases: acumula\xE7\xE3o \u2192 markup \u2192 distribui\xE7\xE3o \u2192 markdown." },
  { term: "Smart Money Concepts (SMC)", cat: "SMC", emoji: "🏛\uFE0F", def: "Metodologia que analisa o mercado pela perspectiva das institui\xE7\xF5es. Conceitos principais: Order Blocks, Fair Value Gaps, Liquidity Sweeps, Inducement, Premium/Discount. Foca em identificar e seguir as 'pegadas' do Smart Money." },
  { term: "Sobrecomprado", cat: "Indicadores", emoji: "🔴", def: "Condi\xE7\xE3o onde um ativo subiu r\xE1pido demais em pouco tempo. Indicada por RSI > 70 ou Estoc\xE1stico > 80. N\xE3o \xE9 sinal autom\xE1tico de venda \u2014 em tend\xEAncias fortes, o mercado pode permanecer sobrecomprado por longos per\xEDodos." },
  { term: "Sobrevendido", cat: "Indicadores", emoji: "🟢", def: "Condi\xE7\xE3o onde um ativo caiu r\xE1pido demais em pouco tempo. Indicada por RSI < 30 ou Estoc\xE1stico < 20. N\xE3o \xE9 sinal autom\xE1tico de compra \u2014 em tend\xEAncias de baixa, o mercado pode permanecer sobrevendido por longos per\xEDodos." },
  { term: "Spinning Top", cat: "Candlestick", emoji: "🌀", def: "Candlestick com corpo pequeno e sombras longas em ambos os lados. Indica equil\xEDbrio tempor\xE1rio \u2014 uma pausa na tend\xEAncia, n\xE3o uma revers\xE3o. Em tend\xEAncia clara, \xE9 sinal de continua\xE7\xE3o ap\xF3s a consolida\xE7\xE3o." },
  { term: "Spike de Volume", cat: "Volume", emoji: "📊", def: "Volume muito acima da m\xE9dia (5-10x ou mais) em um candle. Pode indicar: cl\xEDmax de compra ou venda (exaust\xE3o), entrada de institui\xE7\xE3o, not\xEDcia importante ou stop hunt. Sempre merece aten\xE7\xE3o." },
  { term: "Spread", cat: "Fundamentos", emoji: "\u2194\uFE0F", def: "Diferen\xE7a entre o pre\xE7o de compra (Ask) e o pre\xE7o de venda (Bid). \xC9 um custo de transa\xE7\xE3o: ao entrar a mercado, voc\xEA j\xE1 come\xE7a ligeiramente no negativo. Spreads menores = menor custo de opera\xE7\xE3o." },
  { term: "Stop Hunt", cat: "SMC", emoji: "🎯", def: "Quando grandes players empurram o pre\xE7o brevemente al\xE9m de um n\xEDvel \xF3bvio (onde stops do varejo est\xE3o concentrados), acionam essas ordens (coletando liquidez) e ent\xE3o revertem violentamente na dire\xE7\xE3o oposta." },
  { term: "Stop Loss", cat: "Gest\xE3o de Risco", emoji: "🛑", def: "Ordem autom\xE1tica que fecha sua posi\xE7\xE3o com uma perda limitada caso o pre\xE7o atinja um n\xEDvel que invalida sua an\xE1lise. OBRIGAT\xD3RIO em 100% das opera\xE7\xF5es. Deve ser definido ANTES de entrar no trade." },
  { term: "Suporte", cat: "Suporte e Resist\xEAncia", emoji: "🟢", def: "Zona de pre\xE7o onde a demanda (compradores) foi historicamente forte o suficiente para impedir quedas. Quando o pre\xE7o retorna, novos compradores tendem a aparecer. Quanto mais testado sem romper, mais forte." },
  { term: "Swing High", cat: "Estrutura", emoji: "\u2B06\uFE0F", def: "Topo local \u2014 um candle (ou grupo) que tem m\xE1xima maior que os candles imediatamente \xE0 sua esquerda e direita. Usado como refer\xEAncia para tra\xE7ar Fibonacci, identificar resist\xEAncias e analisar estrutura de mercado." },
  { term: "Swing Low", cat: "Estrutura", emoji: "\u2B07\uFE0F", def: "Fundo local \u2014 um candle (ou grupo) que tem m\xEDnima menor que os candles \xE0 esquerda e direita. Usado para tra\xE7ar Fibonacci, identificar suportes e analisar estrutura de mercado." },
  // T
  { term: "Tape Reading", cat: "Order Flow", emoji: "📜", def: "An\xE1lise em tempo real do Time & Sales \u2014 registro de cada transa\xE7\xE3o individual executada no mercado. Traders de tape reading leem velocidade, tamanho e dire\xE7\xE3o das transa\xE7\xF5es para antecipar movimentos iminentes." },
  { term: "Taxa de Acerto", cat: "Gest\xE3o de Risco", emoji: "🎯", def: "Percentual de opera\xE7\xF5es vencedoras sobre o total. Uma taxa de acerto alta N\xC3O garante lucro \u2014 o que importa \xE9 a combina\xE7\xE3o de taxa de acerto com o RR. Com RR de 1:2, 34% de acerto j\xE1 \xE9 lucrativo." },
  { term: "Tend\xEAncia", cat: "Tend\xEAncias", emoji: "📈", def: "Dire\xE7\xE3o predominante do mercado ao longo do tempo. Tr\xEAs tipos: tend\xEAncia de alta (HH e HL), tend\xEAncia de baixa (LH e LL) e lateral (sem progress\xE3o de topos/fundos). 'A tend\xEAncia \xE9 sua amiga.'" },
  { term: "Timeframe", cat: "An\xE1lise", emoji: "\u23F1\uFE0F", def: "Per\xEDodo de tempo de cada candlestick no gr\xE1fico. Ex: no gr\xE1fico de 5 minutos, cada candle representa 5 minutos de negocia\xE7\xE3o. Diferentes timeframes mostram diferentes perspectivas do mesmo movimento." },
  { term: "Time & Sales", cat: "Order Flow", emoji: "📋", def: "Registro cronol\xF3gico de todas as transa\xE7\xF5es executadas: hor\xE1rio, pre\xE7o, volume e dire\xE7\xE3o (bid ou ask). \xC9 a 'fita' usada no Tape Reading. Para ativos l\xEDquidos como WIN, pode ter centenas de transa\xE7\xF5es por segundo." },
  { term: "Trailing Stop", cat: "Gest\xE3o de Risco", emoji: "🔄", def: "Stop loss m\xF3vel que acompanha o pre\xE7o na dire\xE7\xE3o favor\xE1vel, travando lucros progressivamente. Ex: stop em 100 pontos abaixo do pre\xE7o atual. Quando o pre\xE7o sobe, o stop sobe junto. Se o pre\xE7o cai, o stop fica fixo." },
  { term: "Troca de Polaridade", cat: "Suporte e Resist\xEAncia", emoji: "🔄", def: "Quando um suporte rompido se torna resist\xEAncia (e vice-versa). Fen\xF4meno baseado na psicologia do mercado: traders presos em posi\xE7\xF5es perdedoras usam o retorno ao n\xEDvel para sair, criando press\xE3o na dire\xE7\xE3o oposta." },
  // V
  { term: "Vi\xE9s Cognitivo", cat: "Psicologia", emoji: "🧠", def: "Distor\xE7\xE3o sistem\xE1tica no pensamento que leva a erros de julgamento. No trading: confirma\xE7\xE3o (buscar s\xF3 o que confirma), ancoragem (pre\xE7o de compra como refer\xEAncia), avers\xE3o \xE0 perda (medo assim\xE9trico de perder)." },
  { term: "Volume", cat: "Volume", emoji: "📊", def: "N\xFAmero de contratos ou a\xE7\xF5es negociados em um per\xEDodo. \xC9 o dado mais honesto do mercado \u2014 n\xE3o pode ser manipulado. Confirma tend\xEAncias (alta + volume crescente = saud\xE1vel) e valida rompimentos." },
  { term: "Volume Spread Analysis (VSA)", cat: "Volume", emoji: "🔬", def: "Metodologia que analisa a rela\xE7\xE3o entre volume e o spread (range) de cada candle para identificar a\xE7\xE3o dos grandes players. Conceitos: No Demand (alta com volume baixo), No Supply (baixa com volume baixo), Climax." },
  { term: "VWAP", cat: "Volume", emoji: "📊", def: "Volume Weighted Average Price \u2014 Pre\xE7o M\xE9dio Ponderado por Volume. Refer\xEAncia institucional do dia. Acima do VWAP = compradores do dia no lucro (vi\xE9s de alta). Abaixo = compradores no preju\xEDzo (vi\xE9s de baixa). Reseta a cada sess\xE3o." },
  // W

function _set(k,v){try{localStorage.setItem(k,v)}catch(e){_mem[k]=v}}

function saveUser(u,d){const a=JSON.parse(_get("tq_users")||"{}");a[u]=d;_set("tq_users",JSON.stringify(a));}

function getLevelInfo(xp){let c=LEVELS[0];for(const l of LEVELS){if(xp>=l.xpMin)c=l;}return c;}
function getXpPct(xp){const l=getLevelInfo(xp);const n=LEVELS.find(x=>x.level===l.level+1);if(!n)return 100;return Math.min(100,Math.round((xp-l.xpMin)/(n.xpMin-l.xpMin)*100));}

}

// ─── QUIZ SCREEN ──────────────────────────────────────────────────────────────
function QuizScreen({module, addXp, onClose}) {
  const PASS_SCORE = 7;
  const XP_BONUS = 150;
  // Fix: questions must be stable — computed once via useState initial value
  const [questions] = useState(() => {
    const allQ = (QUIZ[module.id] || []).slice();
    if (allQ.length >= 10) {
      for (let i = allQ.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allQ[i], allQ[j]] = [allQ[j], allQ[i]];
      }
      return allQ.slice(0, 10);
    }
    return allQ;
  });
  const [cur, setCur] = useState(0);
  const [sel, setSel] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [streak, setStreak] = useState(0);
  const [done, setDone] = useState(false);
  const [score, setScore] = useState(0);
  const [xpAwarded, setXpAwarded] = useState(false);
  const [anim, setAnim] = useState("");

  if (!questions.length) return h("div",{style:{position:"fixed",inset:0,background:"#0a0a0f",zIndex:500,
    display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",color:"#888"}},
    h("div",{style:{fontSize:40,marginBottom:16}},"📭"),
    h("div",{style:{marginBottom:24}},"Quiz em breve"),
    h("button",{onClick:onClose,style:{...S.btn,background:"#00d4ff22",color:"#00d4ff",padding:"10px 24px"}},"Voltar")
  );

  if (done) {
    const passed = score >= PASS_SCORE;
    if (passed && !xpAwarded) {
      setXpAwarded(true);
      addXp(XP_BONUS);
    }
    return h("div",{style:{position:"fixed",inset:0,background:"#0a0a0f",zIndex:500,overflowY:"auto",
      padding:24,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}},
      h("div",{style:{fontSize:72,marginBottom:12}}, passed?"🏆":"📚"),
      h("div",{style:{...S.orb,fontSize:22,color:passed?"#00ff88":"#ef4444",fontWeight:900,marginBottom:6}},
        passed?"APROVADO!":"REPROVADO"),
      h("div",{style:{...S.orb,fontSize:40,color:"#ffd700",marginBottom:4}},`${score}/${questions.length}`),
      h("div",{style:{fontSize:14,color:"#888",marginBottom:4}},
        `Mínimo para passar: ${PASS_SCORE}/${questions.length}`),
      passed
        ? h("div",{style:{marginTop:16,background:"#00ff8811",border:"1px solid #00ff8844",
            borderRadius:10,padding:"12px 24px",textAlign:"center"}},
            h("div",{style:{...S.orb,fontSize:13,color:"#00ff88",letterSpacing:1}},`+ ${XP_BONUS} XP`),
            h("div",{style:{fontSize:12,color:"#888",marginTop:4}},"Bônus de conclusão desbloqueado!")
          )
        : h("div",{style:{marginTop:12,fontSize:13,color:"#888",textAlign:"center"}},
            "Estude mais e tente novamente para ganhar o bônus de XP."),
      h("button",{onClick:onClose,
        style:{...S.btn,padding:"13px 32px",marginTop:24,
          background:passed?"linear-gradient(135deg,#00ff88,#00d4ff)":"linear-gradient(135deg,#00d4ff,#0077ff)",
          color:passed?"#000":"#fff",fontSize:13,letterSpacing:2}},
        passed?"CONCLUIR ✓":"TENTAR NOVAMENTE")
    );
  }

  const q = questions[cur];
  function pick(idx) {
    if (answered) return;
    setSel(idx);
    setAnswered(true);
    if (idx === q.c) {
      setScore(s=>s+1);
      setStreak(s=>s+1);
      setAnim("correct");
    } else {
      setStreak(0);
      setAnim("shake");
    }
    setTimeout(()=>setAnim(""),600);
  }
  function next() {
    if (cur < questions.length-1) { setCur(c=>c+1); setSel(null); setAnswered(false); setAnim(""); }
    else setDone(true);
  }

  const remaining = questions.length - cur;
  const stillPossible = score + remaining >= PASS_SCORE;

  return h("div",{style:{position:"fixed",inset:0,background:"#0a0a0f",zIndex:500,overflowY:"auto"}},
    h("div",{style:{background:"#111118",borderBottom:"1px solid #00d4ff22",padding:"12px 16px",
      display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:1}},
      h("button",{onClick:onClose,style:{...S.btn,background:"none",color:"#666",padding:4,fontSize:20}},"←"),
      h("div",{style:{flex:1,...S.orb,fontSize:12,color:"#00d4ff",letterSpacing:1}},"QUIZ ⚡"),
      h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}},
        h("div",{style:{...S.orb,fontSize:12,color:"#ffd700"}},`${cur+1}/${questions.length}`),
        h("div",{style:{fontSize:10,color:score>=(PASS_SCORE-(questions.length-cur-1))?"#00ff88":"#888"}},
          `✓ ${score} | mín. ${PASS_SCORE}`),
      ),
    ),
    h("div",{style:{padding:"12px 16px 0",maxWidth:600,margin:"0 auto"}},
      h("div",{style:{background:"#1a1a2e",borderRadius:4,height:5,overflow:"hidden",marginBottom:4}},
        h("div",{style:{height:"100%",width:`${((cur+1)/questions.length)*100}%`,
          background:"linear-gradient(90deg,#00d4ff,#7c3aed)",transition:"width 0.4s"}})),
      h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:16}},
        h("div",{style:{fontSize:10,color:"#555"}},`Acertos: ${score}`),
        h("div",{style:{fontSize:10,color:stillPossible?"#00ff8888":"#ef444488"}},
          stillPossible?`Ainda pode passar!`:`Mínimo de ${PASS_SCORE} não atingível`),
      ),
      streak>1 && h("div",{style:{textAlign:"center",color:"#ffd700",...S.orb,fontSize:11,letterSpacing:1,marginBottom:12}},
        `🔥 COMBO x${streak}`),
      h("div",{className:anim,style:{...S.cardBlue,marginBottom:14,padding:18}},
        h("div",{style:{...S.raj,fontSize:16,color:"#fff",lineHeight:1.5,fontWeight:600}}, q.q)
      ),
      q.opts.map((opt,idx) => {
        let bg="#111118", border="#1a1a2e", color="#ccc";
        if (answered) {
          if (idx===q.c){bg="#00ff8822";border="#00ff88";color="#00ff88";}
          else if (idx===sel&&idx!==q.c){bg="#ef444422";border="#ef4444";color="#ef4444";}
        } else if (sel===idx){bg="#00d4ff22";border="#00d4ff";color="#00d4ff";}
        return h("button",{key:idx,onClick:()=>pick(idx),
          style:{...S.btn,width:"100%",textAlign:"left",padding:"12px 14px",marginBottom:8,
            background:bg,border:`1px solid ${border}`,color,...S.raj,fontSize:15,fontWeight:500,
            transition:"all 0.2s"}},
          opt
        );
      }),
      answered && h("div",{style:{...S.card,border:`1px solid ${sel===q.c?"#00ff8833":"#ef444433"}`,marginTop:2,marginBottom:8}},
        h("div",{style:{fontSize:13,color:sel===q.c?"#00ff88":"#ef4444",marginBottom:4}},
          sel===q.c?"✓ Correto!":"✗ Incorreto"),
        h("div",{style:{fontSize:13,color:"#888"}},q.exp)
      ),
      answered && h("button",{onClick:next,
        style:{...S.btn,width:"100%",padding:"13px 0",
          background:"linear-gradient(135deg,#00d4ff,#0077ff)",
          color:"#fff",fontSize:12,letterSpacing:2}},
        cur<questions.length-1?"PRÓXIMA →":"VER RESULTADO")
    )
  );
}

// ─── MODULE DETAIL ────────────────────────────────────────────────────────────
function ModuleDetail({module, userData, markReading, markLink, onClose, onQuiz}) {
  const [openReading, setOpenReading] = useState(null);
  const openReadingRef = useRef(null);
  useEffect(() => { openReadingRef.current = openReading; }, [openReading]);

  // Back button inside module detail closes reading first
  useEffect(() => {
    function handlePop() {
      if (openReadingRef.current !== null) {
        setOpenReading(null);
        window.history.pushState({tq: true}, "");
      }
    }
    window.addEventListener("popstate", handlePop);
    return () => window.removeEventListener("popstate", handlePop);
  }, []);

  function openReadingWithHistory(idx) {
    window.history.pushState({tq: true}, "");
    setOpenReading(idx);
  }
  const readingKeys = Array.from({length:10},(_,i)=>i).filter(i=>READING_CONTENT[`${module.id}_${i}`]);
  const doneR = readingKeys.filter(i=>userData.completedReadings[`${module.id}_${i}`]).length;
  const pct = readingKeys.length ? Math.round(doneR/readingKeys.length*100) : 0;
  const completed = pct===100;

  if (openReading !== null) {
    const key = `${module.id}_${openReading}`;
    const content = READING_CONTENT[key];
    return h(ReadingViewer,{
      modId:module.id, ridx:openReading,
      title:content?.title||`Leitura ${openReading+1}`,
      isDone:!!userData.completedReadings[key],
      onClose:()=>setOpenReading(null),
      onDone:()=>{ markReading(module.id, openReading); setOpenReading(null); }
    });
  }

  return h("div",{className:"slide-in",
    style:{position:"fixed",inset:0,background:"#0a0a0f",zIndex:300,overflowY:"auto",paddingBottom:60}},
    // Header
    h("div",{style:{background:"#111118",borderBottom:"1px solid #00d4ff22",padding:"14px 16px",
      display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:1}},
      h("button",{onClick:onClose,style:{...S.btn,background:"none",color:"#666",padding:4,fontSize:20}},"←"),
      h("div",{style:{fontSize:24}},module.emoji),
      h("div",{style:{flex:1}},
        h("div",{style:{...S.orb,fontSize:13,color:"#fff",fontWeight:700}},module.title),
        h("div",{style:{fontSize:11,color:"#888",marginTop:2}},module.level),
      ),
      completed && h("div",{style:{...S.orb,fontSize:9,color:"#00ff88",letterSpacing:1}},"✓ DONE"),
    ),
    h("div",{style:{padding:"16px 16px 0"}},
      // Progress
      h("div",{style:{...S.cardBlue,marginBottom:16}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
          h("div",{style:{...S.raj,fontSize:14,color:"#ccc"}},"Progresso"),
          h("div",{style:{...S.orb,fontSize:13,color:pct===100?"#00ff88":"#00d4ff"}}),
        ),
        h("div",{style:{background:"#0a0a0f",borderRadius:4,height:8,overflow:"hidden",marginBottom:6}},
          h("div",{style:{height:"100%",width:`${pct}%`,borderRadius:4,transition:"width 0.5s",
            background:pct===100?"#00ff88":"linear-gradient(90deg,#00d4ff,#7c3aed)",
            boxShadow:pct===100?"0 0 10px #00ff8866":"0 0 10px #00d4ff66"}})),
        h("div",{style:{fontSize:12,color:"#666"}},`${doneR}/${readingKeys.length} leituras · ${pct}%`),
      ),
      // Description
      h("div",{style:{fontSize:14,color:"#888",marginBottom:16,lineHeight:1.6}},module.desc),
      // Readings
      h("div",{style:{...S.orb,fontSize:11,color:"#00d4ff",letterSpacing:1,marginBottom:10}},"LEITURAS"),
      readingKeys.map(idx => {
        const key = `${module.id}_${idx}`;
        const content = READING_CONTENT[key];
        const done = !!userData.completedReadings[key];
        return h("div",{key:idx,
          onClick:()=>openReadingWithHistory(idx),
          style:{...S.card,display:"flex",alignItems:"center",gap:12,cursor:"pointer",
            border:`1px solid ${done?"#00ff8833":"#1a1a2e"}`,
            background:done?"#00ff8808":"#111118"}},
          h("div",{style:{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
            background:done?"#00ff8822":"#1a1a2e",border:`2px solid ${done?"#00ff88":"#333"}`}},
            done ? h(Ico,{name:"check",size:14,color:"#00ff88"}) : h(Ico,{name:"book",size:14,color:"#555"})
          ),
          h("div",{style:{flex:1}},
            h("div",{style:{fontSize:14,color:done?"#00ff88":"#fff",fontWeight:600}},
              content?.title||`Leitura ${idx+1}`),
            h("div",{style:{fontSize:11,color:"#555",marginTop:2}},
              done?"Concluída ✓":"+50 XP ao completar"),
          ),
          h(Ico,{name:"chevronRight",size:16,color:"#444"}),
        );
      }),
      // Links
      module.links && module.links.length > 0 && h("div",null,
        h("div",{style:{...S.orb,fontSize:11,color:"#7c3aed",letterSpacing:1,marginBottom:10,marginTop:16}},"RECURSOS"),
        module.links.map((link,idx) => {
          const key = `${module.id}_lnk_${idx}`;
          const visited = !!userData.visitedLinks[key];
          return h("a",{key:idx,
            href:link.url, target:"_blank", rel:"noopener",
            onClick:()=>!visited&&markLink(module.id,idx),
            style:{...S.card,display:"flex",alignItems:"center",gap:12,cursor:"pointer",
              textDecoration:"none",border:`1px solid ${visited?"#7c3aed44":"#1a1a2e"}`,
              background:visited?"#7c3aed08":"#111118"}},
            h("div",{style:{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
              flexShrink:0,background:visited?"#7c3aed22":"#1a1a2e"}},
              h(Ico,{name:"externalLink",size:14,color:visited?"#7c3aed":"#555"})
            ),
            h("div",{style:{flex:1}},
              h("div",{style:{fontSize:14,color:visited?"#888":"#ddd",fontWeight:500}},link.title),
              h("div",{style:{fontSize:11,color:"#555"}},visited?"Visitado ✓":"+30 XP ao visitar"),
            ),
          );
        }),
      ),
      // Quiz button
      h("button",{onClick:onQuiz,
        style:{...S.btn,width:"100%",padding:"14px 0",marginTop:20,
          background:"linear-gradient(135deg,#7c3aed,#00d4ff)",
          color:"#fff",fontSize:13,letterSpacing:2,boxShadow:"0 0 20px #7c3aed33"}},
        "⚡ FAZER QUIZ"),
    )
  );
}

// ─── JOURNEY TAB ──────────────────────────────────────────────────────────────
function JourneyTab({userData, onSelect}) {
  const totalR = MODULES.reduce((s,m) => {
    return s + Array.from({length:10},(_,i)=>i).filter(i=>READING_CONTENT[`${m.id}_${i}`]).length;
  }, 0);
  const doneR = MODULES.reduce((s,m) => {
    return s + Array.from({length:10},(_,i)=>i).filter(i=>userData.completedReadings[`${m.id}_${i}`]).length;
  }, 0);
  const gPct = totalR ? Math.round(doneR/totalR*100) : 0;
  const lvlColors = {Iniciante:"#00d4ff",Intermediário:"#7c3aed",Avançado:"#f59e0b",Expert:"#ef4444"};

  return h("div",{style:{padding:"16px 16px 0"}},
    // Global progress
    h("div",{style:{marginBottom:20}},
      h("div",{style:{...S.orb,fontSize:15,color:"#fff",marginBottom:4}},"Sua Jornada"),
      h("div",{style:{fontSize:13,color:"#888",marginBottom:8}},
        `Progresso global: ${gPct}% · ${doneR}/${totalR} leituras`),
      h("div",{style:{background:"#1a1a2e",borderRadius:4,height:8,overflow:"hidden"}},
        h("div",{style:{height:"100%",width:`${gPct}%`,
          background:"linear-gradient(90deg,#00d4ff,#00ff88)",borderRadius:4,
          transition:"width 0.5s",boxShadow:"0 0 10px #00d4ff66"}})),
    ),
    // Module timeline
    MODULES.map((mod, idx) => {
      const unlocked = userData.xp >= mod.xpReq;
      const keys = Array.from({length:10},(_,i)=>i).filter(i=>READING_CONTENT[`${mod.id}_${i}`]);
      const doneRm = keys.filter(i=>userData.completedReadings[`${mod.id}_${i}`]).length;
      const completed = keys.length>0 && doneRm===keys.length;
      const lvlColor = lvlColors[mod.level] || "#888";

      return h("div",{key:mod.id,style:{display:"flex",gap:12,marginBottom:4}},
        // Timeline dot + line
        h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}},
          h("div",{style:{width:36,height:36,borderRadius:"50%",display:"flex",alignItems:"center",
            justifyContent:"center",fontSize:16,flexShrink:0,
            background:completed?"#00ff8822":unlocked?"#00d4ff22":"#1a1a2e",
            border:`2px solid ${completed?"#00ff88":unlocked?"#00d4ff":"#333"}`,
            boxShadow:unlocked&&!completed?"0 0 8px #00d4ff44":"none"}},
            completed ? "✓" : unlocked ? mod.emoji : h(Ico,{name:"lock",size:14,color:"#555"})
          ),
          idx<MODULES.length-1 && h("div",{style:{width:2,flex:1,minHeight:16,
            background:completed?"#00ff8844":"#222",margin:"3px 0"}}),
        ),
        // Card
        h("div",{
          onClick:()=>unlocked&&onSelect(mod),
          style:{...S.card,flex:1,cursor:unlocked?"pointer":"default",
            border:`1px solid ${completed?"#00ff8833":unlocked?"#00d4ff22":"#1a1a2e"}`,
            opacity:unlocked?1:0.55, marginBottom:4}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
            h("div",null,
              h("div",{style:{...S.raj,fontSize:15,color:completed?"#00ff88":unlocked?"#fff":"#555",fontWeight:700}},
                mod.title),
              h("div",{style:{fontSize:11,color:lvlColor,marginTop:2,letterSpacing:0.5}},mod.level),
            ),
            unlocked && h(Ico,{name:"chevronRight",size:16,color:completed?"#00ff88":"#00d4ff",style:{marginTop:2}}),
          ),
          unlocked && h("div",{style:{marginTop:8}},
            h("div",{style:{background:"#0a0a0f",borderRadius:3,height:4,overflow:"hidden",marginBottom:4}},
              h("div",{style:{height:"100%",width:`${keys.length?Math.round(doneRm/keys.length*100):0}%`,
                background:completed?"#00ff88":"#00d4ff",borderRadius:3,transition:"width 0.5s"}})),
            h("div",{style:{fontSize:11,color:"#555"}},
              completed ? "✓ Concluído" : `${doneRm}/${keys.length} leituras`),
          ),
          !unlocked && h("div",{style:{fontSize:11,color:"#555",marginTop:4}},
            `🔒 ${mod.xpReq} XP para desbloquear`),
        ),
      );
    })
  );
}

// ─── STUDY TAB ────────────────────────────────────────────────────────────────
function StudyTab({userData, onSelect}) {
  const unlocked = MODULES.filter(m=>userData.xp>=m.xpReq);
  const locked = MODULES.filter(m=>userData.xp<m.xpReq);
  const current = unlocked.filter(m=>{
    const keys = Array.from({length:10},(_,i)=>i).filter(i=>READING_CONTENT[`${m.id}_${i}`]);
    return keys.length>0 && keys.some(i=>!userData.completedReadings[`${m.id}_${i}`]);
  });

  function ModCard({mod}) {
    const keys = Array.from({length:10},(_,i)=>i).filter(i=>READING_CONTENT[`${mod.id}_${i}`]);
    const doneRm = keys.filter(i=>userData.completedReadings[`${mod.id}_${i}`]).length;
    const completed = keys.length>0 && doneRm===keys.length;
    const isUnlocked = userData.xp>=mod.xpReq;
    return h("div",{
      onClick:()=>isUnlocked&&onSelect(mod),
      style:{...S.card,display:"flex",alignItems:"center",gap:12,cursor:isUnlocked?"pointer":"default",
        border:`1px solid ${completed?"#00ff8833":isUnlocked?"#00d4ff22":"#1a1a2e"}`,
        opacity:isUnlocked?1:0.45}},
      h("div",{style:{fontSize:26,flexShrink:0}},isUnlocked?mod.emoji:"🔒"),
      h("div",{style:{flex:1}},
        h("div",{style:{fontSize:14,color:isUnlocked?"#fff":"#555",fontWeight:600,...S.raj}},mod.title),
        h("div",{style:{fontSize:11,color:"#666",marginTop:3}},
          isUnlocked
            ? completed ? "✓ Concluído" : `${doneRm}/${keys.length} leituras`
            : `${mod.xpReq} XP para desbloquear`),
      ),
      isUnlocked && h(Ico,{name:completed?"check":"chevronRight",size:18,color:completed?"#00ff88":"#00d4ff"}),
    );
  }

  return h("div",{style:{padding:"16px 16px 0"}},
    current.length>0 && h("div",null,
      h("div",{style:{...S.orb,fontSize:11,color:"#00d4ff",letterSpacing:1,marginBottom:10}},"ESTUDANDO AGORA"),
      current.map(m=>h(ModCard,{key:m.id,mod:m})),
    ),
    h("div",{style:{...S.orb,fontSize:11,color:"#888",letterSpacing:1,marginBottom:10,marginTop:current.length?16:0}},"TODOS OS MÓDULOS"),
    MODULES.map(m=>h(ModCard,{key:m.id,mod:m})),
  );
}

// ─── GLOSSARY TAB ─────────────────────────────────────────────────────────────
function GlossaryTab() {
  const [search, setSearch] = useState("");
  const [cat, setCat] = useState("Todos");
  const [expanded, setExpanded] = useState(null);

  const cats = ["Todos", ...GLOSSARY_CATEGORIES];
  const filtered = GLOSSARY.filter(g => {
    const matchCat = cat==="Todos" || g.cat===cat;
    const q = search.toLowerCase();
    const matchSearch = !q || g.term.toLowerCase().includes(q) || g.def.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  // Group by first letter
  const groups = {};
  filtered.forEach(g => {
    const l = g.term[0].toUpperCase();
    if (!groups[l]) groups[l] = [];
    groups[l].push(g);
  });

  return h("div",{style:{padding:"16px 16px 0"}},
    h("div",{style:{...S.orb,fontSize:15,color:"#fff",marginBottom:4}},"Glossário"),
    h("div",{style:{fontSize:13,color:"#888",marginBottom:14}},`${GLOSSARY.length} termos de trading`),
    h("input",{
      value:search, placeholder:"Buscar termo...",
      style:{...S.input,marginBottom:12},
      onChange:e=>setSearch(e.target.value),
    }),
    h("div",{style:{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:12,
      scrollbarWidth:"none",WebkitOverflowScrolling:"touch"}},
      cats.map(c => h("button",{key:c,onClick:()=>setCat(c),
        style:{...S.btn,...S.orb,fontSize:10,letterSpacing:0.5,whiteSpace:"nowrap",
          padding:"6px 12px",flexShrink:0,
          background:cat===c?"#00d4ff22":"#111118",
          color:cat===c?"#00d4ff":"#666",
          border:`1px solid ${cat===c?"#00d4ff44":"#1a1a2e"}`}},c))
    ),
    filtered.length===0 && h("div",{style:{textAlign:"center",color:"#555",padding:40}},
      "Nenhum termo encontrado"),
    Object.keys(groups).sort().map(letter =>
      h("div",{key:letter},
        h("div",{style:{...S.orb,fontSize:11,color:"#00d4ff44",letterSpacing:2,marginBottom:6,marginTop:4}},letter),
        groups[letter].map((g,i) => {
          const id = `${letter}_${i}`;
          const open = expanded===id;
          return h("div",{key:id,
            onClick:()=>setExpanded(open?null:id),
            style:{...S.card,cursor:"pointer",
              border:`1px solid ${open?"#00d4ff33":"#1a1a2e"}`,marginBottom:6}},
            h("div",{style:{display:"flex",alignItems:"center",gap:8}},
              h("span",{style:{fontSize:18,flexShrink:0}},g.emoji),
              h("div",{style:{flex:1}},
                h("div",{style:{fontSize:14,color:"#fff",fontWeight:600,...S.raj}},g.term),
                h("div",{style:{fontSize:10,color:"#555",marginTop:2}},g.cat),
              ),
              h(Ico,{name:open?"chevronDown":"chevronRight",size:16,color:"#444"}),
            ),
            open && h("div",{style:{fontSize:13,color:"#aaa",lineHeight:1.6,marginTop:10,
              paddingTop:10,borderTop:"1px solid #1a1a2e"}},g.def),
          );
        })
      )
    )
  );
}
