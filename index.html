  const [confetti, setConfetti] = useState(false);
  const [selectedModule, setSelectedModule] = useState(null);
  const [quizModule, setQuizModule] = useState(null);
  const prevLevel = useRef(null);
  // Refs to always have latest state in popstate handler
  const selectedModuleRef = useRef(null);
  const quizModuleRef = useRef(null);
  const setSelectedModuleRef = useRef(null);
  const setQuizModuleRef = useRef(null);

  // Keep refs in sync
  useEffect(() => { selectedModuleRef.current = selectedModule; }, [selectedModule]);
  useEffect(() => { quizModuleRef.current = quizModule; }, [quizModule]);

  // Hardware back button (Android)
  useEffect(() => {
    // Push a dummy state so we can intercept the first back press
    window.history.pushState({tq: true}, "");

    function handlePop() {
      // Close in reverse order: quiz → module detail → (stay on tab)
      if (quizModuleRef.current) {
        setQuizModule(null);
        window.history.pushState({tq: true}, "");
      } else if (selectedModuleRef.current) {
        setSelectedModule(null);
        window.history.pushState({tq: true}, "");
      }
      // If nothing is open, let the system handle (minimize/exit app)
    }

    window.addEventListener("popstate", handlePop);
    return () => window.removeEventListener("popstate", handlePop);
  }, []);

  // Auto-login: try to restore last session on mount
  useEffect(() => {
    const last = _get("tq_last_user");
    if (last) {
      const all = JSON.parse(_get("tq_users") || "{}");
      if (all[last]) {
        setUsername(last);
        setUserData(all[last]);
        setUser(true);
        prevLevel.current = getLevelInfo(all[last].xp).level;
      }
    }
  }, []);

  function handleLogin(uname, data) {
    setUsername(uname);
    setUserData(data);
    setUser(true);
    _set("tq_last_user", uname);
    prevLevel.current = getLevelInfo(data.xp).level;
  }

  function addXp(amount) {
    setUserData(prev => {
      const newXp = prev.xp + amount;
      const nd = {...prev, xp:newXp};
      saveUser(username, nd);
      const nl = getLevelInfo(newXp);
      if (nl.level > (prevLevel.current||1)) {
        prevLevel.current = nl.level;
        setTimeout(()=>{ setShowLevelUp(nl); setConfetti(true); setTimeout(()=>setConfetti(false),3000); },300);
      }
      return nd;
    });
    const id = Date.now()+Math.random();
    setXpFloats(f=>[...f,{id,amount}]);
  }

  function markReading(moduleId, readingIdx) {
    setUserData(prev => {
      const key = `${moduleId}_${readingIdx}`;
      if (prev.completedReadings[key]) return prev;
      const upd = {...prev, completedReadings:{...prev.completedReadings,[key]:true}};
      const keys = Array.from({length:10},(_,i)=>i).filter(i=>READING_CONTENT[`${moduleId}_${i}`]);
      const allDone = keys.every(i=>upd.completedReadings[`${moduleId}_${i}`]);
      if (allDone && !prev.completedModules.includes(moduleId)) {
        upd.completedModules=[...prev.completedModules,moduleId];
        setConfetti(true); setTimeout(()=>setConfetti(false),3000);
        const ach=[...(upd.achievements||[])];
        if (moduleId===1 && !ach.includes("first_trade")) ach.push("first_trade");
        if (moduleId===1 && !ach.includes("risk_master")) ach.push("risk_master");
        if (moduleId===2 && !ach.includes("candle_reader")) ach.push("candle_reader");
        if (moduleId===5 && !ach.includes("fibonacci_student")) ach.push("fibonacci_student");
        if (moduleId===11 && !ach.includes("smart_money")) ach.push("smart_money");
        if (upd.completedModules.length===MODULES.length && !ach.includes("all_modules")) ach.push("all_modules");
        upd.achievements=ach;
      }
      saveUser(username, upd);
      return upd;
    });
    addXp(50);
  }

  function markLink(moduleId, linkIdx) {
    setUserData(prev => {
      const key = `${moduleId}_lnk_${linkIdx}`;
      if (prev.visitedLinks[key]) return prev;
      const upd = {...prev, visitedLinks:{...prev.visitedLinks,[key]:true}};
      saveUser(username, upd);
      return upd;
    });
    addXp(30);
  }

  function logout() {
    _set("tq_last_user", "");
    setUser(null); setUserData(null); setUsername("");
    setSelectedModule(null); setQuizModule(null);
    setActiveTab("journey");
  }

  function resetAccount() {
    if (!window.confirm("Tem certeza? Todo o progresso de \"" + username + "\" será apagado. Esta ação não pode ser desfeita.")) return;
    const fresh = initData();
    saveUser(username, fresh);
    setUserData(fresh);
    setSelectedModule(null);
    setQuizModule(null);
    setActiveTab("journey");
  }

  if (!user) return h(AuthScreen,{onLogin:handleLogin});

  const lvl = getLevelInfo(userData.xp);
  const xpPct = getXpPct(userData.xp);
  const nextLvl = LEVELS.find(l=>l.level===lvl.level+1);

  const TABS = [
    {id:"journey",icon:"map",label:"Jornada"},
    {id:"study",icon:"book",label:"Estudar"},
    {id:"achievements",icon:"trophy",label:"Conquistas"},
    {id:"glossary",icon:"bookMarked",label:"Glossário"},
    {id:"profile",icon:"user",label:"Perfil"},
  ];

  return h("div",{className:"hex-bg",style:{minHeight:"100vh",maxWidth:430,margin:"0 auto",
    display:"flex",flexDirection:"column",background:"#0a0a0f"}},
    // Overlays
    h(Confetti,{active:confetti}),
    xpFloats.map(f=>h(XpFloat,{key:f.id,amount:f.amount,onDone:()=>setXpFloats(x=>x.filter(i=>i.id!==f.id))})),
    showLevelUp && h(LevelUpScreen,{level:showLevelUp,onClose:()=>setShowLevelUp(null)}),
    quizModule && h(QuizScreen,{module:quizModule,addXp,onClose:()=>setQuizModule(null)}),
    selectedModule && !quizModule && h(ModuleDetail,{
      module:selectedModule, userData, markReading, markLink,
      onClose:()=>setSelectedModule(null),
      onQuiz:()=>setQuizModule(selectedModule),
    }),
    // Header
    h("div",{style:{background:"#111118",borderBottom:"1px solid #00d4ff22",padding:"10px 16px",flexShrink:0}},
      h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:8}},
        h("div",{style:{width:36,height:36,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
          background:"linear-gradient(135deg,#00d4ff,#7c3aed)",flexShrink:0,
          ...S.orb,fontSize:13,fontWeight:700,color:"#fff"}},
          username.slice(0,2).toUpperCase()),
        h("div",{style:{flex:1}},
          h("div",{style:{...S.orb,fontSize:12,color:"#00d4ff"}},username),
          h("div",{style:{fontSize:12,color:lvl.color}},`${lvl.icon} ${lvl.name}`),
        ),
        h("div",{style:{textAlign:"right",marginRight:4}},
          h("div",{style:{...S.orb,fontSize:14,color:"#ffd700",fontWeight:700}},
            `${userData.xp.toLocaleString()} XP`),
          h("div",{style:{fontSize:11,color:"#555"}},`Nível ${lvl.level}`),
        ),

      ),
      h("div",{style:{background:"#1a1a2e",borderRadius:4,height:5,overflow:"hidden"}},
        h("div",{style:{height:"100%",width:`${xpPct}%`,borderRadius:4,transition:"width 0.6s",
          background:`linear-gradient(90deg,${lvl.color},${nextLvl?.color||lvl.color})`,
          boxShadow:`0 0 8px ${lvl.color}88`}})),
      h("div",{style:{display:"flex",justifyContent:"space-between",marginTop:3}},
        h("div",{style:{fontSize:10,color:"#555"}},`${xpPct}% para nível ${lvl.level+1}`),
        nextLvl && h("div",{style:{fontSize:10,color:"#555"}},`${nextLvl.xpMin-userData.xp} XP restantes`),
      ),
    ),
    // Content
    h("div",{style:{flex:1,overflowY:"auto",paddingBottom:70}},
      activeTab==="journey" && h(JourneyTab,{userData,onSelect:setSelectedModule}),
      activeTab==="study" && h(StudyTab,{userData,onSelect:setSelectedModule}),
      activeTab==="achievements" && h(AchievementsTab,{userData}),
      activeTab==="glossary" && h(GlossaryTab,null),
      activeTab==="profile" && h(ProfileTab,{username,userData,onLogout:logout,onReset:resetAccount}),
    ),
    // Bottom nav
    h("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
      width:"100%",maxWidth:430,background:"#111118",borderTop:"1px solid #00d4ff22",
      display:"flex",zIndex:100}},
      TABS.map(t=>h("button",{key:t.id,onClick:()=>setActiveTab(t.id),
        style:{...S.btn,flex:1,padding:"10px 0 7px",background:"none",
          display:"flex",flexDirection:"column",alignItems:"center",gap:2,
          color:activeTab===t.id?"#00d4ff":"#555",
          borderTop:activeTab===t.id?"2px solid #00d4ff":"2px solid transparent"}},
        h(Ico,{name:t.icon,size:18,color:activeTab===t.id?"#00d4ff":"#555"}),
        h("span",{style:{...S.raj,fontSize:10,letterSpacing:0.5}},t.label),
      ))
    ),
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(React.StrictMode, null, React.createElement(App))
);

  <script>
  let _deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    _deferredPrompt = e;
    // Show install button after a short delay
    setTimeout(() => {
      const btn = document.getElementById('_install_btn');
      if (btn) btn.style.display = 'flex';
    }, 2000);
  });
  window.addEventListener('appinstalled', () => {
    const btn = document.getElementById('_install_btn');
    if (btn) btn.style.display = 'none';
  });
  </script>
