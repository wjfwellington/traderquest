// ─── QUIZ SCREEN ──────────────────────────────────────────────────────────────
function QuizScreen({module, addXp, onClose}) {
  const PASS_SCORE = 7;
  const XP_BONUS = 150;
  // Fix: questions must be stable — computed once via useState initial value
  const [questions] = useState(() => {
    const allQ = (QUIZ[module.id] || []).slice();
    if (allQ.length >= 10) {
      for (let i = allQ.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allQ[i], allQ[j]] = [allQ[j], allQ[i]];
      }
      return allQ.slice(0, 10);
    }
    return allQ;
  });
  const [cur, setCur] = useState(0);
  const [sel, setSel] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [streak, setStreak] = useState(0);
  const [done, setDone] = useState(false);
  const [score, setScore] = useState(0);
  const [xpAwarded, setXpAwarded] = useState(false);
  const [anim, setAnim] = useState("");

  if (!questions.length) return h("div",{style:{position:"fixed",inset:0,background:"#0a0a0f",zIndex:500,
    display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",color:"#888"}},
    h("div",{style:{fontSize:40,marginBottom:16}},"📭"),
    h("div",{style:{marginBottom:24}},"Quiz em breve"),
    h("button",{onClick:onClose,style:{...S.btn,background:"#00d4ff22",color:"#00d4ff",padding:"10px 24px"}},"Voltar")
  );

  if (done) {
    const passed = score >= PASS_SCORE;
    if (passed && !xpAwarded) {
      setXpAwarded(true);
      addXp(XP_BONUS);
    }
    return h("div",{style:{position:"fixed",inset:0,background:"#0a0a0f",zIndex:500,overflowY:"auto",
      padding:24,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}},
      h("div",{style:{fontSize:72,marginBottom:12}}, passed?"🏆":"📚"),
      h("div",{style:{...S.orb,fontSize:22,color:passed?"#00ff88":"#ef4444",fontWeight:900,marginBottom:6}},
        passed?"APROVADO!":"REPROVADO"),
      h("div",{style:{...S.orb,fontSize:40,color:"#ffd700",marginBottom:4}},`${score}/${questions.length}`),
      h("div",{style:{fontSize:14,color:"#888",marginBottom:4}},
        `Mínimo para passar: ${PASS_SCORE}/${questions.length}`),
      passed
        ? h("div",{style:{marginTop:16,background:"#00ff8811",border:"1px solid #00ff8844",
            borderRadius:10,padding:"12px 24px",textAlign:"center"}},
            h("div",{style:{...S.orb,fontSize:13,color:"#00ff88",letterSpacing:1}},`+ ${XP_BONUS} XP`),
            h("div",{style:{fontSize:12,color:"#888",marginTop:4}},"Bônus de conclusão desbloqueado!")
          )
        : h("div",{style:{marginTop:12,fontSize:13,color:"#888",textAlign:"center"}},
            "Estude mais e tente novamente para ganhar o bônus de XP."),
      h("button",{onClick:onClose,
        style:{...S.btn,padding:"13px 32px",marginTop:24,
          background:passed?"linear-gradient(135deg,#00ff88,#00d4ff)":"linear-gradient(135deg,#00d4ff,#0077ff)",
          color:passed?"#000":"#fff",fontSize:13,letterSpacing:2}},
        passed?"CONCLUIR ✓":"TENTAR NOVAMENTE")
    );
  }

  const q = questions[cur];
  function pick(idx) {
    if (answered) return;
    setSel(idx);
    setAnswered(true);
    if (idx === q.c) {
      setScore(s=>s+1);
      setStreak(s=>s+1);
      setAnim("correct");
    } else {
      setStreak(0);
      setAnim("shake");
    }
    setTimeout(()=>setAnim(""),600);
  }
  function next() {
    if (cur < questions.length-1) { setCur(c=>c+1); setSel(null); setAnswered(false); setAnim(""); }
    else setDone(true);
  }

  const remaining = questions.length - cur;
  const stillPossible = score + remaining >= PASS_SCORE;

  return h("div",{style:{position:"fixed",inset:0,background:"#0a0a0f",zIndex:500,overflowY:"auto"}},
    h("div",{style:{background:"#111118",borderBottom:"1px solid #00d4ff22",padding:"12px 16px",
      display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:1}},
      h("button",{onClick:onClose,style:{...S.btn,background:"none",color:"#666",padding:4,fontSize:20}},"←"),
      h("div",{style:{flex:1,...S.orb,fontSize:12,color:"#00d4ff",letterSpacing:1}},"QUIZ ⚡"),
      h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}},
        h("div",{style:{...S.orb,fontSize:12,color:"#ffd700"}},`${cur+1}/${questions.length}`),
        h("div",{style:{fontSize:10,color:score>=(PASS_SCORE-(questions.length-cur-1))?"#00ff88":"#888"}},
          `✓ ${score} | mín. ${PASS_SCORE}`),
      ),
    ),
    h("div",{style:{padding:"12px 16px 0",maxWidth:600,margin:"0 auto"}},
      h("div",{style:{background:"#1a1a2e",borderRadius:4,height:5,overflow:"hidden",marginBottom:4}},
        h("div",{style:{height:"100%",width:`${((cur+1)/questions.length)*100}%`,
          background:"linear-gradient(90deg,#00d4ff,#7c3aed)",transition:"width 0.4s"}})),
      h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:16}},
        h("div",{style:{fontSize:10,color:"#555"}},`Acertos: ${score}`),
        h("div",{style:{fontSize:10,color:stillPossible?"#00ff8888":"#ef444488"}},
          stillPossible?`Ainda pode passar!`:`Mínimo de ${PASS_SCORE} não atingível`),
      ),
      streak>1 && h("div",{style:{textAlign:"center",color:"#ffd700",...S.orb,fontSize:11,letterSpacing:1,marginBottom:12}},
        `🔥 COMBO x${streak}`),
      h("div",{className:anim,style:{...S.cardBlue,marginBottom:14,padding:18}},
        h("div",{style:{...S.raj,fontSize:16,color:"#fff",lineHeight:1.5,fontWeight:600}}, q.q)
      ),
      q.opts.map((opt,idx) => {
        let bg="#111118", border="#1a1a2e", color="#ccc";
        if (answered) {
          if (idx===q.c){bg="#00ff8822";border="#00ff88";color="#00ff88";}
          else if (idx===sel&&idx!==q.c){bg="#ef444422";border="#ef4444";color="#ef4444";}
        } else if (sel===idx){bg="#00d4ff22";border="#00d4ff";color="#00d4ff";}
        return h("button",{key:idx,onClick:()=>pick(idx),
          style:{...S.btn,width:"100%",textAlign:"left",padding:"12px 14px",marginBottom:8,
            background:bg,border:`1px solid ${border}`,color,...S.raj,fontSize:15,fontWeight:500,
            transition:"all 0.2s"}},
          opt
        );
      }),
      answered && h("div",{style:{...S.card,border:`1px solid ${sel===q.c?"#00ff8833":"#ef444433"}`,marginTop:2,marginBottom:8}},
        h("div",{style:{fontSize:13,color:sel===q.c?"#00ff88":"#ef4444",marginBottom:4}},
          sel===q.c?"✓ Correto!":"✗ Incorreto"),
        h("div",{style:{fontSize:13,color:"#888"}},q.exp)
      ),
      answered && h("button",{onClick:next,
        style:{...S.btn,width:"100%",padding:"13px 0",
          background:"linear-gradient(135deg,#00d4ff,#0077ff)",
          color:"#fff",fontSize:12,letterSpacing:2}},
        cur<questions.length-1?"PRÓXIMA →":"VER RESULTADO")
    )
  );
}

// ─── MODULE DETAIL ────────────────────────────────────────────────────────────
function ModuleDetail({module, userData, markReading, markLink, onClose, onQuiz}) {
  const [openReading, setOpenReading] = useState(null);
  const openReadingRef = useRef(null);
  useEffect(() => { openReadingRef.current = openReading; }, [openReading]);

  // Back button inside module detail closes reading first
  useEffect(() => {
    function handlePop() {
      if (openReadingRef.current !== null) {
        setOpenReading(null);
        window.history.pushState({tq: true}, "");
      }
    }
    window.addEventListener("popstate", handlePop);
    return () => window.removeEventListener("popstate", handlePop);
  }, []);

  function openReadingWithHistory(idx) {
    window.history.pushState({tq: true}, "");
    setOpenReading(idx);
  }
  const readingKeys = Array.from({length:10},(_,i)=>i).filter(i=>READING_CONTENT[`${module.id}_${i}`]);
  const doneR = readingKeys.filter(i=>userData.completedReadings[`${module.id}_${i}`]).length;
  const pct = readingKeys.length ? Math.round(doneR/readingKeys.length*100) : 0;
  const completed = pct===100;

  if (openReading !== null) {
    const key = `${module.id}_${openReading}`;
    const content = READING_CONTENT[key];
    return h(ReadingViewer,{
      modId:module.id, ridx:openReading,
      title:content?.title||`Leitura ${openReading+1}`,
      isDone:!!userData.completedReadings[key],
      onClose:()=>setOpenReading(null),
      onDone:()=>{ markReading(module.id, openReading); setOpenReading(null); }
    });
  }

  return h("div",{className:"slide-in",
    style:{position:"fixed",inset:0,background:"#0a0a0f",zIndex:300,overflowY:"auto",paddingBottom:60}},
    // Header
    h("div",{style:{background:"#111118",borderBottom:"1px solid #00d4ff22",padding:"14px 16px",
      display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:1}},
      h("button",{onClick:onClose,style:{...S.btn,background:"none",color:"#666",padding:4,fontSize:20}},"←"),
      h("div",{style:{fontSize:24}},module.emoji),
      h("div",{style:{flex:1}},
        h("div",{style:{...S.orb,fontSize:13,color:"#fff",fontWeight:700}},module.title),
        h("div",{style:{fontSize:11,color:"#888",marginTop:2}},module.level),
      ),
      completed && h("div",{style:{...S.orb,fontSize:9,color:"#00ff88",letterSpacing:1}},"✓ DONE"),
    ),
    h("div",{style:{padding:"16px 16px 0"}},
      // Progress
      h("div",{style:{...S.cardBlue,marginBottom:16}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
          h("div",{style:{...S.raj,fontSize:14,color:"#ccc"}},"Progresso"),
          h("div",{style:{...S.orb,fontSize:13,color:pct===100?"#00ff88":"#00d4ff"}}),
        ),

// ─── JOURNEY TAB ──────────────────────────────────────────────────────────────
function JourneyTab({userData, onSelect}) {
  const totalR = MODULES.reduce((s,m) => {
    return s + Array.from({length:10},(_,i)=>i).filter(i=>READING_CONTENT[`${m.id}_${i}`]).length;
  }, 0);
  const doneR = MODULES.reduce((s,m) => {
    return s + Array.from({length:10},(_,i)=>i).filter(i=>userData.completedReadings[`${m.id}_${i}`]).length;
  }, 0);
  const gPct = totalR ? Math.round(doneR/totalR*100) : 0;
  const lvlColors = {Iniciante:"#00d4ff",Intermediário:"#7c3aed",Avançado:"#f59e0b",Expert:"#ef4444"};

  return h("div",{style:{padding:"16px 16px 0"}},
    // Global progress
    h("div",{style:{marginBottom:20}},

          transition:"width 0.5s",boxShadow:"0 0 10px #00d4ff66"}})),
    ),
    // Module timeline

      const unlocked = userData.xp >= mod.xpReq;

      const doneRm = keys.filter(i=>userData.completedReadings[`${mod.id}_${i}`]).length;
      const completed = keys.length>0 && doneRm===keys.length;
      const lvlColor = lvlColors[mod.level] || "#888";

            border:`2px solid ${completed?"#00ff88":unlocked?"#00d4ff":"#333"}`,
            boxShadow:unlocked&&!completed?"0 0 8px #00d4ff44":"none"}},
            completed ? "✓" : unlocked ? mod.emoji : h(Ico,{name:"lock",size:14,color:"#555"})
          ),
          idx<MODULES.length-1 && h("div",{style:{width:2,flex:1,minHeight:16,

        ),

        h("div",{

          style:{...S.card,flex:1,cursor:unlocked?"pointer":"default",
            border:`1px solid ${completed?"#00ff8833":unlocked?"#00d4ff22":"#1a1a2e"}`,
            opacity:unlocked?1:0.55, marginBottom:4}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
            h("div",null,
              h("div",{style:{...S.raj,fontSize:15,color:completed?"#00ff88":unlocked?"#fff":"#555",fontWeight:700}},

// ─── STUDY TAB ────────────────────────────────────────────────────────────────
function StudyTab({userData, onSelect}) {
  const unlocked = MODULES.filter(m=>userData.xp>=m.xpReq);
  const locked = MODULES.filter(m=>userData.xp<m.xpReq);
  const current = unlocked.filter(m=>{
    const keys = Array.from({length:10},(_,i)=>i).filter(i=>READING_CONTENT[`${m.id}_${i}`]);
    return keys.length>0 && keys.some(i=>!userData.completedReadings[`${m.id}_${i}`]);
  });

  function ModCard({mod}) {
    const keys = Array.from({length:10},(_,i)=>i).filter(i=>READING_CONTENT[`${mod.id}_${i}`]);
    const doneRm = keys.filter(i=>userData.completedReadings[`${mod.id}_${i}`]).length;
    const completed = keys.length>0 && doneRm===keys.length;
    const isUnlocked = userData.xp>=mod.xpReq;
    return h("div",{
      onClick:()=>isUnlocked&&onSelect(mod),
      style:{...S.card,display:"flex",alignItems:"center",gap:12,cursor:isUnlocked?"pointer":"default",
        border:`1px solid ${completed?"#00ff8833":isUnlocked?"#00d4ff22":"#1a1a2e"}`,

      h("div",{style:{fontSize:26,flexShrink:0}},isUnlocked?mod.emoji:"🔒"),

        h("div",{style:{fontSize:11,color:"#666",marginTop:3}},
          isUnlocked
            ? completed ? "✓ Concluído" : `${doneRm}/${keys.length} leituras`
            : `${mod.xpReq} XP para desbloquear`),
      ),
      isUnlocked && h(Ico,{name:completed?"check":"chevronRight",size:18,color:completed?"#00ff88":"#00d4ff"}),

  return h("div",{style:{padding:"16px 16px 0"}},

// ─── GLOSSARY TAB ─────────────────────────────────────────────────────────────
function GlossaryTab() {
  const [search, setSearch] = useState("");
  const [cat, setCat] = useState("Todos");
  const [expanded, setExpanded] = useState(null);

  const cats = ["Todos", ...GLOSSARY_CATEGORIES];
  const filtered = GLOSSARY.filter(g => {
    const matchCat = cat==="Todos" || g.cat===cat;
    const q = search.toLowerCase();
    const matchSearch = !q || g.term.toLowerCase().includes(q) || g.def.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  // Group by first letter
  const groups = {};
  filtered.forEach(g => {
    const l = g.term[0].toUpperCase();
    if (!groups[l]) groups[l] = [];
    groups[l].push(g);
  });

  return h("div",{style:{padding:"16px 16px 0"}},
    h("div",{style:{...S.orb,fontSize:15,color:"#fff",marginBottom:4}},"Glossário"),
    h("div",{style:{fontSize:13,color:"#888",marginBottom:14}},`${GLOSSARY.length} termos de trading`),
    h("input",{
      value:search, placeholder:"Buscar termo...",
      style:{...S.input,marginBottom:12},
      onChange:e=>setSearch(e.target.value),
    }),
    h("div",{style:{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:12,
      scrollbarWidth:"none",WebkitOverflowScrolling:"touch"}},
      cats.map(c => h("button",{key:c,onClick:()=>setCat(c),
        style:{...S.btn,...S.orb,fontSize:10,letterSpacing:0.5,whiteSpace:"nowrap",
          padding:"6px 12px",flexShrink:0,
          background:cat===c?"#00d4ff22":"#111118",
          color:cat===c?"#00d4ff":"#666",
          border:`1px solid ${cat===c?"#00d4ff44":"#1a1a2e"}`}},c))
    ),
    filtered.length===0 && h("div",{style:{textAlign:"center",color:"#555",padding:40}},
      "Nenhum termo encontrado"),
    Object.keys(groups).sort().map(letter =>
      h("div",{key:letter},
        h("div",{style:{...S.orb,fontSize:11,color:"#00d4ff44",letterSpacing:2,marginBottom:6,marginTop:4}},letter),
        groups[letter].map((g,i) => {
          const id = `${letter}_${i}`;
          const open = expanded===id;
          return h("div",{key:id,
            onClick:()=>setExpanded(open?null:id),
            style:{...S.card,cursor:"pointer",
              border:`1px solid ${open?"#00d4ff33":"#1a1a2e"}`,marginBottom:6}},
            h("div",{style:{display:"flex",alignItems:"center",gap:8}},
              h("span",{style:{fontSize:18,flexShrink:0}},g.emoji),
              h("div",{style:{flex:1}},
                h("div",{style:{fontSize:14,color:"#fff",fontWeight:600,...S.raj}},g.term),
                h("div",{style:{fontSize:10,color:"#555",marginTop:2}},g.cat),
              ),
              h(Ico,{name:open?"chevronDown":"chevronRight",size:16,color:"#444"}),
            ),
            open && h("div",{style:{fontSize:13,color:"#aaa",lineHeight:1.6,marginTop:10,
              paddingTop:10,borderTop:"1px solid #1a1a2e"}},g.def),
          );
        })
      )
    )
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [username, setUsername] = useState("");
  const [userData, setUserData] = useState(null);
  const [activeTab, setActiveTab] = useState("journey");
  const [xpFloats, setXpFloats] = useState([]);
  const [showLevelUp, setShowLevelUp] = useState(null);
  const [confetti, setConfetti] = useState(false);
  const [selectedModule, setSelectedModule] = useState(null);
  const [quizModule, setQuizModule] = useState(null);
  const prevLevel = useRef(null);
  // Refs to always have latest state in popstate handler
  const selectedModuleRef = useRef(null);
  const quizModuleRef = useRef(null);
  const setSelectedModuleRef = useRef(null);
  const setQuizModuleRef = useRef(null);

  // Keep refs in sync
  useEffect(() => { selectedModuleRef.current = selectedModule; }, [selectedModule]);
  useEffect(() => { quizModuleRef.current = quizModule; }, [quizModule]);

  // Hardware back button (Android)
  useEffect(() => {
    // Push a dummy state so we can intercept the first back press
    window.history.pushState({tq: true}, "");

    function handlePop() {
      // Close in reverse order: quiz → module detail → (stay on tab)
      if (quizModuleRef.current) {
        setQuizModule(null);
        window.history.pushState({tq: true}, "");
      } else if (selectedModuleRef.current) {
        setSelectedModule(null);
        window.history.pushState({tq: true}, "");
      }
      // If nothing is open, let the system handle (minimize/exit app)
    }

    window.addEventListener("popstate", handlePop);
    return () => window.removeEventListener("popstate", handlePop);
  }, []);

  // Auto-login: try to restore last session on mount
  useEffect(() => {
    const last = _get("tq_last_user");
    if (last) {
      const all = JSON.parse(_get("tq_users") || "{}");
      if (all[last]) {
        setUsername(last);
        setUserData(all[last]);
        setUser(true);
        prevLevel.current = getLevelInfo(all[last].xp).level;
      }
    }
  }, []);

  function handleLogin(uname, data) {
    setUsername(uname);
    setUserData(data);
    setUser(true);
    _set("tq_last_user", uname);
    prevLevel.current = getLevelInfo(data.xp).level;
  }

  function addXp(amount) {
    setUserData(prev => {
      const newXp = prev.xp + amount;
      const nd = {...prev, xp:newXp};
      saveUser(username, nd);
      const nl = getLevelInfo(newXp);
      if (nl.level > (prevLevel.current||1)) {
        prevLevel.current = nl.level;
        setTimeout(()=>{ setShowLevelUp(nl); setConfetti(true); setTimeout(()=>setConfetti(false),3000); },300);
      }
      return nd;
    });
    const id = Date.now()+Math.random();
    setXpFloats(f=>[...f,{id,amount}]);
  }

  function markReading(moduleId, readingIdx) {
    setUserData(prev => {
      const key = `${moduleId}_${readingIdx}`;
      if (prev.completedReadings[key]) return prev;
      const upd = {...prev, completedReadings:{...prev.completedReadings,[key]:true}};
      const keys = Array.from({length:10},(_,i)=>i).filter(i=>READING_CONTENT[`${moduleId}_${i}`]);
      const allDone = keys.every(i=>upd.completedReadings[`${moduleId}_${i}`]);
      if (allDone && !prev.completedModules.includes(moduleId)) {
        upd.completedModules=[...prev.completedModules,moduleId];
        setConfetti(true); setTimeout(()=>setConfetti(false),3000);
        const ach=[...(upd.achievements||[])];
        if (moduleId===1 && !ach.includes("first_trade")) ach.push("first_trade");
        if (moduleId===1 && !ach.includes("risk_master")) ach.push("risk_master");
        if (moduleId===2 && !ach.includes("candle_reader")) ach.push("candle_reader");
        if (moduleId===5 && !ach.includes("fibonacci_student")) ach.push("fibonacci_student");
        if (moduleId===11 && !ach.includes("smart_money")) ach.push("smart_money");
        if (upd.completedModules.length===MODULES.length && !ach.includes("all_modules")) ach.push("all_modules");
        upd.achievements=ach;
      }
      saveUser(username, upd);
      return upd;
    });
    addXp(50);
  }

  function markLink(moduleId, linkIdx) {
    setUserData(prev => {
      const key = `${moduleId}_lnk_${linkIdx}`;
      if (prev.visitedLinks[key]) return prev;
      const upd = {...prev, visitedLinks:{...prev.visitedLinks,[key]:true}};
      saveUser(username, upd);
      return upd;
    });
    addXp(30);
  }

  function logout() {
    _set("tq_last_user", "");
    setUser(null); setUserData(null); setUsername("");
    setSelectedModule(null); setQuizModule(null);
    setActiveTab("journey");
  }

  function resetAccount() {
    if (!window.confirm("Tem certeza? Todo o progresso de \"" + username + "\" será apagado. Esta ação não pode ser desfeita.")) return;
    const fresh = initData();
    saveUser(username, fresh);
    setUserData(fresh);
    setSelectedModule(null);
    setQuizModule(null);
    setActiveTab("journey");
  }

  if (!user) return h(AuthScreen,{onLogin:handleLogin});

  const lvl = getLevelInfo(userData.xp);
  const xpPct = getXpPct(userData.xp);
  const nextLvl = LEVELS.find(l=>l.level===lvl.level+1);

  const TABS = [
    {id:"journey",icon:"map",label:"Jornada"},
    {id:"study",icon:"book",label:"Estudar"},
    {id:"achievements",icon:"trophy",label:"Conquistas"},
    {id:"glossary",icon:"bookMarked",label:"Glossário"},
    {id:"profile",icon:"user",label:"Perfil"},
  ];

  return h("div",{className:"hex-bg",style:{minHeight:"100vh",maxWidth:430,margin:"0 auto",
    display:"flex",flexDirection:"column",background:"#0a0a0f"}},
    // Overlays
    h(Confetti,{active:confetti}),
    xpFloats.map(f=>h(XpFloat,{key:f.id,amount:f.amount,onDone:()=>setXpFloats(x=>x.filter(i=>i.id!==f.id))})),
    showLevelUp && h(LevelUpScreen,{level:showLevelUp,onClose:()=>setShowLevelUp(null)}),
    quizModule && h(QuizScreen,{module:quizModule,addXp,onClose:()=>setQuizModule(null)}),
    selectedModule && !quizModule && h(ModuleDetail,{
      module:selectedModule, userData, markReading, markLink,
      onClose:()=>setSelectedModule(null),
      onQuiz:()=>setQuizModule(selectedModule),
    }),
    // Header
    h("div",{style:{background:"#111118",borderBottom:"1px solid #00d4ff22",padding:"10px 16px",flexShrink:0}},
      h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:8}},
        h("div",{style:{width:36,height:36,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
          background:"linear-gradient(135deg,#00d4ff,#7c3aed)",flexShrink:0,
          ...S.orb,fontSize:13,fontWeight:700,color:"#fff"}},
          username.slice(0,2).toUpperCase()),
        h("div",{style:{flex:1}},
          h("div",{style:{...S.orb,fontSize:12,color:"#00d4ff"}},username),
          h("div",{style:{fontSize:12,color:lvl.color}},`${lvl.icon} ${lvl.name}`),
        ),
        h("div",{style:{textAlign:"right",marginRight:4}},
          h("div",{style:{...S.orb,fontSize:14,color:"#ffd700",fontWeight:700}},
            `${userData.xp.toLocaleString()} XP`),
          h("div",{style:{fontSize:11,color:"#555"}},`Nível ${lvl.level}`),
        ),

      ),
      h("div",{style:{background:"#1a1a2e",borderRadius:4,height:5,overflow:"hidden"}},
        h("div",{style:{height:"100%",width:`${xpPct}%`,borderRadius:4,transition:"width 0.6s",
          background:`linear-gradient(90deg,${lvl.color},${nextLvl?.color||lvl.color})`,
          boxShadow:`0 0 8px ${lvl.color}88`}})),
      h("div",{style:{display:"flex",justifyContent:"space-between",marginTop:3}},
        h("div",{style:{fontSize:10,color:"#555"}},`${xpPct}% para nível ${lvl.level+1}`),
        nextLvl && h("div",{style:{fontSize:10,color:"#555"}},`${nextLvl.xpMin-userData.xp} XP restantes`),
      ),
    ),
    // Content
    h("div",{style:{flex:1,overflowY:"auto",paddingBottom:70}},
      activeTab==="journey" && h(JourneyTab,{userData,onSelect:setSelectedModule}),
      activeTab==="study" && h(StudyTab,{userData,onSelect:setSelectedModule}),
      activeTab==="achievements" && h(AchievementsTab,{userData}),
      activeTab==="glossary" && h(GlossaryTab,null),
      activeTab==="profile" && h(ProfileTab,{username,userData,onLogout:logout,onReset:resetAccount}),
    ),
    // Bottom nav
    h("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
      width:"100%",maxWidth:430,background:"#111118",borderTop:"1px solid #00d4ff22",
      display:"flex",zIndex:100}},
      TABS.map(t=>h("button",{key:t.id,onClick:()=>setActiveTab(t.id),
        style:{...S.btn,flex:1,padding:"10px 0 7px",background:"none",
          display:"flex",flexDirection:"column",alignItems:"center",gap:2,
          color:activeTab===t.id?"#00d4ff":"#555",
          borderTop:activeTab===t.id?"2px solid #00d4ff":"2px solid transparent"}},
        h(Ico,{name:t.icon,size:18,color:activeTab===t.id?"#00d4ff":"#555"}),
        h("span",{style:{...S.raj,fontSize:10,letterSpacing:0.5}},t.label),
      ))
    ),
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(React.StrictMode, null, React.createElement(App))
);

      const btn = document.getElementById('_install_btn');
      if (btn) btn.style.display = 'flex';
    }, 2000);
  });
  window.addEventListener('appinstalled', () => {

    if (btn) btn.style.display = 'none';
  });
