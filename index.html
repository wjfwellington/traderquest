      { type: "b", text: "Stop-Limit: ordem no book com preço de ativação + execução — risco de não executar" },
      { type: "b", text: "Trailing Stop: acompanha o preço na sua direção, travando lucros progressivamente" },
      { type: "tip", emoji: "🔥", title: "Regra de Ouro", text: "Configure o stop ANTES de abrir a posição. Na Bybit e Binance, há campo específico na tela de abertura do trade. Com alavancagem 10x, stop de 2% na posição = 20% da margem. Calcule sempre." }
    ]
  },
  "1_3": {
    "title": "Drawdown máximo diário e mensal",
    "sections": [
      { type: "p", text: "Drawdown é a queda percentual do capital desde um pico. No cripto, sequências de 5-10 perdas seguidas são normais — especialmente quando o mercado está lateral ou você operou contra a tendência." },
      { type: "img", svg: `<svg viewBox="0 0 320 168" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">

      { type: "h", text: "Regras Práticas de Drawdown" },
      { type: "b", text: "Drawdown diário máximo: 2-3% do capital. Atingiu? Feche tudo e pare por hoje." },
      { type: "b", text: "Drawdown semanal: 5-6%. Pause e revise o que está errado na estratégia." },
      { type: "b", text: "Drawdown mensal (Regra de Elder): 6%. Se atingir, pare de operar o mês inteiro." },
      { type: "h", text: "Por que Parar é Profissional" },
      { type: "p", text: "Em drawdown, o estado emocional deteriora. Você começa a forçar trades para 'recuperar', usa mais alavancagem e opera fora dos critérios. Parar não é fraqueza — é a única forma de não destruir a conta em um dia ruim." },
      { type: "tip", emoji: "📊", title: "Gestão Profissional", text: "Crie uma regra fixa antes de começar: 'Se perder R$X hoje, fecho o computador e não abro mais.' Escreva isso no papel. O problema do drawdown é que você precisa mais de disciplina justamente quando tem menos capacidade emocional." }
    ]
  },
  "1_4": {
    "title": "Position Sizing com alavancagem no cripto",
    "sections": [
      { type: "p", text: "Position Sizing é o cálculo exato de quantos BTC/ETH ou contratos comprar em cada operação. É o que transforma as regras abstratas de risco em números concretos — especialmente crucial com alavancagem." },
      { type: "img", svg: `<svg viewBox="0 0 320 170" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">
<rect width="320" height="170" rx="10" fill="#0d0d1a"/>
<text x="160" y="18" text-anchor="middle" fill="#00d4ff" font-size="11" font-family="monospace" font-weight="bold">POSITION SIZING — BINANCE/BYBIT</text>
<rect x="10" y="25" width="300" height="34" rx="6" fill="#00d4ff10" stroke="#00d4ff30"/>
<text x="160" y="40" text-anchor="middle" fill="#fff" font-size="10" font-family="monospace" font-weight="bold">Tamanho = Risco($) ÷ Distância Stop(%)</text>
<text x="160" y="52" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">ou: Capital × %Risco ÷ %Stop</text>
<text x="14" y="78" fill="#ffd700" font-size="9" font-family="monospace" font-weight="bold">Exemplo: BTC Long na Bybit</text>
<text x="14" y="93" fill="#888" font-size="9" font-family="monospace">Conta: $2.000  |  Risco: 1%  |  Alavancagem: 10x</text>
<text x="14" y="106" fill="#888" font-size="9" font-family="monospace">BTC @ $43.000  |  Stop: $42.500  (−1.16%)</text>
<line x1="10" y1="112" x2="310" y2="112" stroke="#222"/>
<text x="14" y="126" fill="#aaa" font-size="9" font-family="monospace">① Risco em $: $2.000 × 1% = <tspan fill="#00ff88">$20</tspan></text>
<text x="14" y="142" fill="#aaa" font-size="9" font-family="monospace">② Posição: $20 ÷ 1.16% = <tspan fill="#00ff88">$1.724 notional</tspan></text>
<text x="14" y="158" fill="#aaa" font-size="9" font-family="monospace">③ Qtd BTC: $1.724 ÷ $43.000 = <tspan fill="#00ff88">0,040 BTC</tspan></text>
</svg>`, caption: "Sempre calcule o tamanho pelo risco em dólares, nunca pelo 'feeling' do trade." },
      { type: "h", text: "Cuidado com a Alavancagem" },
      { type: "b", text: "Alavancagem 5x: liquidação em queda de ~20% (com buffer de margem)" },
      { type: "b", text: "Alavancagem 10x: liquidação em queda de ~10%" },
      { type: "b", text: "Alavancagem 20x: liquidação em queda de ~5% — extremamente arriscado" },
      { type: "b", text: "Alavancagem 50x: liquidação em queda de ~2% — apenas especulação pura" },
      { type: "h", text: "Erros Comuns" },
      { type: "b", text: "Operar sempre com mesmo tamanho de posição independente do stop" },
      { type: "b", text: "Ignorar o cálculo e 'sentir' o tamanho certo — garantia de ruína" },
      { type: "b", text: "Arredondar para cima 'para aproveitar mais' — está aumentando o risco real" },
      { type: "tip", emoji: "🧮", title: "Automatize", text: "Salve no celular: Posição($) = Capital × %Risco ÷ %Stop. Calcule ANTES de qualquer trade. Com alavancagem 10x e stop de 1%, seu risco real na posição é de 10% da margem — nunca esqueça disso." }
    ]
  },
  "2_0": {
    "title": "Anatomia do candlestick no cripto",
    "sections": [
      { type: "p", text: "O candlestick é a linguagem visual do mercado. No TradingView, Bybit ou Binance, cada vela resume toda a batalha entre compradores e vendedores em um período — seja 1 minuto ou 1 semana." },

      { type: "h", text: "As 4 Informações de Cada Candle" },

      { type: "b", text: "Fechamento (Close): último preço — o mais importante para análise" },

      { type: "b", text: "Mínima (Low): fundo atingido pelos vendedores" },

      { type: "b", text: "Sombra longa embaixo: vendedores pressionaram para baixo mas compradores absorveram" },
      { type: "tip", emoji: "👁️", title: "Leia Antes dos Indicadores", text: "Antes de olhar RSI, MACD ou qualquer indicador, passe 2 minutos lendo os candlesticks. Quem estava no controle? Onde houve rejeição forte? O gráfico conta a história — aprenda a ouvi-la." }
    ]
  },
  "2_1": {
    "title": "Padrões de reversão: Doji, Martelo, Engolfo",
    "sections": [
      { type: "p", text: "Padrões de reversão sinalizam possível mudança de direção. No BTC/ETH, esses padrões aparecem frequentemente nas zonas de suporte e resistência — especialmente nos timeframes de 4h e diário." },
      { type: "img", svg: `<svg viewBox="0 0 320 178" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">

      { type: "h", text: "Doji — Indecisão no Mercado" },
      { type: "p", text: "O Doji tem corpo quase zero (abertura ≈ fechamento). No BTC, um Doji no topo após 5 candles de alta em resistência é sinal de atenção. No fundo após queda em suporte, possível reversão de alta." },
      { type: "h", text: "Martelo — Rejeição de Queda" },
      { type: "p", text: "Corpo pequeno no topo com sombra inferior longa (2x o corpo). Vendedores pressionaram para baixo mas compradores reagiram com força. Mais poderoso em zona de suporte importante." },
      { type: "h", text: "Engolfo — O Mais Poderoso" },
      { type: "b", text: "Engolfo de Alta: candle verde engloba completamente o vermelho anterior → compra" },
      { type: "b", text: "Engolfo de Baixa: candle vermelho engloba o verde anterior → short" },
      { type: "b", text: "Volume alto no Engolfo confirma participação institucional — muito mais confiável" },
      { type: "tip", emoji: "🔍", title: "Contexto é Tudo", text: "Martelo no meio de tendência de alta tem pouco valor. Martelo no teste de suporte de $40.000 após 5 candles de queda com volume decrescente? Isso sim é sinal relevante. Contexto primeiro, padrão depois." }
    ]
  },
  "2_2": {
    "title": "Padrões de continuação e Inside Bar",
    "sections": [
      { type: "p", text: "Padrões de continuação indicam que a tendência atual vai persistir. Reconhecê-los evita operar contra o mercado — um dos erros mais caros no cripto, especialmente em tendências fortes do BTC." },
      { type: "h", text: "Marubozu — Força Total" },
      { type: "p", text: "O Marubozu é um candle sem sombras (ou sombras mínimas). Abertura na mínima e fechamento na máxima (alta) ou vice-versa. Quando o BTC forma um Marubozu de alta, significa que compradores dominaram do início ao fim — evite short." },
      { type: "h", text: "Inside Bar — A Pausa Estratégica" },
      { type: "p", text: "O Inside Bar aparece quando uma vela fica completamente dentro do range da vela anterior. No cripto, indica que o mercado está 'respirando' antes de continuar. O rompimento na direção da tendência é uma entrada clássica." },
      { type: "b", text: "Inside Bar + rompimento para cima em tendência de alta = entrada Long" },
      { type: "b", text: "Inside Bar + rompimento para baixo em tendência de baixa = entrada Short" },
      { type: "b", text: "Stop abaixo da mínima do Inside Bar — stop técnico muito claro" },

      { type: "tip", emoji: "⚡", title: "No BTC no 4h", text: "Inside Bars após tendência de alta no 4h são oportunidades de entrada com stop definido. O alvo é a próxima resistência relevante. A relação RR costuma ser excelente porque o stop é compacto." }

  "2_3": {
    "title": "Timeframes: qual usar no day trade de cripto",
    "sections": [
      { type: "p", text: "Escolher o timeframe errado é um dos maiores erros. Cada timeframe conta uma história diferente — a combinação deles revela o quadro completo. No cripto de alta volatilidade, a abordagem top-down é essencial." },

      { type: "p", text: "Volume é o número de BTC (ou contratos) negociados em um período. É o único indicador que não mente — ele mostra onde os grandes players estão colocando dinheiro real no mercado." },

      { type: "h", text: "Como Ler o Volume no Cripto" },
      { type: "b", text: "Rompimento com volume ALTO: confirmado — grandes players participando da direção" },
      { type: "b", text: "Rompimento com volume BAIXO: suspeito — possível fakeout, aguarde confirmação" },
      { type: "b", text: "Tendência de alta com volume decrescente: enfraquecendo, possível reversão próxima" },
      { type: "b", text: "Queda abrupta com volume explosivo: possível capitulação — atenção para reversão" },
      { type: "h", text: "VWAP no Day Trade de Cripto" },
      { type: "p", text: "O VWAP (Volume Weighted Average Price) é o preço médio ponderado pelo volume do dia. Instituições usam como referência. Acima do VWAP = dia bullish. Abaixo = day bearish. Muitos setups são: 'compra no pullback ao VWAP em tendência de alta'." },
      { type: "h", text: "CVD — Cumulative Volume Delta" },
      { type: "p", text: "O CVD mostra se as compras agressivas (market buy) superam as vendas agressivas (market sell). CVD subindo com preço subindo = confirmado. Divergência CVD x preço = sinal de alerta." },
      { type: "tip", emoji: "📊", title: "TradingView", text: "Adicione VWAP (disponível gratuitamente). Para CVD, use o indicador 'Cumulative Volume Delta'. Na Bybit e Binance, o VWAP também está nos gráficos nativos." }
    ]
  },

      { type: "h", text: "Por que esses Níveis Existem no Cripto" },
      { type: "p", text: "Níveis de S/R existem porque há concentração de ordens nesses preços. No BTC, $40k, $50k, $60k são níveis psicológicos — milhões de traders e bots colocam ordens nesses números redondos grandes." },

    ]
  },
  "3_1": {
    "title": "Zonas de demanda e oferta no BTC",
    "sections": [
      { type: "p", text: "Zonas de demanda e oferta são áreas de preço onde grandes players (baleias e instituições) executaram ordens massivas. São mais relevantes que linhas simples porque representam regiões, não pontos exatos." },
      { type: "h", text: "Como Identificar uma Zona Válida" },
      { type: "p", text: "Uma zona de demanda válida: o preço estava em uma região, consolidou brevemente e saiu com impulso forte para cima. O impulso forte indica ordens de compra represadas naquele nível. Quanto mais forte o impulso, mais relevante a zona." },
      { type: "b", text: "Zona de Demanda (compra): base → consolidação curta → impulso forte de alta" },
      { type: "b", text: "Zona de Oferta (venda): topo → consolidação curta → impulso forte de baixa" },
      { type: "b", text: "Quanto mais rápido o preço saiu da zona, mais ordens restam lá" },
      { type: "h", text: "Zonas Históricas do BTC" },
      { type: "p", text: "No Bitcoin, zonas como $28k-$30k, $38k-$42k, $48k-$52k são zonas históricas que se repetem em múltiplos ciclos. São as mais respeitadas pelos traders institucionais — concentração enorme de ordens." },

  "3_2": {
    "title": "Troca de polaridade no cripto",
    "sections": [
      { type: "p", text: "Quando um suporte importante é rompido com força, ele se transforma em resistência. Esse fenômeno é chamado de troca de polaridade e oferece excelentes entradas após o rompimento." },
      { type: "h", text: "Por que Isso Acontece" },
      { type: "p", text: "Traders que compraram no suporte estão com posição no prejuízo após o rompimento. Quando o preço retorna ao nível (retest), eles vendem para 'empatar' — criando pressão vendedora. Isso transforma o antigo suporte em resistência." },
      { type: "h", text: "Como Operar a Troca de Polaridade" },
      { type: "b", text: "Após rompimento de suporte: aguarde pullback ao nível para entrar Short" },
      { type: "b", text: "Após rompimento de resistência: aguarde pullback (retest) para entrar Long" },
      { type: "b", text: "Stop: Short → stop acima do nível. Long → stop abaixo do nível." },
      { type: "b", text: "Alvo: próximo nível de S/R relevante — verifique o RR antes de entrar" },
      { type: "h", text: "Setup Clássico no BTC" },
      { type: "p", text: "Quando $40k era resistência e foi rompido com volume, os retests posteriores foram oportunidades de compra clássicas (troca de polaridade). O antigo teto virou suporte — compradores que queriam entrar mas perderam o rompimento entram no retest." },

      { type: "tip", emoji: "⚡", title: "Paciência é a Chave", text: "Não entre no rompimento — espere o retest. A maioria dos rompimentos faz um retest antes de continuar. Se não fizer, a oportunidade era apenas para quem estava posicionado antes." }

  "3_3": {
    "title": "Múltiplos toques confirmam o nível",
    "sections": [
      { type: "p", text: "Um nível de S/R só é válido se o preço o testou pelo menos 2-3 vezes sem rompê-lo definitivamente. Mais toques = mais ordens concentradas = nível mais forte e confiável para operar." },
      { type: "h", text: "Qualidade vs Quantidade de Toques" },
      { type: "p", text: "Não é só o número de toques que importa — é a qualidade. Um toque onde o preço reverteu agressivamente com volume alto vale mais que três toques fracos e lentos." },
      { type: "b", text: "Toque forte: chegou ao nível e reverteu rápido com candle expressivo e volume" },
      { type: "b", text: "Toque fraco: ficou muito tempo no nível ou ultrapassou levemente antes de voltar" },
      { type: "b", text: "Volume em cada toque confirma participação institucional no nível" },
      { type: "h", text: "Níveis Históricos do BTC com Múltiplos Toques" },
      { type: "p", text: "Os níveis de $30k, $40k e $50k no Bitcoin foram testados múltiplas vezes ao longo dos ciclos. São os mais respeitados pelos traders institucionais — concentração enorme de ordens dos dois lados." },

  "3_4": {

  "4_0": {
    "title": "SMA vs EMA: qual usar no cripto",
    "sections": [
      { type: "p", text: "Médias móveis suavizam o ruído do preço e revelam a tendência. No cripto de alta volatilidade, a EMA é preferida pela maior reatividade — ela se adapta mais rápido às mudanças bruscas do BTC." },
      { type: "h", text: "EMA vs SMA — A Diferença Prática" },
      { type: "p", text: "A SMA dá peso igual a todos os períodos. A EMA dá mais peso aos preços recentes. No BTC que move 5% em horas, a EMA reage mais rápido e gera menos atraso nas leituras — especialmente importante no day trade." },
      { type: "b", text: "EMA 9: muito rápida, usada para timing preciso de entrada no 1h/15m" },
      { type: "b", text: "EMA 21: equilíbrio entre rapidez e filtro de ruído — ideal para day trade" },
      { type: "b", text: "EMA 50: tendência de médio prazo, suporte/resistência dinâmico relevante" },

      { type: "b", text: "Diário: mais relevante para swing trades de 2-10 dias — muito respeitado" },

  "5_4": {
    "title": "Erros comuns ao usar Fibonacci",
    "sections": [
      { type: "p", text: "Fibonacci é poderoso mas amplamente mal usado. Os erros mais comuns fazem traders tomarem as decisões erradas justamente nas melhores oportunidades do mercado." },

      { type: "h", text: "Outros Erros Críticos" },
      { type: "b", text: "Erro 2: Entrar sem sinal de reversão — Fibonacci indica a ZONA, não o ponto exato" },
      { type: "b", text: "Erro 3: Usar só o Fibonacci sem confirmar volume e padrão de candle" },

      { type: "p", text: "RSI acima de 70 NÃO significa 'venda agora'. Em bull market do BTC, o RSI pode ficar acima de 70 por semanas. RSI alto em tendência = força. RSI alto em resistência histórica = cuidado com posições compradas." },
      { type: "b", text: "RSI > 70 em tendência de alta: mercado forte, não é sinal de venda" },
      { type: "b", text: "RSI > 70 em resistência histórica: considere saída parcial ou Stop mais apertado" },
      { type: "b", text: "RSI < 30 em suporte forte em alta: forte oportunidade de compra" },
      { type: "b", text: "RSI < 30 em tendência de baixa: mercado fraco, possível continuar caindo" },
      { type: "h", text: "A Zona 50 como Viés" },
      { type: "p", text: "RSI acima de 50 = compradores no controle. Abaixo de 50 = vendedores dominam. Em bull market do BTC, o RSI raramente fica abaixo de 40 nos pullbacks saudáveis." },
      { type: "tip", emoji: "📊", title: "Configuração", text: "RSI padrão período 14. Para day trade de BTC no 1h, experimente período 7 para mais sensibilidade. Adicione linha horizontal em 50 como referência de viés de mercado." }
    ]
  },
  "6_1": {
    "title": "Divergências do RSI no cripto",
    "sections": [
      { type: "p", text: "Divergências do RSI ocorrem quando o preço vai em uma direção e o RSI em outra. São um dos sinais mais poderosos — frequentemente antecipam reversões antes de qualquer outro indicador." },
      { type: "img", svg: `<svg viewBox="0 0 320 168" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">

      { type: "h", text: "Divergência Bearish (Sinal de Venda)" },
      { type: "p", text: "Preço faz topo mais alto (Higher High), mas RSI faz topo mais baixo (Lower High). O momentum está enfraquecendo mesmo com o preço subindo. No BTC em resistência histórica com divergência bearish = sinal forte." },
      { type: "h", text: "Divergência Bullish (Sinal de Compra)" },
      { type: "p", text: "Preço faz fundo mais baixo (Lower Low), mas RSI faz fundo mais alto (Higher Low). Vendedores estão perdendo força. No BTC em zona de suporte com divergência bullish = oportunidade." },
      { type: "h", text: "Divergências Ocultas — Continuação" },
      { type: "b", text: "Oculta Bullish: preço faz Higher Low, RSI faz Lower Low → continuação de alta" },
      { type: "b", text: "Oculta Bearish: preço faz Lower High, RSI faz Higher High → continuação de baixa" },
      { type: "tip", emoji: "🔍", title: "Onde São Mais Confiáveis", text: "No BTC, divergências do 4h e diário em zonas de S/R importantes são as mais confiáveis. No 1m ou 5m, divergências são muito frequentes e geram muitos falsos positivos. Use sempre o contexto maior." }
    ]
  },

      { type: "h", text: "Lendo o MACD no BTC" },

      { type: "h", text: "MACD vs Preço: Divergências" },
      { type: "p", text: "Assim como o RSI, o MACD forma divergências poderosas. Preço faz HH mas MACD faz LH = enfraquecimento. No BTC, MACD divergente no diário é sinal de grande relevância." },
      { type: "h", text: "Configurações para Cripto" },

      { type: "tip", emoji: "⚡", title: "MACD como Filtro", text: "Use o MACD para filtrar entradas, não como sinal primário. Entre Long apenas quando o MACD está acima da linha zero (território bullish). O cruzamento do MACD com o Signal confirma o timing." }

  },
  "6_3": {
    "title": "Stochastic RSI e OBV no cripto",
    "sections": [
      { type: "p", text: "Stochastic RSI e OBV são indicadores complementares que adicionam informações sobre momentum e pressão de volume — frequentemente usados junto com RSI e MACD para confirmar setups no cripto." },
      { type: "h", text: "Stochastic RSI — RSI do RSI" },
      { type: "p", text: "O Stoch RSI aplica o cálculo do Estocástico sobre o RSI, gerando um indicador mais sensível. Oscila entre 0-100, com zonas de sobrecompra (>80) e sobrevenda (<20)." },
      { type: "b", text: "Stoch RSI < 20 (sobrevenda): possível oportunidade de compra em tendência de alta" },
      { type: "b", text: "Stoch RSI > 80 (sobrecompra): considere sair parcialmente de Longs" },
      { type: "b", text: "Cruzamento das linhas K e D: sinal de entrada quando alinhado com tendência" },
      { type: "h", text: "OBV — On Balance Volume" },
      { type: "p", text: "O OBV acumula volume quando o preço sobe e subtrai quando cai. Serve como confirmação de tendência: OBV subindo com preço = tendência saudável. OBV caindo com preço subindo = distribuição (alerta)." },
      { type: "b", text: "OBV em alta junto com preço: compradores acumulando, tendência confirmada" },
      { type: "b", text: "OBV caindo enquanto preço sobe: divergência — smart money distribuindo" },
      { type: "b", text: "OBV rompendo máxima histórica: confirma força da tendência de alta" },

      { type: "tip", emoji: "🔬", title: "Combinação Poderosa", text: "Para confirmar entradas: RSI < 40 + Stoch RSI < 20 + OBV subindo em suporte = três confirmações de compra. Aguarde candle de reversão e entre com stop técnico." }

  },
  "6_4": {
    "title": "Usando múltiplos indicadores juntos",
    "sections": [
      { type: "p", text: "O segredo não é usar muitos indicadores — é usar os certos com propósito claro. Cada indicador deve ter uma função específica no processo de decisão. Mais de 3-4 indicadores gera paralisia e contradições." },
      { type: "h", text: "O Framework de 3 Indicadores" },
      { type: "b", text: "Tendência: EMA 21/50/200 — definem o contexto macro do trade" },
      { type: "b", text: "Momentum: RSI ou MACD — confirmam a força do movimento" },
      { type: "b", text: "Volatilidade/Volume: Bollinger ou OBV — validam a qualidade do setup" },
      { type: "h", text: "A Ordem Correta de Análise" },
      { type: "b", text: "1. Contexto macro: onde está o BTC em relação à EMA 200? Bull ou bear?" },
      { type: "b", text: "2. Estrutura de S/R: quais os níveis relevantes neste timeframe?" },
      { type: "b", text: "3. Fibonacci: há retração em zona de confluência?" },
      { type: "b", text: "4. Confirmação de indicadores: RSI, MACD e volume estão favoráveis?" },
      { type: "b", text: "5. Padrão de candle: há sinal de reversão no nível de interesse?" },
      { type: "img", svg: `<svg viewBox="0 0 320 175" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">
<rect width="320" height="175" rx="10" fill="#0d0d1a"/>

<text x="160" y="43" text-anchor="middle" fill="#ffd700" font-size="9" font-family="monospace" font-weight="bold">MOMENTUM</text>
<text x="160" y="56" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">RSI / MACD</text>
<text x="160" y="68" text-anchor="middle" fill="#555" font-size="7" font-family="monospace">Força do movimento</text>
<rect x="218" y="28" width="92" height="52" rx="6" fill="#00ff8810" stroke="#00ff8830"/>
<text x="264" y="43" text-anchor="middle" fill="#00ff88" font-size="9" font-family="monospace" font-weight="bold">VOLUME</text>
<text x="264" y="56" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">OBV / Bollinger</text>
<text x="264" y="68" text-anchor="middle" fill="#555" font-size="7" font-family="monospace">Qualidade do setup</text>

<text x="160" y="112" text-anchor="middle" fill="#aaa" font-size="8" font-family="monospace">① Contexto macro (EMA 200)</text>

<text x="160" y="136" text-anchor="middle" fill="#aaa" font-size="8" font-family="monospace">③ Confirmar RSI/MACD/Volume</text>
<text x="160" y="148" text-anchor="middle" fill="#aaa" font-size="8" font-family="monospace">④ Sinal de candle → ENTRAR</text>
<text x="160" y="165" text-anchor="middle" fill="#555" font-size="8" font-family="monospace">Preço e estrutura sempre primeiro. Indicadores confirmam.</text>
</svg>`, caption: 'Tendência + Momentum + Volume = o trio essencial de indicadores.' },
      { type: "tip", emoji: "⚠️", title: "Paralisia por Análise", text: "Se você precisar de 5+ indicadores concordando para entrar, nunca vai operar. Indicadores são para confirmar — não para decidir. O preço, volume e estrutura de S/R sempre vêm primeiro." }
    ]
  },
  "7_0": {
    "title": "FOMO, ganância e medo no cripto",
    "sections": [
      { type: "p", text: "As emoções destroem mais contas do que qualquer estratégia ruim. No cripto, o ciclo emocional é amplificado — BTC subindo 20% em dias ativa FOMO. Caindo 30% ativa pânico. Ambos levam a decisões desastrosas." },
      { type: "img", svg: `<svg viewBox="0 0 320 165" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">
<rect width="320" height="165" rx="10" fill="#0d0d1a"/>

<polyline points="114,52 140,60 165,75 190,95 210,115 230,135" fill="none" stroke="#ef4444" stroke-width="2"/>

</svg>`, caption: "FOMO compra no topo. Pânico vende no fundo. Disciplina não faz nenhum dos dois." },
      { type: "h", text: "O Ciclo Emocional do Trader" },
      { type: "b", text: "Otimismo: 'Este trade vai funcionar, o mercado está com tudo'" },
      { type: "b", text: "Euforia (FOMO): 'BTC subiu 15%! Tenho que entrar agora!' — entrada no topo" },
      { type: "b", text: "Negação: 'Vai recuperar, é só uma correção temporária' — não coloca stop" },
      { type: "b", text: "Pânico: 'Vou perder tudo!' — vende no fundo exatamente quando devia comprar" },
      { type: "h", text: "Como Controlar o FOMO no BTC" },
      { type: "p", text: "FOMO é um sinal de que você não tem um plano de trading definido. Quando o BTC sobe 10% sem você, a reação emocional natural é entrar — exatamente quando o risco é maior e o RR piora drasticamente." },
      { type: "b", text: "Regra: se o setup já passou, a oportunidade acabou — espere a próxima" },
      { type: "b", text: "Antes de entrar: calcule o RR atual. Se for menor que 1:2, não entre" },
      { type: "b", text: "Aceite: você vai perder oportunidades. Os melhores traders perdem muitas" },
      { type: "tip", emoji: "🧠", title: "Plano = Antídoto ao FOMO", text: "Escreva as condições exatas para entrar em um trade antes de abrir o gráfico. Se o mercado não atender às condições, você não opera. Simples assim. Um plano escrito é mais forte que qualquer emoção." }
    ]
  },
  "7_1": {
    "title": "Diário de operações: sua vantagem real",
    "sections": [
      { type: "p", text: "O diário de operações é a ferramenta mais subutilizada no trading. É o que separa traders que melhoram continuamente dos que cometem os mesmos erros por anos. No cripto especialmente, o mercado muda — você precisa mudar junto." },
      { type: "h", text: "O que Registrar em Cada Trade" },
      { type: "b", text: "Data, horário, ativo (BTC, ETH, etc.) e timeframe operado" },
      { type: "img", svg: `<svg viewBox="0 0 320 150" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">
<rect width="320" height="150" rx="10" fill="#0d0d1a"/>
<text x="160" y="18" text-anchor="middle" fill="#00d4ff" font-size="11" font-family="monospace" font-weight="bold">MÉTRICAS DO DIÁRIO</text>
<text x="18" y="40" fill="#ffd700" font-size="9" font-family="monospace" font-weight="bold">Taxa de Acerto</text>

      { type: "b", text: "Motivo da entrada: qual o setup? Quais os indicadores confirmavam?" },
      { type: "b", text: "Preço de entrada, stop loss e alvo definidos antes de entrar" },
      { type: "b", text: "Resultado em R$ e em %R (múltiplos do risco)" },
      { type: "b", text: "Avaliação emocional: calmo, ansioso, com FOMO, entrei cedo/tarde?" },
      { type: "h", text: "Como Revisar o Diário" },
      { type: "p", text: "Toda semana, revise suas operações. Perguntas chave: Qual foi o setup com maior taxa de acerto? Em qual horário meus trades são melhores? Quando entro emocionalmente, o resultado piora? Há padrão nos meus erros?" },
      { type: "h", text: "Métricas Para Acompanhar" },
      { type: "b", text: "Taxa de acerto: % de trades vencedores (meta: acima de 40% com RR 1:2)" },
      { type: "b", text: "R médio: seu ganho/perda médio em múltiplos do risco" },
      { type: "b", text: "Drawdown máximo: a maior sequência de perdas que já teve" },
      { type: "tip", emoji: "📝", title: "Ferramenta Simples", text: "Use uma planilha no Google Sheets ou Notion. 10 campos básicos são suficientes para começar. O hábito de registrar e revisar é mais valioso do que qualquer indicador técnico." }

  "7_2": {
    "title": "Como lidar com sequências de perda",
    "sections": [
      { type: "p", text: "Sequências de perda são inevitáveis — mesmo os melhores traders do mundo passam por drawdowns. No cripto de alta volatilidade, 5-7 perdas seguidas são completamente normais dentro de uma estratégia vencedora." },
      { type: "img", svg: `<svg viewBox="0 0 320 172" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">
<rect width="320" height="172" rx="10" fill="#0d0d1a"/>
<text x="160" y="18" text-anchor="middle" fill="#00d4ff" font-size="11" font-family="monospace" font-weight="bold">PROTOCOLO DE DRAWDOWN</text>
<rect x="10" y="28" width="300" height="20" fill="#00ff880c" rx="3" stroke="#00ff8825"/>
<text x="30" y="42" fill="#00ff88" font-size="11">●</text>

<text x="50" y="66" fill="#aaa" font-size="9" font-family="monospace">DD 2–4% — Reduza posição para 50%</text>
<rect x="10" y="76" width="300" height="20" fill="#f59e0b0c" rx="3" stroke="#f59e0b25"/>
<text x="30" y="90" fill="#f59e0b" font-size="11">●</text>
<text x="50" y="90" fill="#aaa" font-size="9" font-family="monospace">DD 4–6% — Pause 1–2 dias, revise</text>
<rect x="10" y="100" width="300" height="20" fill="#ef44440c" rx="3" stroke="#ef444425"/>
<text x="30" y="114" fill="#ef4444" font-size="11">●</text>
<text x="50" y="114" fill="#aaa" font-size="9" font-family="monospace">DD 6%+ — Pare o mês. Volte no próximo.</text>
<line x1="10" y1="130" x2="310" y2="130" stroke="#1a1a2e"/>
<text x="160" y="145" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">Regra de Elder: máximo 6% de drawdown mensal</text>
<text x="160" y="160" text-anchor="middle" fill="#555" font-size="8" font-family="monospace">Proteger capital hoje = poder operar amanhã</text>
</svg>`, caption: '4 níveis de alerta: verde→amarelo→laranja→vermelho. Siga rigorosamente.' },
      { type: "h", text: "O Que Fazer Durante um Drawdown" },
      { type: "b", text: "Primeiro: verifique se o problema é execução ou a estratégia mudou" },
      { type: "b", text: "Reduza o tamanho das posições para 50% durante o drawdown" },
      { type: "b", text: "Não tente 'recuperar' em um único trade — é o erro mais custoso" },
      { type: "b", text: "Faça uma pausa de 1-2 dias para resetar emocionalmente" },
      { type: "b", text: "Revise os trades perdedores: foi azar ou erro de execução?" },
      { type: "h", text: "A Matemática da Recuperação" },
      { type: "p", text: "Com risco de 1% por trade, uma sequência de 10 perdas reduz o capital em ~9.5%. Para recuperar, você precisa de apenas ~10.5% de ganho. Parece manejável porque é — desde que o risco seja controlado." },
      { type: "h", text: "Distinguindo Sorte de Habilidade" },
      { type: "p", text: "Com 30-50 trades em sua estratégia, você começa a ter dados estatísticos confiáveis. Menos que isso, qualquer resultado (bom ou ruim) pode ser apenas variância estatística — não necessariamente reflexo da qualidade da estratégia." },
      { type: "tip", emoji: "🛡️", title: "Regra de Emergência", text: "Se o drawdown passar de 6% no mês, pare completamente de operar com dinheiro real. Passe para demo ou papel trading. Volte só no mês seguinte — com capital e emocional resetados." }
    ]
  },
  "7_3": {
    "title": "Disciplina e consistência no trading cripto",
    "sections": [
      { type: "p", text: "Consistência é o que separa traders profissionais dos amadores. Não é uma estratégia miraculosa ou um indicador secreto — é executar o mesmo processo correto centenas de vezes, mesmo quando é chato ou difícil." },
      { type: "h", text: "Os 5 Pilares da Consistência" },
      { type: "b", text: "Mesmo risco em todos os trades: 1% sempre, não 1% no seguro e 3% no 'certeiro'" },
      { type: "b", text: "Mesmo processo de análise: top-down, S/R, Fibonacci, indicadores, candle" },
      { type: "b", text: "Mesmo horário de operar: conheça as sessões mais favoráveis para seu estilo" },
      { type: "b", text: "Respeito às regras mesmo quando não funciona: 3 perdas não mudam o plano" },
      { type: "b", text: "Registro de todos os trades: sem exceção, incluindo os ruins" },
      { type: "h", text: "O Problema da 'Exceção'" },
      { type: "p", text: "'Só desta vez vou arriscar mais porque tenho certeza.' Esta frase já destruiu mais contas do que qualquer flash crash. A consistência é testada justamente quando você tem 'certeza' — é exatamente quando mais precisa seguir as regras." },
      { type: "img", svg: `<svg viewBox="0 0 320 170" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">

<rect x="10" y="80" width="300" height="22" fill="#00ff8808" rx="3" stroke="#00ff8825"/>

<text x="28" y="121" fill="#00ff88" font-size="10">✓</text>

<rect x="10" y="132" width="300" height="22" fill="#ef444408" rx="3" stroke="#ef444425"/>
<text x="28" y="147" fill="#ef4444" font-size="10">✗</text>
<text x="44" y="147" fill="#888" font-size="9" font-family="monospace">Algum "não"? → NÃO OPERE</text>
<text x="160" y="164" text-anchor="middle" fill="#555" font-size="8" font-family="monospace">Consistência = executar o mesmo processo correto 100x</text>
</svg>`, caption: "Checklist de 4 perguntas antes de qualquer trade. 1 'não' = não opere." },
      { type: "tip", emoji: "📋", title: "Checklist Pré-Trade", text: "Antes de qualquer trade: (1) O setup existe? (2) O RR é mínimo 1:2? (3) O risco está em 1%? (4) Estou tomando essa decisão racionalmente? Se qualquer resposta for 'não', não opere." }
    ]
  },
  "7_4": {
    "title": "Rotina e ambiente do trader de cripto",
    "sections": [
      { type: "p", text: "Um trader de sucesso no cripto tem uma rotina estruturada — não opera aleatoriamente em qualquer horário. O mercado cripto é 24/7, mas operar 24/7 é o caminho mais rápido para a exaustão e erros custosos." },
      { type: "h", text: "Construindo uma Rotina de Trading" },
      { type: "b", text: "Manhã (análise): 30min para revisar BTC/ETH no diário e 4h — qual o contexto?" },
      { type: "img", svg: `<svg viewBox="0 0 320 148" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">
<rect width="320" height="148" rx="10" fill="#0d0d1a"/>
<text x="160" y="18" text-anchor="middle" fill="#00d4ff" font-size="11" font-family="monospace" font-weight="bold">AMBIENTE DE TRADING</text>
<rect x="10" y="26" width="145" height="50" rx="5" fill="#00ff8808" stroke="#00ff8820"/>
<text x="82" y="39" text-anchor="middle" fill="#00ff88" font-size="9" font-family="monospace" font-weight="bold">✓ FAVORÁVEL</text>
<text x="82" y="52" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">Gráfico limpo e foco</text>
<text x="82" y="64" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">Sem notificações</text>
<rect x="165" y="26" width="145" height="50" rx="5" fill="#ef444408" stroke="#ef444420"/>

<text x="237" y="52" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">Twitter/Telegram aberto</text>
<text x="237" y="64" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">Grupos de sinais ativos</text>
<text x="160" y="96" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">Sessão NY (10h-17h BRT) = maior liquidez</text>
<text x="160" y="110" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">Ásia (00h-08h BRT) = menos volume, evite</text>
<text x="160" y="126" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">Trader profissional opera o gráfico,</text>
<text x="160" y="138" text-anchor="middle" fill="#555" font-size="8" font-family="monospace">não as opiniões de grupos</text>
</svg>`, caption: 'Ambiente limpo = decisões melhores. Grupos de sinais criam viés.' },
      { type: "b", text: "Pré-sessão: identifique os níveis chave do dia — suportes, resistências, Fibonacci" },
      { type: "b", text: "Sessão de trading: 2-4h focadas na sessão de maior liquidez (10h-17h BRT)" },
      { type: "b", text: "Pós-sessão: registre todos os trades no diário com notas" },
      { type: "b", text: "Fim de semana: análise semanal — o que funcionou? O que melhorar?" },
      { type: "h", text: "O Ambiente de Trading" },
      { type: "p", text: "Não opere com notificações de Telegram e grupos de sinais abertos. Social media durante o trading cria FOMO e viés de confirmação. Um trader profissional opera o gráfico, não as opiniões dos outros." },
      { type: "h", text: "Quando NÃO Operar" },
      { type: "b", text: "Releases de CPI, FOMC e dados macroeconômicos americanos — volatilidade extrema" },
      { type: "b", text: "Após grande sequência de perdas — emocional comprometido" },
      { type: "b", text: "Com sono — capacidade de julgamento reduzida" },
      { type: "b", text: "Quando o mercado está lateral sem tendência clara" },
      { type: "tip", emoji: "😴", title: "Descanso é Parte do Trabalho", text: "Os melhores traders operam menos, não mais. Qualidade de análise e execução supera quantidade de trades. Um dia sem operar é infinitamente melhor do que um dia operando mal." }
    ]
  },
  "8_0": {

    "sections": [
      { type: "p", text: "Price Action é a análise do comportamento do preço sem indicadores — apenas o gráfico de candlesticks, volume e estrutura de S/R. É considerada a forma mais pura e eficaz de analisar mercados." },

</svg>`, caption: 'Leia a narrativa dos candles: aceleração → indecisão → engolfo → continuação.' },
      { type: "h", text: "Por que Price Action no Cripto" },
      { type: "p", text: "No cripto, onde o mercado reage a tweets e notícias em segundos, indicadores matemáticos têm atraso. O Price Action é imediato — a reação dos traders ao preço é visível diretamente nos candlesticks." },
      { type: "h", text: "Os Fundamentos do Price Action" },
      { type: "b", text: "Contexto: onde o preço está em relação ao S/R histórico?" },
      { type: "b", text: "Momentum: os candles estão acelerando ou desacelerando?" },
      { type: "b", text: "Rejeição: há sombras longas indicando rejeição em algum nível?" },
      { type: "b", text: "Equilíbrio: corpos pequenos indicam indecisão — próximo movimento pode ser forte" },
      { type: "h", text: "Lendo uma Sequência de Candles" },

    ]
  },

<text x="206" y="114" text-anchor="middle" fill="#ef4444" font-size="7">LL</text>
<text x="160" y="165" text-anchor="middle" fill="#555" font-size="8" font-family="monospace">HL rompido para baixo = CHoCH = viés de alta encerrado</text>
</svg>`, caption: 'CHoCH: quando o BTC quebra o último HL, a estrutura de alta terminou.' },
      { type: "h", text: "As Três Estruturas" },
      { type: "b", text: "Tendência de Alta: Higher High (HH) + Higher Low (HL) — favorece Longs" },
      { type: "b", text: "Tendência de Baixa: Lower High (LH) + Lower Low (LL) — favorece Shorts" },
      { type: "b", text: "Mercado Lateral: topos e fundos no mesmo nível — evite — espere o rompimento" },
      { type: "h", text: "Mudança de Estrutura (CHoCH)" },
      { type: "p", text: "A Mudança de Estrutura (Change of Character) ocorre quando o BTC estava fazendo HH+HL e agora rompe o último HL para baixo — isso muda o viés de alta para baixa. É sinal de alerta para zerar Longs e preparar Shorts." },
      { type: "h", text: "Break of Structure (BOS)" },
      { type: "p", text: "BOS é quando o preço rompe o último topo (em alta) ou fundo (em baixa), confirmando continuidade da tendência. É o sinal para entrar em pullbacks ou adicionar posição na direção da tendência." },
      { type: "tip", emoji: "📐", title: "Defina o Viés Primeiro", text: "Antes de qualquer trade, responda: 'O BTC está fazendo HH+HL ou LH+LL?' Se não souber responder, não opere — o mercado está lateral ou a estrutura é ambígua. Clareza primeiro." }
    ]
  },
  "8_2": {
    "title": "Rompimento e pullback: o setup mais confiável",
    "sections": [
      { type: "p", text: "O setup de rompimento e pullback é considerado um dos mais confiáveis no cripto. O preço rompe um nível importante, faz um retest (pullback) e retoma a direção — oferecendo uma entrada de RR excelente." },

<text x="160" y="158" text-anchor="middle" fill="#666" font-size="8" font-family="monospace">Pullback à EMA21 em alta = entrada de baixo risco</text>
</svg>`, caption: "Rompimento + pullback à EMA/S/R + candle de reversão = entrada clássica." },
      { type: "h", text: "A Anatomia do Setup" },
      { type: "b", text: "Fase 1: rompimento de S/R com volume acima da média — confirma a quebra" },
      { type: "b", text: "Fase 2: pullback ao nível rompido (troca de polaridade) — cria a entrada" },
      { type: "b", text: "Fase 3: candle de reversão no retest confirma o nível — entre aqui" },
      { type: "b", text: "Stop: abaixo do fundo do pullback / acima do topo (para shorts)" },
      { type: "h", text: "Confirmações de Qualidade" },
      { type: "b", text: "Volume decrescente no pullback: vendedores sem força, compradores aguardando" },
      { type: "b", text: "Pullback em forma de cunha ou canal: movimento corretivo organizado" },
      { type: "b", text: "RSI < 50 no pullback de alta ou > 50 no pullback de baixa: momentum ainda favorável" },
      { type: "h", text: "No BTC: Níveis Mais Importantes" },
      { type: "p", text: "Nos maiores rompimentos do BTC (saída de $20k, $30k, $40k, $50k), os retests foram algumas das melhores entradas da história. Quem esperou o pullback entrou com RR muito melhor que quem comprou no rompimento." },
      { type: "tip", emoji: "⏳", title: "Paciência Recompensa", text: "O setup de pullback requer esperar. Muitos traders compram o rompimento por FOMO e ficam presos se o pullback for fundo. Quem espera o retest entra com stop mais compacto e maior margem de segurança." }
    ]
  },
  "8_3": {
    "title": "Acumulação e distribuição no ciclo cripto",
    "sections": [
      { type: "p", text: "Acumulação e distribuição são fases do ciclo de mercado onde smart money (instituições, baleias) está comprando em silêncio ou vendendo discretamente antes dos grandes movimentos." },
      { type: "h", text: "O Ciclo de Wyckoff no BTC" },
      { type: "b", text: "Acumulação: lateral após queda — smart money comprando do varejo assustado" },
      { type: "b", text: "Mark-up (alta): preço sobe — varejo percebe e compra empurrando mais" },
      { type: "b", text: "Distribuição: lateral no topo — smart money vendendo para o varejo eufórico" },
      { type: "b", text: "Mark-down (queda): preço cai — varejo vende com pânico" },
      { type: "img", svg: `<svg viewBox="0 0 320 175" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">
<rect width="320" height="175" rx="10" fill="#0d0d1a"/>

      { type: "h", text: "Identificando Acumulação" },
      { type: "p", text: "Na acumulação, o preço oscila em range com volume decrescente nos rallies e spikes de volume nos fundos. O BTC testa repetidamente o mesmo suporte sem rompê-lo — compradores absorvendo cada queda." },
      { type: "h", text: "Identificando Distribuição" },
      { type: "p", text: "Na distribuição, o preço faz topos no mesmo nível com volume decrescente. Rallies têm volume menor. Os últimos topos têm candles com sombras longas — compradores esgotados, vendedores no controle." },
      { type: "tip", emoji: "📊", title: "Volume Conta Tudo", text: "Na acumulação, o volume é alto nos fundos (smart money comprando). Na distribuição, volume alto nos topos (smart money vendendo). Aprenda a ler o volume nos extremos — ele revela o dinheiro inteligente." }
    ]
  },
  "8_4": {
    "title": "Swing points e fractal de mercado",
    "sections": [
      { type: "p", text: "Swing points são os topos e fundos formados pelo preço ao longo do tempo. Eles constroem a estrutura do mercado e são a base para identificar S/R, Fibonacci e mudanças de tendência." },
      { type: "h", text: "O que é um Swing Point Válido" },
      { type: "p", text: "Um Swing High válido tem pelo menos 2 candles com máximas menores de cada lado. Um Swing Low válido tem pelo menos 2 candles com mínimas maiores de cada lado. Swing points fracos (apenas 1 candle) são menos confiáveis." },
      { type: "b", text: "Swing High forte: topo rodeado por 2-3 candles com máximas progressivamente menores" },
      { type: "b", text: "Swing Low forte: fundo rodeado por 2-3 candles com mínimas progressivamente maiores" },
      { type: "h", text: "O Fractal de Mercado" },
      { type: "p", text: "O mercado repete padrões em diferentes timeframes — isso é o fractal. Um padrão de acumulação no diário pode conter vários setups de pullback no 4h, cada um com múltiplos candles de reversão no 1h." },
      { type: "img", svg: `<svg viewBox="0 0 320 172" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">

</svg>`, caption: 'HH+HL = tendência de alta. Swing points constroem a estrutura do mercado.' },
      { type: "h", text: "Aplicando ao Trading" },
      { type: "p", text: "Identifique o último Swing High e Low no seu timeframe de referência. Em tendência de alta, o último Swing Low é o suporte mais importante — se romper, a tendência foi invalidada. Coloque seu stop abaixo dele." },
      { type: "tip", emoji: "🌊", title: "Multi-Fractal", text: "Um grande Swing High no semanal pode ser formado por uma distribuição completa no diário, que por sua vez é uma série de 4h com estrutura de LH+LL. Use múltiplos timeframes para entender a profundidade do nível." }
    ]
  },
  "9_0": {
    "title": "Por que o volume é o único indicador real",
    "sections": [
      { type: "p", text: "Preço sem volume é informação incompleta. Todo indicador técnico é derivado do preço — o volume é o único dado independente que confirma ou questiona o que o preço está dizendo." },

      { type: "h", text: "As Leis Fundamentais do Volume no Cripto" },
      { type: "b", text: "Tendência de alta com volume crescente: compradores aumentando posição — saudável" },
      { type: "b", text: "Tendência de alta com volume decrescente: compradores esgotando — atenção" },
      { type: "b", text: "Queda com volume explosivo: capitulação ou grande evento — possível fundo" },
      { type: "b", text: "Rally com volume baixo: sem convicção — possível fakeout ou pullback" },
      { type: "h", text: "Volume em Rompimentos" },
      { type: "p", text: "Um rompimento de resistência importante no BTC precisa de volume acima da média para ser considerado válido. Se o BTC rompe $50k com volume 2x a média = muito confiável. Com volume 50% da média = desconfie." },
      { type: "h", text: "Concentração de Volume por Preço (POC)" },
      { type: "p", text: "O Point of Control (POC) é o preço onde mais volume foi negociado em um período. É uma forte zona de suporte/resistência — o mercado 'volta' para onde mais volume aconteceu. Visível no Volume Profile." },
      { type: "tip", emoji: "📊", title: "Volume Profile", text: "O Volume Profile (disponível no TradingView gratuitamente) mostra onde o volume foi concentrado por nível de preço. O POC (Point of Control) é o nível de maior volume — extremamente respeitado como S/R." }
    ]
  },
  "9_1": {
    "title": "VWAP: onde as instituições operam",
    "sections": [
      { type: "p", text: "O VWAP (Volume Weighted Average Price) é o preço médio ponderado pelo volume do dia. É a referência que fundos de investimento, market makers e algoritmos usam — tornando-o um dos níveis mais respeitados no intraday." },
      { type: "h", text: "Como Usar o VWAP no Day Trade" },
      { type: "b", text: "Preço acima do VWAP: compradores dominando o dia — favoreça Longs" },
      { type: "b", text: "Preço abaixo do VWAP: vendedores dominando o dia — favoreça Shorts" },
      { type: "b", text: "Pullback ao VWAP em tendência de alta: possível entrada Long de baixo risco" },
      { type: "b", text: "Rejeição no VWAP após queda: confirma viés bearish do dia" },
      { type: "img", svg: `<svg viewBox="0 0 320 172" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">

      { type: "h", text: "VWAP Âncora" },
      { type: "p", text: "O VWAP pode ser ancorado em eventos específicos — início de semana, rompimento importante, dados macroeconômicos. O VWAP ancorado em um grande fundo do BTC serve como suporte de médio prazo." },
      { type: "h", text: "VWAP Desvios (Bandas)" },
      { type: "p", text: "As bandas de desvio padrão do VWAP (±1σ, ±2σ) funcionam como o Bollinger — toque na -2σ em tendência de alta = oportunidade. Toque na +2σ = considere saída parcial." },
      { type: "tip", emoji: "⚡", title: "No Bybit e Binance", text: "O VWAP está disponível nas configurações de indicadores da plataforma. Ative-o e observe como o BTC respeita esse nível durante as sessões de maior liquidez (09h-17h BRT)." }
    ]
  },
  "9_2": {
    "title": "CVD e pressão de mercado no cripto",
    "sections": [
      { type: "p", text: "O CVD (Cumulative Volume Delta) mostra a diferença entre compras e vendas agressivas (market orders). É a forma mais direta de ver se os grandes players estão comprando ou vendendo de fato." },
      { type: "h", text: "Como o CVD Funciona" },
      { type: "p", text: "Quando um trader coloca uma ordem de compra a mercado (market buy), ela executa contra as ordens de venda do book. O CVD soma essas pressões ao longo do tempo — revelando se há mais compradores ou vendedores agressivos." },
      { type: "b", text: "CVD subindo com preço subindo: compradores agressivos confirmam a alta" },
      { type: "b", text: "CVD caindo com preço subindo: alerta — preço sobe mas sem pressão compradora real" },
      { type: "b", text: "CVD divergente com preço: indica possível reversão próxima" },
      { type: "h", text: "Open Interest (OI) no Cripto Futuros" },
      { type: "p", text: "O Open Interest é o total de contratos em aberto no mercado de futuros. OI crescendo com preço subindo = novos Longs entrando = tendência de alta confirmada. OI crescendo com preço caindo = novos Shorts = tendência de baixa confirmada." },
      { type: "b", text: "OI alto + preço lateral: squeezeando — movimento explosivo próximo" },

  "9_3": {

      { type: "p", text: "Liquidações são um fenômeno único dos mercados de futuros cripto. Quando o preço atinge o nível de liquidação de uma grande posição alavancada, ela é fechada à força — gerando volume massivo que acelera o movimento." },

      { type: "h", text: "Como Funciona uma Cascata de Liquidações" },
      { type: "p", text: "BTC sobe → Shorts com alta alavancagem são liquidados → suas ordens de compra forçada empurram o preço mais para cima → mais shorts são liquidados → short squeeze. O oposto cria um long squeeze na queda." },
      { type: "h", text: "Short Squeeze vs Long Squeeze" },

  "9_4": {
    "title": "Funding Rate e Open Interest avançado",
    "sections": [
      { type: "p", text: "Funding Rate e Open Interest são indicadores exclusivos do mercado de futuros cripto — não existem em ações ou forex. Entendê-los dá uma vantagem real sobre traders que operam apenas análise técnica tradicional." },
      { type: "h", text: "Funding Rate" },
      { type: "p", text: "O Funding Rate é pago de Longs para Shorts (ou vice-versa) a cada 8 horas nas plataformas perpetuais (Bybit, Binance). Quando muitos traders estão Long, eles pagam Shorts para manter equilíbrio." },
      { type: "b", text: "Funding positivo alto (>0.1%): mercado muito alavancado em Longs — cuidado" },
      { type: "b", text: "Funding negativo alto (<-0.1%): muito Shorts — possível short squeeze próximo" },
      { type: "b", text: "Funding neutro (±0.01%): mercado equilibrado — movimento mais limpo" },
      { type: "h", text: "Combinando OI, Funding e Preço" },
      { type: "b", text: "Preço sobe + OI cresce + Funding positivo: longs entrando — alta com qualidade" },
      { type: "b", text: "Preço sobe + OI cai + Funding neutro: Shorts sendo liquidados — rally sem novos longs" },
      { type: "b", text: "Preço lateral + OI crescendo: coiling — movimento explosivo próximo" },

  "10_0": {
    "title": "Identificando tendências no BTC/ETH",
    "sections": [
      { type: "p", text: "Identificar a tendência corretamente é o passo mais importante antes de qualquer trade. Operar na direção da tendência aumenta significativamente a taxa de acerto — o mercado 'empurra' seu trade." },
      { type: "img", svg: `<svg viewBox="0 0 320 172" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">

<text x="156" y="140" text-anchor="middle" fill="#00ff88" font-size="8" font-family="monospace">ADX &gt; 25 = tendência</text>
<rect x="202" y="125" width="108" height="22" fill="#00ff8818" rx="2"/>
<text x="256" y="140" text-anchor="middle" fill="#00ff88" font-size="8" font-family="monospace">ADX &gt; 40 = forte</text>

</svg>`, caption: 'ADX acima de 25 confirma tendência ativa. Abaixo = mercado lateral.' },
      { type: "h", text: "Os Três Estados do Mercado" },
      { type: "b", text: "Tendência de Alta: sequência de Higher Highs e Higher Lows — favoreça Longs" },
      { type: "b", text: "Tendência de Baixa: sequência de Lower Highs e Lower Lows — favoreça Shorts" },
      { type: "b", text: "Mercado Lateral: topos e fundos no mesmo nível — evite entradas direcionais" },
      { type: "h", text: "Como Identificar a Tendência por Timeframe" },
      { type: "p", text: "O mercado pode estar em alta no semanal, em correção no 4h e em queda no 15m. Qual tendência você segue? Depende do seu estilo: swing trader segue o semanal/diário; day trader segue o 4h; scalper segue o 1h." },
      { type: "h", text: "A Inclinação das EMAs" },
      { type: "p", text: "A forma mais rápida de identificar tendência: EMAs 21/50 inclinadas para cima e preço acima delas = alta. Inclinadas para baixo e preço abaixo = baixa. EMAs planas = mercado lateral." },
      { type: "tip", emoji: "📐", title: "Simplificando", text: "Olhe o gráfico diário do BTC sem nenhum indicador. Se você imediatamente vê uma sequência de subidas com fundos mais altos = alta. Quedas com topos mais baixos = baixa. Se não for óbvio, é lateral." }
    ]
  },
  "10_1": {
    "title": "Linhas de tendência e canais de preço",
    "sections": [
      { type: "p", text: "Linhas de tendência são a representação visual da direção do mercado. Um canal de preço (paralelo entre a linha de tendência e o canal externo) define as zonas de compra e venda dentro da tendência." },
      { type: "h", text: "Como Traçar uma Linha de Tendência Corretamente" },
      { type: "b", text: "Alta: conecte pelo menos 2 fundos progressivamente mais altos (HLs)" },
      { type: "b", text: "Baixa: conecte pelo menos 2 topos progressivamente mais baixos (LHs)" },
      { type: "b", text: "Mínimo 2 pontos para traçar, mínimo 3 toques para ser válida" },
      { type: "b", text: "Quanto mais toques sem rompimento, mais poderosa a linha" },

      { type: "h", text: "Canal de Alta no BTC" },
      { type: "p", text: "Em canal de alta, o preço oscila entre a linha de suporte (fundos) e a linha de resistência (tetos). Compra na linha inferior de suporte com stop abaixo, alvo na linha superior. RR excelente quando as linhas estão bem definidas." },
      { type: "h", text: "Rompimento de Linha de Tendência" },
      { type: "p", text: "Quando o BTC rompe uma linha de tendência de alta estabelecida, é sinal de alerta. Não sai short imediatamente — aguarde um retest da linha rompida (agora resistência) para confirmar a mudança." },
      { type: "tip", emoji: "✏️", title: "Regra dos Toques", text: "Uma linha de tendência com 2 toques é linha de teste. Com 3 toques é estrutura. Com 4-5 toques é nível muito poderoso. Quanto mais toques, mais explosivo o rompimento quando vier." }
    ]
  },
  "10_2": {
    "title": "Halving do Bitcoin e ciclos de mercado",
    "sections": [
      { type: "p", text: "O Halving do Bitcoin é o evento que reduz pela metade a recompensa de mineração a cada ~4 anos. Historicamente, cada halving precedeu um ciclo de alta no BTC — sendo o fenômeno macroeconômico mais importante do cripto." },
      { type: "h", text: "Os Halvings Históricos e o Impacto" },
      { type: "b", text: "2012 (Halving 1): BTC passou de $12 para ~$1.200 nos 12 meses seguintes (+10.000%)" },
      { type: "b", text: "2016 (Halving 2): BTC passou de $650 para ~$20.000 em 2017 (+3.000%)" },
      { type: "b", text: "2020 (Halving 3): BTC passou de $8.700 para ~$69.000 em 2021 (+700%)" },
      { type: "b", text: "2024 (Halving 4): ocorreu em abril de 2024 — ciclo em andamento" },
      { type: "h", text: "Por que o Halving Importa" },
      { type: "p", text: "O halving reduz a oferta nova de BTC que entra no mercado. Com a mesma demanda e metade da nova oferta, o preço teoricamente deve subir. Na prática, o efeito é psicológico e fundamentalista — cria narrativa de escassez." },

  "10_3": {
    "title": "Correlação BTC com altcoins",
    "sections": [
      { type: "p", text: "O Bitcoin é o 'pai' do mercado cripto. Quando o BTC se move, as altcoins geralmente seguem — mas com maior volatilidade. Entender essa correlação é essencial para quem opera ETH, BNB, SOL e outros." },
      { type: "h", text: "Como Funciona a Correlação" },
      { type: "b", text: "BTC sobe: altcoins geralmente sobem mais (beta maior que 1 na maioria)" },
      { type: "b", text: "BTC cai: altcoins geralmente caem mais — perigo para quem está em altcoin com leverage" },
      { type: "b", text: "BTC lateral consolidando: altcoins podem ter movimentos independentes (altseason)" },
      { type: "h", text: "BTC.D — Bitcoin Dominance" },
      { type: "p", text: "O Bitcoin Dominance (BTC.D) mostra a % do market cap do cripto que é BTC. BTC.D subindo = BTC em alta enquanto altcoins sofrem. BTC.D caindo = fluxo de capital para altcoins (potencial altseason)." },
      { type: "b", text: "BTC.D > 50% e subindo: fique em BTC, altcoins em sofrimento" },

      { type: "h", text: "ETH/BTC — O Par Mais Importante" },
      { type: "p", text: "O par ETH/BTC mostra a força relativa do Ethereum versus Bitcoin. ETH/BTC em alta = ETH superando BTC. Em baixa = BTC domina. É um indicador de rotação de capital dentro do cripto." },

  "10_4": {
    "title": "Impacto de macro no mercado cripto",
    "sections": [
      { type: "p", text: "O cripto não opera em uma bolha — especialmente após 2020, tornou-se correlacionado com os mercados tradicionais (S&P 500) durante eventos macro. Saber quando os principais dados americanos saem pode ser a diferença entre lucrar e perder." },
      { type: "h", text: "Eventos Macro Que Movem o BTC" },
      { type: "b", text: "CPI (Inflação Americana): sai mensal — inflação alta = possível queda do BTC" },
      { type: "b", text: "FOMC (FED — taxa de juros): 8x ao ano — decisão de juros move todo mercado" },
      { type: "b", text: "Non-Farm Payroll (emprego EUA): primeiro sexta de cada mês — volatilidade" },
      { type: "b", text: "Liquidez global (M2): expansão do M2 americano historicamente correlaciona com BTC" },
      { type: "h", text: "Correlação BTC x S&P 500" },
      { type: "p", text: "Em eventos de risco sistêmico (queda do S&P 500 mais de 5%), o BTC frequentemente cai junto — os dois são ativos de risco. Em ambientes de expansão monetária (QE, taxas baixas), o BTC historicamente supera o S&P 500." },

  "11_0": {
    "title": "O que é Smart Money no cripto",
    "sections": [
      { type: "p", text: "Smart Money são os grandes players do mercado: fundos de hedge, market makers, baleias cripto e algoritmos institucionais. Eles têm informação, capital e ferramentas que o trader de varejo não tem — mas deixam rastros nos gráficos." },
      { type: "img", svg: `<svg viewBox="0 0 320 172" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">

<text x="160" y="18" text-anchor="middle" fill="#00d4ff" font-size="11" font-family="monospace" font-weight="bold">SMART MONEY — COMO OPERA</text>

<text x="24" y="60" fill="#ef4444" font-size="10">②</text>
<text x="44" y="62" fill="#aaa" font-size="9" font-family="monospace">STOP HUNT — Empurra preço para baixo, coleta stops</text>
<rect x="10" y="72" width="300" height="18" fill="#00d4ff08" rx="3" stroke="#00d4ff20"/>
<text x="24" y="82" fill="#00d4ff" font-size="10">③</text>
<text x="44" y="84" fill="#aaa" font-size="9" font-family="monospace">REVERSÃO — SM já comprou barato, preço reverte</text>
<rect x="10" y="94" width="300" height="18" fill="#ffd70008" rx="3" stroke="#ffd70020"/>
<text x="24" y="104" fill="#ffd700" font-size="10">④</text>
<text x="44" y="106" fill="#aaa" font-size="9" font-family="monospace">MARKUP — Preço sobe, varejo entra por FOMO</text>
<rect x="10" y="116" width="300" height="18" fill="#ef444408" rx="3" stroke="#ef444420"/>
<text x="24" y="126" fill="#ef4444" font-size="10">⑤</text>
<text x="44" y="128" fill="#aaa" font-size="9" font-family="monospace">DISTRIBUIÇÃO — SM vende no topo para o varejo eufórico</text>

<text x="160" y="156" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">Rastro: spike abaixo do suporte + reversão = SM operando</text>
<text x="160" y="167" text-anchor="middle" fill="#555" font-size="8" font-family="monospace">Entrar com SM no ② = melhor preço. FOMO no ④ = pior preço.</text>
</svg>`, caption: 'SM opera em 5 fases: acumulação → stop hunt → reversão → markup → distribuição.' },
      { type: "h", text: "Como o Smart Money Opera" },
      { type: "p", text: "Grandes players não podem simplesmente comprar bilhões de dólares em BTC sem mover o mercado. Eles precisam de liquidez — ou seja, precisam que outros traders estejam vendendo quando eles querem comprar." },
      { type: "b", text: "Compra: SM precisa empurrar preço para baixo (acionando stops de longs)" },
      { type: "b", text: "Venda: SM precisa empurrar preço para cima (acionando stops de shorts + FOMO)" },
      { type: "b", text: "Depois de coletar liquidez: reviram e vão na direção real" },
      { type: "h", text: "Rastros nos Gráficos" },
      { type: "b", text: "Stop hunt: spike rápido abaixo de suporte óbvio, depois reverte para cima" },
      { type: "b", text: "Fake breakout: rompe resistência com volume, falha e reverte — SM vendeu no topo" },
      { type: "b", text: "Absorção silenciosa: preço não cai apesar de notícias ruins — SM comprando" },
      { type: "tip", emoji: "🕵️", title: "Mude o Ponto de Vista", text: "Em vez de 'o mercado está indo contra mim', pergunte: 'Onde precisa de liquidez para mover na direção real?' Encontre os stops óbvios e espere a armadilha antes de entrar." }
    ]
  },
  "11_1": {
    "title": "Order Blocks: onde o Smart Money comprou",
    "sections": [
      { type: "p", text: "Order Blocks são zonas de preço onde o Smart Money executou grandes ordens. São as últimas velas de baixa antes de uma grande alta (bullish OB) ou as últimas velas de alta antes de uma grande queda (bearish OB)." },
      { type: "h", text: "Bullish Order Block" },
      { type: "p", text: "Um Bullish Order Block é formado pela última vela de baixa (ou grupo delas) antes de uma alta significativa. Quando o preço retorna a essa zona, há grande probabilidade de suporte — porque é onde o SM comprou originalmente." },
      { type: "b", text: "Identifique: última vela vermelha antes de um impulso de alta forte" },
      { type: "b", text: "O preço retorna à zona e mostra sinal de reversão: entre Long" },
      { type: "b", text: "Stop: abaixo da mínima do Order Block" },
      { type: "img", svg: `<svg viewBox="0 0 320 175" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">

      { type: "h", text: "Bearish Order Block" },
      { type: "p", text: "Última vela verde antes de uma queda significativa. Quando o preço retesta essa zona, há resistência — SM que vendeu originalmente ali defende o nível para sair de posições remanescentes." },
      { type: "h", text: "Order Block vs Suporte/Resistência Comum" },
      { type: "p", text: "Order Blocks são mais específicos que S/R simples — identificam a última 'defesa' antes do impulso. Combinados com S/R e Fibonacci, formam zonas de confluência premium." },
      { type: "tip", emoji: "🎯", title: "Qualidade do OB", text: "Order Blocks de maior timeframe (diário, semanal) são mais poderosos. Um OB no diário do BTC que coincide com Fibonacci 61.8% é uma das entradas mais premium que existem no mercado cripto." }
    ]
  },
  "11_2": {
    "title": "Fair Value Gaps e áreas de ineficiência",
    "sections": [
      { type: "p", text: "Fair Value Gap (FVG) — também chamado de Imbalance ou Gap de Liquidez — é uma área onde o preço se moveu tão rapidamente que não houve troca equilibrada entre compradores e vendedores. O mercado tende a retornar e preencher esses gaps." },
      { type: "h", text: "Como Identificar um FVG" },
      { type: "p", text: "Um FVG bullish ocorre quando há um gap entre a máxima do candle 1 e a mínima do candle 3, com o candle 2 no meio sendo uma grande vela de alta. A ausência de negociação nessa faixa cria um 'vácuo' que o preço frequentemente revisita." },
      { type: "b", text: "FVG Bullish: gap entre máxima do candle anterior e mínima do posterior — zona de suporte" },
      { type: "b", text: "FVG Bearish: gap entre mínima do candle anterior e máxima do posterior — zona de resistência" },
      { type: "b", text: "Preenchimento do FVG: preço retorna à zona antes de continuar a tendência" },
      { type: "img", svg: `<svg viewBox="0 0 320 172" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">

<text x="160" y="160" text-anchor="middle" fill="#555" font-size="8" font-family="monospace">Mercado frequentemente retorna para preencher FVGs</text>
</svg>`, caption: 'FVG = gap de ineficiência que o mercado frequentemente revisita e preenche.' },
      { type: "h", text: "FVG no BTC" },
      { type: "p", text: "Quando o BTC tem um gap de $500 em um único candle de 15 minutos, há um FVG. Em tendência de alta, esse FVG pode ser alvo de um pullback — é onde os compradores que 'perderam' o movimento inicial esperam para entrar." },
      { type: "tip", emoji: "⚡", title: "FVG + Order Block", text: "FVG dentro de um Order Block é uma confluência premium. Se o bullish OB tem um FVG interno, o meio do FVG é o nível de entrada mais preciso — geralmente onde o preço para e reverte." }
    ]
  },

      { type: "b", text: "Abaixo de mínimas anteriores: stops de Longs e ordens de Sell Stop do varejo" },

      { type: "h", text: "Como Operar Após a Coleta" },
      { type: "p", text: "Quando o BTC faz um stop hunt abaixo de um suporte importante (spike para baixo que reverte rapidamente), é uma das melhores entradas Long disponíveis. O SM coletou a liquidez que precisava — agora vai na direção real." },
      { type: "b", text: "Aguarde o spike abaixo do nível e o candle de reversão imediato" },
      { type: "b", text: "Entre Long com stop abaixo da mínima do spike" },
      { type: "b", text: "Alvo: máxima anterior (próxima zona de liquidez acima)" },
      { type: "tip", emoji: "💎", title: "Paciência é Dinheiro", text: "Stop hunts acontecem frequentemente antes de grandes movimentos do BTC. Quem identifica e aguarda esses momentos entra com os melhores preços e menor risco — junto com o Smart Money." }

  },
  "11_4": {
    "title": "Modelo ICT para day trade de cripto",
    "sections": [
      { type: "p", text: "O modelo ICT (Inner Circle Trader) combina Order Blocks, FVGs, coleta de liquidez e horários específicos de mercado em um framework completo. É um dos mais estudados em comunidades avançadas de day trade." },
      { type: "h", text: "Killzones: Horários Mais Favoráveis" },
      { type: "b", text: "Asian Kill Zone: 00h-03h BRT — menor volatilidade, acumulação" },
      { type: "b", text: "London Open Kill Zone: 05h-08h BRT — primeiro grande movimento do dia" },
      { type: "b", text: "New York Kill Zone: 10h-13h BRT — maior liquidez, movimentos mais limpos" },
      { type: "b", text: "New York Afternoon: 15h-17h BRT — pode haver reversão do movimento da manhã" },
      { type: "h", text: "O Modelo ICT Diário" },
      { type: "p", text: "O ICT ensina que o mercado frequentemente faz: Sweep (coleta de liquidez) → Reversão → Impulso na direção real. Esse padrão ocorre com mais frequência nas Killzones — especialmente na abertura de Londres e Nova York." },

      { type: "h", text: "Entry Model Simplificado" },
      { type: "b", text: "1. Identifique a tendência no 4h — qual o viés do dia?" },

  },
  "12_0": {
    "title": "O que é Order Flow e por que importa",
    "sections": [
      { type: "p", text: "Order Flow é a análise das ordens reais entrando no mercado — não o preço derivado dessas ordens, mas as ordens em si. É a leitura mais avançada e direta do que está acontecendo no mercado." },
      { type: "img", svg: `<svg viewBox="0 0 320 175" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;display:block;margin:0 auto">
<rect width="320" height="175" rx="10" fill="#0d0d1a"/>
<text x="160" y="18" text-anchor="middle" fill="#00d4ff" font-size="11" font-family="monospace" font-weight="bold">PRICE ACTION vs ORDER FLOW</text>
<rect x="10" y="28" width="140" height="80" rx="6" fill="#00d4ff08" stroke="#00d4ff25"/>
<text x="80" y="44" text-anchor="middle" fill="#00d4ff" font-size="9" font-family="monospace" font-weight="bold">Price Action</text>
<text x="80" y="58" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">Resultado das ordens</text>
<text x="80" y="70" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">Gráfico de candles</text>
<text x="80" y="82" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">Atraso: 0 candles</text>
<text x="80" y="94" text-anchor="middle" fill="#555" font-size="8" font-family="monospace">Básico → Intermediário</text>
<rect x="170" y="28" width="140" height="80" rx="6" fill="#ffd70008" stroke="#ffd70025"/>
<text x="240" y="44" text-anchor="middle" fill="#ffd700" font-size="9" font-family="monospace" font-weight="bold">Order Flow</text>
<text x="240" y="58" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">As ordens em tempo real</text>
<text x="240" y="70" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">Delta, footprint, DOM</text>
<text x="240" y="82" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">Atraso: zero</text>
<text x="240" y="94" text-anchor="middle" fill="#555" font-size="8" font-family="monospace">Avançado</text>
<text x="160" y="118" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">Order Flow vê os dados que geram o Price Action</text>
<rect x="50" y="125" width="220" height="22" rx="4" fill="#00ff8808" stroke="#00ff8820"/>
<text x="160" y="137" text-anchor="middle" fill="#00ff88" font-size="8" font-family="monospace">Delta = Compras agressivas − Vendas agressivas</text>
<text x="160" y="155" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">Absorção = alto volume sem movimento = grande player</text>
<text x="160" y="167" text-anchor="middle" fill="#555" font-size="8" font-family="monospace">Domine Price Action antes de entrar no Order Flow</text>
</svg>`, caption: 'Order Flow vê as ordens que criam o Price Action — camada mais profunda.' },
      { type: "h", text: "Price Action vs Order Flow" },
      { type: "p", text: "Price Action lê o resultado das ordens (o gráfico de candles). Order Flow lê as ordens em tempo real — quem está comprando, quem está vendendo, e com que intensidade. É uma camada mais profunda de informação." },
      { type: "h", text: "Os Dados do Order Flow" },
      { type: "b", text: "Bid x Ask: ordens de compra e venda no book em tempo real" },
      { type: "b", text: "Delta: diferença entre compras e vendas agressivas (market orders)" },
      { type: "b", text: "Absorção: quando há pressão forte mas o preço não se move — player absorvendo" },
      { type: "b", text: "Imbalance: razão entre bids e asks maior que 3:1 — indica direção provável" },
      { type: "h", text: "Ferramentas de Order Flow" },
      { type: "p", text: "Footprint Chart, Volume Profile, Delta Chart e Depth of Market (DOM) são as principais ferramentas. No cripto, plataformas como Sierra Chart, Bookmap e Exocharts oferecem essas visualizações." },
      { type: "tip", emoji: "🔬", title: "Complexidade", text: "Order Flow é o nível mais avançado da análise de mercado. Domine primeiro Price Action, S/R e Volume antes de entrar em Order Flow. A fundação sólida é o que permite extrair valor dessa análise." }
    ]
  },
  "12_1": {

      { type: "h", text: "Lendo o Footprint" },
      { type: "b", text: "Delta positivo (verde): mais compras que vendas agressivas naquele candle" },

      { type: "h", text: "Divergência Footprint x Preço" },
      { type: "p", text: "Se o BTC está subindo (candles verdes) mas o delta é negativo — alguém está vendendo no rally absorvendo as compras. Isso é sinal bearish: smart money distribuindo enquanto o preço ainda parece forte." },
      { type: "h", text: "Configuração no Cripto" },
      { type: "p", text: "Para usar Footprint no BTC, você precisa de dados de tape (L2). Plataformas como Exocharts (grátis básico), Bookmap e Sierra Chart oferecem. Para começar, o Delta Chart do TradingView é uma alternativa mais simples." },

    ]
  },
